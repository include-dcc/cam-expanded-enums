      edam:data_2314:
        text: edam:data_2314
        description: 'A series of digits that are assigned consecutively to each sequence
          record processed by NCBI. The GI number bears no resemblance to the Accession
          number of the sequence record.

          Nucleotide sequence GI number is shown in the VERSION field of the database
          record. Protein sequence GI number is shown in the CDS/db_xref field of
          a nucleotide database record, and the VERSION field of a protein database
          record.'
        meaning: edam:data_2314
        title: GI number
      edam:data_2315:
        text: edam:data_2315
        description: 'An identifier assigned to sequence records processed by NCBI,
          made of the accession number of the database record followed by a dot and
          a version number.

          Nucleotide sequence version contains two letters followed by six digits,
          a dot, and a version number (or for older nucleotide sequence records, the
          format is one letter followed by five digits, a dot, and a version number).
          Protein sequence version contains three letters followed by five digits,
          a dot, and a version number.'
        meaning: edam:data_2315
        title: NCBI version
