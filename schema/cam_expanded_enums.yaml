types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string. If you are authoring schemas in LinkML YAML, the type is referenced
      with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  EnumDataUsePermission:
    name: EnumDataUsePermission
    definition_uri: https://includedcc.org/common-access-model/EnumDataUsePermission/EnumDataUsePermission
    description: Data Use Ontology (DUO) terms for data use permissions.
    title: Data Use Permission
    from_schema: https://includedcc.org/common-access-model/EnumDataUsePermission
    permissible_values:
      DUO:0000004:
        text: DUO:0000004
        description: This data use permission indicates there is no restriction on
          use.
        meaning: DUO:0000004
        title: no restriction
      DUO:0000006:
        text: DUO:0000006
        description: This data use permission indicates that use is allowed for health/medical/biomedical
          purposes; does not include the study of population origins or ancestry.
        meaning: DUO:0000006
        title: health or medical or biomedical research
      DUO:0000007:
        text: DUO:0000007
        description: "This data use permission indicates that use is allowed provided\
          \ it is related to the specified disease.\nThis term should be coupled with\
          \ a term describing a disease from an ontology to specify the disease the\
          \ restriction applies to. \n\nDUO recommends MONDO be used, to provide the\
          \ basis for automated evaluation. For more information see https://github.com/EBISPOT/DUO/blob/master/MONDO_Overview.md\n\
          \nOther resources, such as the Disease Ontology, HPO, SNOMED-CT or others,\
          \ can also be used. When those other resources are being used, this may\
          \ require an extra mapping step to leverage automated matching algorithms."
        meaning: DUO:0000007
        title: disease specific research
      DUO:0000011:
        text: DUO:0000011
        description: This data use permission indicates that use of the data is limited
          to the study of population origins or ancestry.
        meaning: DUO:0000011
        title: population origins or ancestry research only
      DUO:0000042:
        text: DUO:0000042
        description: 'This data use permission indicates that use is allowed for general
          research use for any research purpose.

          This includes but is not limited to: health/medical/biomedical purposes,
          fundamental biology research, the study of population origins or ancestry,
          statistical methods and algorithms development, and social-sciences research.'
        meaning: DUO:0000042
        title: general research use
    reachable_from:
      source_ontology: bioregistry:duo
      source_nodes:
      - DUO:0000001
      relationship_types:
      - rdfs:subClassOf
      is_direct: false
      include_self: false
      traverse_up: false
  EnumDataUseModifier:
    name: EnumDataUseModifier
    definition_uri: https://includedcc.org/common-access-model/EnumDataUseModifier/EnumDataUseModifier
    description: Data Use Ontology (DUO) terms for data use modifiers.
    title: Data Use Modifier
    from_schema: https://includedcc.org/common-access-model/EnumDataUseModifier
    permissible_values:
      DUO:00000044:
        text: DUO:00000044
        description: This data use modifier indicates use for purposes of population,
          origin, or ancestry research is prohibited.
        meaning: DUO:00000044
        title: population origins or ancestry research prohibited
      DUO:0000012:
        text: DUO:0000012
        description: This data use modifier indicates that use is limited to studies
          of a certain research type.
        meaning: DUO:0000012
        title: research specific restrictions
      DUO:0000015:
        text: DUO:0000015
        description: This data use modifier indicates that use does not allow methods
          development research (e.g., development of software or algorithms).
        meaning: DUO:0000015
        title: no general methods research
      DUO:0000016:
        text: DUO:0000016
        description: This data use modifier indicates that use is limited to genetic
          studies only (i.e., studies that include genotype research alone or both
          genotype and phenotype research, but not phenotype research exclusively)
        meaning: DUO:0000016
        title: genetic studies only
      DUO:0000018:
        text: DUO:0000018
        description: This data use modifier indicates that use of the data is limited
          to not-for-profit organizations and not-for-profit use, non-commercial use.
        meaning: DUO:0000018
        title: not for profit, non commercial use only
      DUO:0000019:
        text: DUO:0000019
        description: This data use modifier indicates that requestor agrees to make
          results of studies using the data available to the larger scientific community.
        meaning: DUO:0000019
        title: publication required
      DUO:0000020:
        text: DUO:0000020
        description: 'This could be coupled with a string describing the primary study
          investigator(s).

          This data use modifier indicates that the requestor must agree to collaboration
          with the primary study investigator(s).'
        meaning: DUO:0000020
        title: collaboration required
      DUO:0000021:
        text: DUO:0000021
        description: This data use modifier indicates that the requestor must provide
          documentation of local IRB/ERB approval.
        meaning: DUO:0000021
        title: ethics approval required
      DUO:0000022:
        text: DUO:0000022
        description: 'This data use modifier indicates that use is limited to within
          a specific geographic region.

          This should be coupled with an ontology term describing the geographical
          location the restriction applies to.'
        meaning: DUO:0000022
        title: geographical restriction
      DUO:0000024:
        text: DUO:0000024
        description: 'This data use modifier indicates that requestor agrees not to
          publish results of studies until a specific date.

          This should be coupled with a date specified as ISO8601'
        meaning: DUO:0000024
        title: publication moratorium
      DUO:0000025:
        text: DUO:0000025
        description: 'This data use modifier indicates that use is approved for a
          specific number of months.

          This should be coupled with an integer value indicating the number of months.'
        meaning: DUO:0000025
        title: time limit on use
      DUO:0000026:
        text: DUO:0000026
        description: This data use modifier indicates that use is limited to use by
          approved users.
        meaning: DUO:0000026
        title: user specific restriction
      DUO:0000027:
        text: DUO:0000027
        description: This data use modifier indicates that use is limited to use within
          an approved project.
        meaning: DUO:0000027
        title: project specific restriction
      DUO:0000028:
        text: DUO:0000028
        description: This data use modifier indicates that use is limited to use within
          an approved institution.
        meaning: DUO:0000028
        title: institution specific restriction
      DUO:0000029:
        text: DUO:0000029
        description: This data use modifier indicates that the requestor must return
          derived/enriched data to the database/resource.
        meaning: DUO:0000029
        title: return to database or resource
      DUO:0000043:
        text: DUO:0000043
        description: 'Clinical Care is defined as Health care or services provided
          at home, in a healthcare facility or hospital. Data may be used for clinical
          decision making.

          This data use modifier indicates that use is allowed for clinical use and
          care.'
        meaning: DUO:0000043
        title: clinical care use
      DUO:0000045:
        text: DUO:0000045
        description: This data use modifier indicates that use of the data is limited
          to not-for-profit organizations.
        meaning: DUO:0000045
        title: not for profit organisation use only
      DUO:0000046:
        text: DUO:0000046
        description: 'This data use modifier indicates that use of the data is limited
          to not-for-profit use.

          This indicates that data can be used by commercial organisations for research
          purposes, but not commercial purposes.'
        meaning: DUO:0000046
        title: non-commercial use only
    reachable_from:
      source_ontology: bioregistry:duo
      source_nodes:
      - DUO:0000017
      relationship_types:
      - rdfs:subClassOf
      is_direct: false
      include_self: false
      traverse_up: false
