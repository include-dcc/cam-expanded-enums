      edam:data_2535:
        text: edam:data_2535
        description: 'Output from a serial analysis of gene expression (SAGE), massively
          parallel signature sequencing (MPSS) or sequencing by synthesis (SBS) experiment.
          In all cases this is a list of short sequence tags and the number of times
          it is observed.

          SAGE, MPSS and SBS experiments are usually performed to study gene expression.
          The sequence tags are typically subsequently annotated (after a database
          search) with the mRNA (and therefore gene) the tag was extracted from.

          This includes tag to gene assignments (tag mapping) of SAGE, MPSS and SBS
          data. Typically this is the sequencing-based expression profile annotated
          with gene identifiers.'
        meaning: edam:data_2535
        title: Sequence tag profile
