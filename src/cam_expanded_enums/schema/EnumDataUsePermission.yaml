---
id: https://includedcc.org/common-access-model/EnumDataUsePermission
name: EnumDataUsePermission
enums:
  EnumDataUsePermission:
    title: Data Use Permission
    description: Data Use Ontology (DUO) terms for data use permissions.
    reachable_from:
      source_ontology: bioregistry:duo
      source_nodes:
        - DUO:0000001
      is_direct: false
      include_self: false
      traverse_up: false
      relationship_types:
        - rdfs:subClassOf
    permissible_values:
      DUO:0000004:
        title: no restriction
        description: This data use permission indicates there is no restriction on
          use.
        meaning: DUO:0000004
      DUO:0000006:
        title: health or medical or biomedical research
        description: This data use permission indicates that use is allowed for health/medical/biomedical
          purposes; does not include the study of population origins or ancestry.
        meaning: DUO:0000006
      DUO:0000007:
        title: disease specific research
        description: "This data use permission indicates that use is allowed provided\
          \ it is related to the specified disease.\nThis term should be coupled with\
          \ a term describing a disease from an ontology to specify the disease the\
          \ restriction applies to. \n\nDUO recommends MONDO be used, to provide the\
          \ basis for automated evaluation. For more information see https://github.com/EBISPOT/DUO/blob/master/MONDO_Overview.md\n\
          \nOther resources, such as the Disease Ontology, HPO, SNOMED-CT or others,\
          \ can also be used. When those other resources are being used, this may\
          \ require an extra mapping step to leverage automated matching algorithms."
        meaning: DUO:0000007
      DUO:0000011:
        title: population origins or ancestry research only
        description: This data use permission indicates that use of the data is limited
          to the study of population origins or ancestry.
        meaning: DUO:0000011
      DUO:0000042:
        title: general research use
        description: 'This data use permission indicates that use is allowed for general
          research use for any research purpose.

          This includes but is not limited to: health/medical/biomedical purposes,
          fundamental biology research, the study of population origins or ancestry,
          statistical methods and algorithms development, and social-sciences research.'
        meaning: DUO:0000042
