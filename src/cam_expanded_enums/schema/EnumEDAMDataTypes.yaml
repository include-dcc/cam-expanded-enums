          Such as generated by the Vienna package.'
        title: Base pairing probability matrix dotplot
      edam:data_1596:
        text: edam:data_1596
        description: A human-readable collection of information about RNA/DNA folding,
          minimum folding energies for DNA or RNA sequences, energy landscape of RNA
          mutants etc.
        title: Nucleic acid folding report
      edam:data_1597:
        text: edam:data_1597
        description: 'A codon usage table might include the codon usage table name,
          optional comments and a table with columns for codons and corresponding
          codon usage data. A genetic code can be extracted from or represented by
          a codon usage table.

          Table of codon usage data calculated from one or more nucleic acid sequences.'
        title: Codon usage table
      edam:data_1598:
        text: edam:data_1598
        description: 'A genetic code for an organism.

          A genetic code need not include detailed codon usage information.'
        title: Genetic code
      edam:data_1600:
        text: edam:data_1600
        description: A plot of the synonymous codon usage calculated for windows over
          a nucleotide sequence.
        title: Codon usage bias plot
      edam:data_1602:
        text: edam:data_1602
        description: The differences in codon usage fractions between two codon usage
          tables.
        title: Codon usage fraction difference
      edam:data_1621:
        text: edam:data_1621
        description: 'A human-readable collection of information about the influence
          of genotype on drug response.

          The report might correlate gene expression or single-nucleotide polymorphisms
          with drug efficacy or toxicity.'
        title: Pharmacogenomic test report
      edam:data_1622:
        text: edam:data_1622
        description: 'A human-readable collection of information about a specific
          disease.

          For example, an informative report on a specific tumor including nature
          and origin of the sample, anatomic site, organ or tissue, tumor type, including
          morphology and/or histologic type, and so on.'
        title: Disease report
      edam:data_1636:
        text: edam:data_1636
        description: A graphical 2D tabular representation of expression data, typically
          derived from an omics experiment. A heat map is a table where rows and columns
          correspond to different features and contexts (for example, cells or samples)
          and the cell colour represents the level of expression of a gene that context.
        title: Heat map
      edam:data_1667:
        text: edam:data_1667
        description: 'A simple floating point number defining the lower or upper limit
          of an expectation value (E-value).

          An expectation value (E-Value) is the expected number of observations which
          are at least as extreme as observations expected to occur by random chance.
          The E-value describes the number of hits with a given score or better that
          are expected to occur at random when searching a database of a particular
          size. It decreases exponentially with the score (S) of a hit. A low E value
          indicates a more significant score.'
        title: E-value
      edam:data_1668:
        text: edam:data_1668
        description: 'A z-value might be specified as a threshold for reporting hits
          from database searches.

          The z-value is the number of standard deviations a data value is above or
          below a mean value.'
        title: Z-value
      edam:data_1669:
        text: edam:data_1669
        description: 'A z-value might be specified as a threshold for reporting hits
          from database searches.

          The P-value is the probability of obtaining by random chance a result that
          is at least as extreme as an observed result, assuming a NULL hypothesis
          is true.'
        title: P-value
      edam:data_1689:
        text: edam:data_1689
        description: A username on a computer system or a website.
        title: Username
      edam:data_1690:
        text: edam:data_1690
        description: A password on a computer system, or a website.
        title: Password
      edam:data_1691:
        text: edam:data_1691
        description: A valid email address of an end-user.
        title: Email address
      edam:data_1692:
        text: edam:data_1692
        description: The name of a person.
        title: Person name
      edam:data_1696:
        text: edam:data_1696
        description: 'A drug structure relationship map is report (typically a map
          diagram) of drug structure relationships.

          A human-readable collection of information about a specific drug.'
        title: Drug report
      edam:data_1707:
        text: edam:data_1707
        description: 'An image (for viewing or printing) of a phylogenetic tree including
          (typically) a plot of rooted or unrooted phylogenies, cladograms, circular
          trees or phenograms and associated information.

          See also ''Phylogenetic tree'''
        title: Phylogenetic tree image
      edam:data_1708:
        text: edam:data_1708
        description: Image of RNA secondary structure, knots, pseudoknots etc.
        title: RNA secondary structure image
      edam:data_1709:
        text: edam:data_1709
        description: Image of protein secondary structure.
        title: Protein secondary structure image
      edam:data_1710:
        text: edam:data_1710
        description: Image of one or more molecular tertiary (3D) structures.
        title: Structure image
      edam:data_1711:
        text: edam:data_1711
        description: Image of two or more aligned molecular sequences possibly annotated
          with alignment features.
        title: Sequence alignment image
      edam:data_1712:
        text: edam:data_1712
        description: 'An image of the structure of a small chemical compound.

          The molecular identifier and formula are typically included.'
        title: Chemical structure image
      edam:data_1713:
        text: edam:data_1713
        description: A fate map is a plan of early stage of an embryo such as a blastula,
          showing areas that are significance to development.
        title: Fate map
      edam:data_1714:
        text: edam:data_1714
