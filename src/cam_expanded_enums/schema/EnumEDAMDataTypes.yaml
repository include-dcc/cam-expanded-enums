        text: edam:data_1201
        description: A QSAR constitutional descriptor.
        title: QSAR descriptor (constitutional)
      edam:data_1202:
        text: edam:data_1202
        description: A QSAR electronic descriptor.
        title: QSAR descriptor (electronic)
      edam:data_1203:
        text: edam:data_1203
        description: A QSAR geometrical descriptor.
        title: QSAR descriptor (geometrical)
      edam:data_1204:
        text: edam:data_1204
        description: A QSAR topological descriptor.
        title: QSAR descriptor (topological)
      edam:data_1205:
        text: edam:data_1205
        description: A QSAR molecular descriptor.
        title: QSAR descriptor (molecular)
      edam:data_1233:
        text: edam:data_1233
        description: Any collection of multiple protein sequences and associated metadata
          that do not (typically) correspond to common sequence database records or
          database entries.
        title: Sequence set (protein)
      edam:data_1234:
        text: edam:data_1234
        description: Any collection of multiple nucleotide sequences and associated
          metadata that do not (typically) correspond to common sequence database
          records or database entries.
        title: Sequence set (nucleic acid)
      edam:data_1235:
        text: edam:data_1235
        description: 'A set of sequences that have been clustered or otherwise classified
          as belonging to a group including (typically) sequence cluster information.

          The cluster might include sequences identifiers, short descriptions, alignment
          and summary information.'
        title: Sequence cluster
      edam:data_1238:
        text: edam:data_1238
        description: A protein sequence cleaved into peptide fragments (by enzymatic
          or chemical cleavage) with fragment masses.
        title: Proteolytic digest
      edam:data_1239:
        text: edam:data_1239
        description: Restriction digest fragments from digesting a nucleotide sequence
          with restriction sites using a restriction endonuclease.
        title: Restriction digest
      edam:data_1240:
        text: edam:data_1240
        description: Oligonucleotide primer(s) for PCR and DNA amplification, for
          example a minimal primer set.
        title: PCR primers
      edam:data_1245:
        text: edam:data_1245
        description: 'A cluster of protein sequences.

          The sequences are typically related, for example a family of sequences.'
        title: Sequence cluster (protein)
      edam:data_1246:
        text: edam:data_1246
        description: 'A cluster of nucleotide sequences.

          The sequences are typically related, for example a family of sequences.'
        title: Sequence cluster (nucleic acid)
      edam:data_1249:
        text: edam:data_1249
        description: The size (length) of a sequence, subsequence or region in a sequence,
          or range(s) of lengths.
        title: Sequence length
      edam:data_1254:
        text: edam:data_1254
        description: An informative report about non-positional sequence features,
          typically a report on general molecular sequence properties derived from
          sequence analysis.
        title: Sequence property
      edam:data_1255:
        text: edam:data_1255
        description: 'Annotation of positional features of molecular sequence(s),
          i.e. that can be mapped to position(s) in the sequence.

          This includes annotation of positional sequence features, organised into
          a standard feature table, or any other report of sequence features. General
          feature reports are a source of sequence feature table information although
          internal conversion would be required.'
        title: Sequence features
      edam:data_1259:
        text: edam:data_1259
        description: A report on sequence complexity, for example low-complexity or
          repeat regions in sequences.
        title: Sequence complexity report
      edam:data_1260:
        text: edam:data_1260
        description: A report on ambiguity in molecular sequence(s).
        title: Sequence ambiguity report
      edam:data_1261:
        text: edam:data_1261
        description: A report (typically a table) on character or word composition
          / frequency of a molecular sequence(s).
        title: Sequence composition report
      edam:data_1262:
        text: edam:data_1262
        description: A report on peptide fragments of certain molecular weight(s)
          in one or more protein sequences.
        title: Peptide molecular weight hits
      edam:data_1263:
        text: edam:data_1263
        description: A plot of third base position variability in a nucleotide sequence.
        title: Base position variability plot
      edam:data_1265:
        text: edam:data_1265
        description: A table of base frequencies of a nucleotide sequence.
        title: Base frequencies table
      edam:data_1266:
        text: edam:data_1266
        description: A table of word composition of a nucleotide sequence.
        title: Base word frequencies table
      edam:data_1267:
        text: edam:data_1267
        description: A table of amino acid frequencies of a protein sequence.
        title: Amino acid frequencies table
      edam:data_1268:
        text: edam:data_1268
        description: A table of amino acid word composition of a protein sequence.
        title: Amino acid word frequencies table
      edam:data_1270:
        text: edam:data_1270
        description: Annotation of positional sequence features, organised into a
          standard feature table.
        title: Feature table
      edam:data_1274:
        text: edam:data_1274
        description: A map of (typically one) DNA sequence annotated with positional
          or non-positional features.
        title: Map
      edam:data_1276:
        text: edam:data_1276
        description: 'An informative report on intrinsic positional features of a
          nucleotide sequence, formatted to be machine-readable.

          This includes nucleotide sequence feature annotation in any known sequence
          feature table format and any other report of nucleic acid features.'
        title: Nucleic acid features
      edam:data_1277:
        text: edam:data_1277
        description: 'An informative report on intrinsic positional features of a
          protein sequence.

          This includes protein sequence feature annotation in any known sequence
          feature table format and any other report of protein features.'
        title: Protein features
      edam:data_1278:
        text: edam:data_1278
        description: 'A genetic (linkage) map indicates the proximity of two genes
          on a chromosome, whether two genes are linked and the frequency they are
          transmitted together to an offspring. They are limited to genetic markers
          of traits observable only in whole organisms.

          A map showing the relative positions of genetic markers in a nucleic acid
          sequence, based on estimation of non-physical distance such as recombination
          frequencies.'
        title: Genetic map
      edam:data_1279:
        text: edam:data_1279
        description: 'A map of genetic markers in a contiguous, assembled genomic
          sequence, with the sizes and separation of markers measured in base pairs.

          A sequence map typically includes annotation on significant subsequences
          such as contigs, haplotypes and genes. The contigs shown will (typically)
          be a set of small overlapping clones representing a complete chromosomal
          segment.'
        title: Sequence map
      edam:data_1280:
        text: edam:data_1280
        description: 'A map of DNA (linear or circular) annotated with physical features
          or landmarks such as restriction sites, cloned DNA fragments, genes or genetic
          markers, along with the physical distances between them.

          Distance in a physical map is measured in base pairs. A physical map might
          be ordered relative to a reference map (typically a genetic map) in the
          process of genome sequencing.'
        title: Physical map
      edam:data_1283:
        text: edam:data_1283
        description: 'A map showing banding patterns derived from direct observation
          of a stained chromosome.

          This is the lowest-resolution physical map and can provide only rough estimates
          of physical (base pair) distances. Like a genetic map, they are limited
          to genetic markers of traits observable only in whole organisms.'
        title: Cytogenetic map
      edam:data_1284:
        text: edam:data_1284
        description: A gene map showing distances between loci based on relative cotransduction
          frequencies.
        title: DNA transduction map
      edam:data_1285:
        text: edam:data_1285
        description: Sequence map of a single gene annotated with genetic features
          such as introns, exons, untranslated regions, polyA signals, promoters,
          enhancers and (possibly) mutations defining alleles of a gene.
        title: Gene map
      edam:data_1286:
        text: edam:data_1286
        description: Sequence map of a plasmid (circular DNA).
        title: Plasmid map
      edam:data_1288:
        text: edam:data_1288
        description: Sequence map of a whole genome.
        title: Genome map
      edam:data_1289:
        text: edam:data_1289
        description: Image of the restriction enzyme cleavage sites (restriction sites)
          in a nucleic acid sequence.
        title: Restriction map
      edam:data_1347:
        text: edam:data_1347
        description: Dirichlet distribution used by hidden Markov model analysis programs.
        title: Dirichlet distribution
      edam:data_1352:
        text: edam:data_1352
        description: Regular expression pattern.
        title: Regular expression
      edam:data_1353:
        text: edam:data_1353
        description: Any specific or conserved pattern (typically expressed as a regular
          expression) in a molecular sequence.
        title: Sequence motif
      edam:data_1354:
        text: edam:data_1354
        description: Some type of statistical model representing a (typically multiple)
          sequence alignment.
        title: Sequence profile
      edam:data_1355:
        text: edam:data_1355
        description: An informative report about a specific or conserved protein sequence
          pattern.
        title: Protein signature
      edam:data_1361:
        text: edam:data_1361
        description: A profile (typically representing a sequence alignment) that
          is a simple matrix of nucleotide (or amino acid) counts per position.
        title: Position frequency matrix
      edam:data_1362:
        text: edam:data_1362
        description: 'A profile (typically representing a sequence alignment) that
          is weighted matrix of nucleotide (or amino acid) counts per position.

          Contributions of individual sequences to the matrix might be uneven (weighted).'
        title: Position weight matrix
      edam:data_1363:
        text: edam:data_1363
        description: A profile (typically representing a sequence alignment) derived
          from a matrix of nucleotide (or amino acid) counts per position that reflects
          information content at each position.
        title: Information content matrix
      edam:data_1364:
        text: edam:data_1364
        description: A statistical Markov model of a system which is assumed to be
          a Markov process with unobserved (hidden) states. For example, a hidden
          Markov model representation of a set or alignment of sequences.
        title: Hidden Markov model
      edam:data_1365:
        text: edam:data_1365
        description: One or more fingerprints (sequence classifiers) as used in the
          PRINTS database.
        title: Fingerprint
      edam:data_1381:
        text: edam:data_1381
        description: Alignment of exactly two molecular sequences.
        title: Pair sequence alignment
      edam:data_1383:
        text: edam:data_1383
        description: Alignment of multiple nucleotide sequences.
        title: Nucleic acid sequence alignment
      edam:data_1384:
        text: edam:data_1384
        description: Alignment of multiple protein sequences.
        title: Protein sequence alignment
      edam:data_1385:
        text: edam:data_1385
        description: 'Alignment of multiple molecular sequences of different types.

          Hybrid sequence alignments include for example genomic DNA to EST, cDNA
          or mRNA.'
        title: Hybrid sequence alignment
      edam:data_1394:
        text: edam:data_1394
        description: A simple floating point number defining the penalty for opening
          or extending a gap in an alignment.
        title: Alignment score or penalty
      edam:data_1397:
        text: edam:data_1397
        description: A penalty for opening a gap in an alignment.
        title: Gap opening penalty
      edam:data_1398:
        text: edam:data_1398
        description: A penalty for extending a gap in an alignment.
        title: Gap extension penalty
      edam:data_1399:
        text: edam:data_1399
        description: A penalty for gaps that are close together in an alignment.
        title: Gap separation penalty
      edam:data_1401:
        text: edam:data_1401
        description: The score for a 'match' used in various sequence database search
          applications with simple scoring schemes.
        title: Match reward score
      edam:data_1402:
        text: edam:data_1402
        description: The score (penalty) for a 'mismatch' used in various alignment
          and sequence database search applications with simple scoring schemes.
        title: Mismatch penalty score
      edam:data_1403:
        text: edam:data_1403
        description: This is the threshold drop in score at which extension of word
          alignment is halted.
        title: Drop off score
      edam:data_1410:
        text: edam:data_1410
        description: A number defining the penalty for opening gaps at the termini
          of an alignment, either from the N/C terminal of protein or 5'/3' terminal
          of nucleotide sequences.
        title: Terminal gap opening penalty
      edam:data_1411:
        text: edam:data_1411
        description: A number defining the penalty for extending gaps at the termini
          of an alignment, either from the N/C terminal of protein or 5'/3' terminal
          of nucleotide sequences.
        title: Terminal gap extension penalty
      edam:data_1412:
        text: edam:data_1412
        description: Sequence identity is the number (%) of matches (identical characters)
          in positions from an alignment of two molecular sequences.
        title: Sequence identity
      edam:data_1413:
        text: edam:data_1413
        description: 'Data Type is float probably.

          Sequence similarity is the similarity (expressed as a percentage) of two
          molecular sequences calculated from their alignment, a scoring matrix for
          scoring characters substitutions and penalties for gap insertion and extension.'
        title: Sequence similarity
      edam:data_1426:
        text: edam:data_1426
        description: Continuous quantitative data that may be read during phylogenetic
          tree calculation.
        title: Phylogenetic continuous quantitative data
      edam:data_1427:
        text: edam:data_1427
        description: Character data with discrete states that may be read during phylogenetic
          tree calculation.
        title: Phylogenetic discrete data
      edam:data_1428:
        text: edam:data_1428
        description: One or more cliques of mutually compatible characters that are
          generated, for example from analysis of discrete character data, and are
          used to generate a phylogeny.
        title: Phylogenetic character cliques
      edam:data_1429:
        text: edam:data_1429
        description: Phylogenetic invariants data for testing alternative tree topologies.
        title: Phylogenetic invariants
      edam:data_1439:
        text: edam:data_1439
        description: A model of DNA substitution that explains a DNA sequence alignment,
          derived from phylogenetic tree analysis.
        title: DNA substitution model
      edam:data_1442:
        text: edam:data_1442
        description: Distances, such as Branch Score distance, between two or more
          phylogenetic trees.
        title: Phylogenetic tree distances
      edam:data_1444:
        text: edam:data_1444
        description: Independent contrasts for characters used in a phylogenetic tree,
          or covariances, regressions and correlations between characters for those
          contrasts.
        title: Phylogenetic character contrasts
      edam:data_1448:
        text: edam:data_1448
        description: Matrix of integer or floating point numbers for nucleotide comparison.
        title: Comparison matrix (nucleotide)
      edam:data_1449:
        text: edam:data_1449
        description: Matrix of integer or floating point numbers for amino acid comparison.
        title: Comparison matrix (amino acid)
      edam:data_1459:
        text: edam:data_1459
        description: 3D coordinate and associated data for a nucleic acid tertiary
          (3D) structure.
        title: Nucleic acid structure
      edam:data_1460:
        text: edam:data_1460
        description: 3D coordinate and associated data for a protein tertiary (3D)
          structure, or part of a structure, possibly in complex with other molecules.
        title: Protein structure
      edam:data_1461:
        text: edam:data_1461
        description: 'The structure of a protein in complex with a ligand, typically
          a small molecule such as an enzyme substrate or cofactor, but possibly another
          macromolecule.

          This includes interactions of proteins with atoms, ions and small molecules
          or macromolecules such as nucleic acids or other polypeptides. For stable
          inter-polypeptide interactions use ''Protein complex'' instead.'
        title: Protein-ligand complex
      edam:data_1462:
        text: edam:data_1462
        description: 3D coordinate and associated data for a carbohydrate (3D) structure.
        title: Carbohydrate structure
      edam:data_1463:
        text: edam:data_1463
        description: 3D coordinate and associated data for the (3D) structure of a
          small molecule, such as any common chemical compound.
        title: Small molecule structure
      edam:data_1464:
        text: edam:data_1464
        description: 3D coordinate and associated data for a DNA tertiary (3D) structure.
        title: DNA structure
      edam:data_1465:
        text: edam:data_1465
        description: 3D coordinate and associated data for an RNA tertiary (3D) structure.
        title: RNA structure
      edam:data_1466:
        text: edam:data_1466
        description: 3D coordinate and associated data for a tRNA tertiary (3D) structure,
          including tmRNA, snoRNAs etc.
        title: tRNA structure
      edam:data_1467:
        text: edam:data_1467
        description: 3D coordinate and associated data for the tertiary (3D) structure
          of a polypeptide chain.
        title: Protein chain
      edam:data_1468:
        text: edam:data_1468
        description: 3D coordinate and associated data for the tertiary (3D) structure
          of a protein domain.
        title: Protein domain
      edam:data_1470:
        text: edam:data_1470
        description: '3D coordinate and associated data for a protein tertiary (3D)
          structure (typically C-alpha atoms only).

          C-beta atoms from amino acid side-chains may be included.'
        title: C-alpha trace
      edam:data_1479:
        text: edam:data_1479
        description: Alignment (superimposition) of exactly two molecular tertiary
          (3D) structures.
        title: Structure alignment (pair)
      edam:data_1481:
        text: edam:data_1481
        description: Alignment (superimposition) of protein tertiary (3D) structures.
        title: Protein structure alignment
      edam:data_1482:
        text: edam:data_1482
        description: Alignment (superimposition) of nucleic acid tertiary (3D) structures.
        title: Nucleic acid structure alignment
      edam:data_1493:
        text: edam:data_1493
        description: Alignment (superimposition) of RNA tertiary (3D) structures.
        title: RNA structure alignment
      edam:data_1494:
        text: edam:data_1494
        description: Matrix to transform (rotate/translate) 3D coordinates, typically
          the transformation necessary to superimpose two molecular structures.
        title: Structural transformation matrix
      edam:data_1497:
        text: edam:data_1497
        description: Root-mean-square deviation (RMSD) is calculated to measure the
          average distance between superimposed macromolecular coordinates.
        title: Root-mean-square deviation
      edam:data_1498:
        text: edam:data_1498
        description: 'A ligand fingerprint is derived from ligand structural data
          from a Protein DataBank file. It reflects the elements or groups present
          or absent, covalent bonds and bond orders and the bonded environment in
          terms of SATIS codes and BLEEP atom types.

          A measure of the similarity between two ligand fingerprints.'
        title: Tanimoto similarity score
      edam:data_1499:
        text: edam:data_1499
        description: A matrix of 3D-1D scores reflecting the probability of amino
          acids to occur in different tertiary structural environments.
        title: 3D-1D scoring matrix
      edam:data_1501:
        text: edam:data_1501
        description: A table of 20 numerical values which quantify a property (e.g.
          physicochemical or biochemical) of the common amino acids.
        title: Amino acid index
      edam:data_1502:
        text: edam:data_1502
        description: Chemical classification (small, aliphatic, aromatic, polar, charged
          etc) of amino acids.
        title: Amino acid index (chemical classes)
      edam:data_1503:
        text: edam:data_1503
        description: Statistical protein contact potentials.
        title: Amino acid pair-wise contact potentials
      edam:data_1505:
        text: edam:data_1505
        description: Molecular weights of amino acids.
        title: Amino acid index (molecular weight)
      edam:data_1506:
        text: edam:data_1506
        description: Hydrophobic, hydrophilic or charge properties of amino acids.
        title: Amino acid index (hydropathy)
      edam:data_1507:
        text: edam:data_1507
        description: Experimental free energy values for the water-interface and water-octanol
          transitions for the amino acids.
        title: Amino acid index (White-Wimley data)
      edam:data_1508:
        text: edam:data_1508
        description: Van der Waals radii of atoms for different amino acid residues.
        title: Amino acid index (van der Waals radii)
      edam:data_1519:
        text: edam:data_1519
        description: 'List of molecular weight(s) of one or more proteins or peptides,
          for example cut by proteolytic enzymes or reagents.

          The report might include associated data such as frequency of peptide fragment
          molecular weights.'
        title: Peptide molecular weights
      edam:data_1520:
        text: edam:data_1520
        description: 'Hydrophobic moment is a peptides hydrophobicity measured for
          different angles of rotation.

          Report on the hydrophobic moment of a polypeptide sequence.'
        title: Peptide hydrophobic moment
      edam:data_1521:
        text: edam:data_1521
        description: 'The aliphatic index is the relative protein volume occupied
          by aliphatic side chains.

          The aliphatic index of a protein.'
        title: Protein aliphatic index
      edam:data_1522:
        text: edam:data_1522
        description: 'A protein sequence with annotation on hydrophobic or hydrophilic
          / charged regions, hydrophobicity plot etc.

          Hydrophobic moment is a peptides hydrophobicity measured for different angles
          of rotation.'
        title: Protein sequence hydropathy plot
      edam:data_1523:
        text: edam:data_1523
        description: A plot of the mean charge of the amino acids within a window
          of specified length as the window is moved along a protein sequence.
        title: Protein charge plot
      edam:data_1524:
        text: edam:data_1524
        description: The solubility or atomic solvation energy of a protein sequence
          or structure.
        title: Protein solubility
      edam:data_1525:
        text: edam:data_1525
        description: Data on the crystallizability of a protein sequence.
        title: Protein crystallizability
      edam:data_1526:
        text: edam:data_1526
        description: Data on the stability, intrinsic disorder or globularity of a
          protein sequence.
        title: Protein globularity
      edam:data_1527:
        text: edam:data_1527
        description: The titration curve of a protein.
        title: Protein titration curve
      edam:data_1528:
        text: edam:data_1528
        description: The isoelectric point of one proteins.
        title: Protein isoelectric point
      edam:data_1529:
        text: edam:data_1529
        description: The pKa value of a protein.
        title: Protein pKa value
      edam:data_1530:
        text: edam:data_1530
        description: The hydrogen exchange rate of a protein.
        title: Protein hydrogen exchange rate
      edam:data_1531:
        text: edam:data_1531
        description: The extinction coefficient of a protein.
        title: Protein extinction coefficient
      edam:data_1532:
        text: edam:data_1532
        description: The optical density of a protein.
        title: Protein optical density
      edam:data_1534:
        text: edam:data_1534
        description: 'An report on allergenicity / immunogenicity of peptides and
          proteins.

          This includes data on peptide ligands that elicit an immune response (immunogens),
          allergic cross-reactivity, predicted antigenicity (Hopp and Woods plot)
          etc. These data are useful in the development of peptide-specific antibodies
          or multi-epitope vaccines. Methods might use sequence data (for example
          motifs) and / or structural data.'
        title: Peptide immunogenicity data
      edam:data_1537:
        text: edam:data_1537
        description: A human-readable collection of information about one or more
          specific protein 3D structure(s) or structural domains.
        title: Protein structure report
      edam:data_1539:
        text: edam:data_1539
        description: 'Model validation might involve checks for atomic packing, steric
          clashes, agreement with electron density maps etc.

          Report on the quality of a protein three-dimensional model.'
        title: Protein structural quality report
      edam:data_1542:
        text: edam:data_1542
        description: 'Data on the solvent accessible or buried surface area of a protein
          structure.

          This concept covers definitions of the protein surface, interior and interfaces,
          accessible and buried residues, surface accessible pockets, interior inaccessible
          cavities etc.'
        title: Protein solvent accessibility
      edam:data_1544:
        text: edam:data_1544
        description: Phi/psi angle data or a Ramachandran plot of a protein structure.
        title: Ramachandran plot
      edam:data_1545:
        text: edam:data_1545
        description: Data on the net charge distribution (dipole moment) of a protein
          structure.
        title: Protein dipole moment
      edam:data_1546:
        text: edam:data_1546
        description: A matrix of distances between amino acid residues (for example
          the C-alpha atoms) in a protein structure.
        title: Protein distance matrix
      edam:data_1547:
        text: edam:data_1547
        description: An amino acid residue contact map for a protein structure.
        title: Protein contact map
      edam:data_1548:
        text: edam:data_1548
        description: Report on clusters of contacting residues in protein structures
          such as a key structural residue network.
        title: Protein residue 3D cluster
      edam:data_1549:
        text: edam:data_1549
        description: Patterns of hydrogen bonding in protein structures.
        title: Protein hydrogen bonds
      edam:data_1566:
        text: edam:data_1566
        description: An informative report on protein-ligand (small molecule) interaction(s).
        title: Protein-ligand interaction report
      edam:data_1583:
        text: edam:data_1583
        description: 'A melting (stability) profile calculated the free energy required
          to unwind and separate the nucleic acid strands, plotted for sliding windows
          over a sequence.

          Data on the dissociation characteristics of a double-stranded nucleic acid
          molecule (DNA or a DNA/RNA hybrid) during heating.

          Nucleic acid melting curve: a melting curve of a double-stranded nucleic
          acid molecule (DNA or DNA/RNA). Shows the proportion of nucleic acid which
          are double-stranded versus temperature.

          Nucleic acid probability profile: a probability profile of a double-stranded
          nucleic acid molecule (DNA or DNA/RNA). Shows the probability of a base
          pair not being melted (i.e. remaining as double-stranded DNA) at a specified
          temperature

          Nucleic acid stitch profile: stitch profile of hybridised or double stranded
          nucleic acid (DNA or RNA/DNA). A stitch profile diagram shows partly melted
          DNA conformations (with probabilities) at a range of temperatures. For example,
          a stitch profile might show possible loop openings with their location,
          size, probability and fluctuations at a given temperature.

          Nucleic acid temperature profile: a temperature profile of a double-stranded
          nucleic acid molecule (DNA or DNA/RNA). Plots melting temperature versus
          base position.'
        title: Nucleic acid melting profile
      edam:data_1584:
        text: edam:data_1584
        description: Enthalpy of hybridised or double stranded nucleic acid (DNA or
          RNA/DNA).
        title: Nucleic acid enthalpy
      edam:data_1585:
        text: edam:data_1585
        description: Entropy of hybridised or double stranded nucleic acid (DNA or
          RNA/DNA).
        title: Nucleic acid entropy
      edam:data_1588:
        text: edam:data_1588
        description: DNA base pair stacking energies data.
        title: DNA base pair stacking energies data
