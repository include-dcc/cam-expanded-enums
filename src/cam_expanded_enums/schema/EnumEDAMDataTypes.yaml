      edam:data_1859:
        text: edam:data_1859
        description: 'A cytogenetic map is built from a set of mutant cell lines with
          sub-chromosomal deletions and a reference wild-type line (''genome deletion
          panel''). The panel is used to map markers onto the genome by comparing
          mutant to wild-type banding patterns. Markers are linked (occur in the same
          deleted region) if they share the same banding pattern (presence or absence)
          as the deletion panel.

          A cytogenetic map showing chromosome banding patterns in mutant cell lines
          relative to the wild type.'
        title: Deletion map
      edam:data_1860:
        text: edam:data_1860
        description: A genetic map which shows the approximate location of quantitative
          trait loci (QTL) between two or more markers.
        title: QTL map
      edam:data_1863:
        text: edam:data_1863
        description: A map of haplotypes in a genome or other sequence, describing
          common patterns of genetic variation.
        title: Haplotype map
      edam:data_1867:
