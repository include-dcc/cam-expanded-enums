        description: Identifier of a gene from the KOME database.
        title: Gene ID (KOME)
      edam:data_1908:
        text: edam:data_1908
        description: Identifier of a locus from the Tropgene database.
        title: Locus ID (Tropgene)
      edam:data_1916:
        text: edam:data_1916
        description: An alignment of molecular sequences, structures or profiles derived
          from them.
        title: Alignment
      edam:data_1917:
        text: edam:data_1917
        description: Data for an atom (in a molecular structure).
        title: Atomic property
      edam:data_2007:
        text: edam:data_2007
        description: A word or phrase that can appear in the keywords field (KW line)
          of entries from the UniProt database.
        title: UniProt keyword
      edam:data_2012:
        text: edam:data_2012
        description: 'A position in a map (for example a genetic map), either a single
          position (point) or a region / interval.

          This includes positions in genomes based on a reference sequence. A position
          may be specified for any mappable object, i.e. anything that may have positional
          information such as a physical position in a chromosome. Data might include
          sequence region name, strand, coordinate system name, assembly name, start
          position and end position.'
        title: Sequence coordinates
      edam:data_2016:
        text: edam:data_2016
        description: Data concerning the intrinsic physical (e.g. structural) or chemical
          properties of one, more or all amino acids.
        title: Amino acid property
      edam:data_2019:
        text: edam:data_2019
        description: Data describing a molecular map (genetic or physical) or a set
          of such maps, including various attributes of, data extracted from or derived
          from the analysis of them, but excluding the map(s) themselves. This includes
          metadata for map sets that share a common set of features which are mapped.
        title: Map data
      edam:data_2024:
        text: edam:data_2024
        description: 'Data concerning chemical reaction(s) catalysed by enzyme(s).

          This is a broad data type and is used a placeholder for other, more specific
          types.'
        title: Enzyme kinetics data
      edam:data_2025:
        text: edam:data_2025
        description: A plot giving an approximation of the kinetics of an enzyme-catalysed
          reaction, assuming simple kinetics (i.e. no intermediate or product inhibition,
          allostericity or cooperativity). It plots initial reaction rate to the substrate
          concentration (S) from which the maximum rate (vmax) is apparent.
        title: Michaelis Menten plot
      edam:data_2026:
        text: edam:data_2026
        description: A plot based on the Michaelis Menten equation of enzyme kinetics
          plotting the ratio of the initial substrate concentration (S) against the
          reaction velocity (v).
        title: Hanes Woolf plot
      edam:data_2042:
        text: edam:data_2042
        description: Typically a human-readable summary of body of facts or information
          indicating why a statement is true or valid. This may include a computational
          prediction, laboratory experiment, literature reference etc.
        title: Evidence
      edam:data_2044:
        text: edam:data_2044
        description: 'One or more molecular sequences, possibly with associated annotation.

          This concept is a placeholder of concepts for primary sequence data including
          raw sequences and sequence records. It should not normally be used for derivatives
          such as sequence alignments, motifs or profiles.'
        title: Sequence
      edam:data_2048:
        text: edam:data_2048
        description: 'A human-readable collection of information including annotation
          on a biological entity or phenomena, computer-generated reports of analysis
          of primary data (e.g. sequence or structural), and metadata (data about
          primary data) or any other free (essentially unformatted) text, as distinct
          from the primary data itself.

          You can use this term by default for any textual report, in case you can''t
          find another, more specific term. Reports may be generated automatically
          or collated by hand and can include metadata on the origin, source, history,
          ownership or location of some thing.'
        title: Report
      edam:data_2050:
        text: edam:data_2050
        description: General data for a molecule.
        title: Molecular property (general)
      edam:data_2070:
        text: edam:data_2070
        description: A nucleotide sequence motif.
        title: Sequence motif (nucleic acid)
      edam:data_2071:
        text: edam:data_2071
        description: An amino acid sequence motif.
        title: Sequence motif (protein)
      edam:data_2080:
        text: edam:data_2080
        description: A report of hits from searching a database of some type.
        title: Database search results
      edam:data_2082:
        text: edam:data_2082
        description: 'An array of numerical values.

          This is a broad data type and is used a placeholder for other, more specific
          types.'
        title: Matrix
      edam:data_2084:
        text: edam:data_2084
        description: A human-readable collection of information about one or more
          specific nucleic acid molecules.
        title: Nucleic acid report
      edam:data_2085:
        text: edam:data_2085
        description: A human-readable collection of information about one or more
          molecular tertiary (3D) structures. It might include annotation on the structure,
          a computer-generated report of analysis of structural data, and metadata
          (data about primary data) or any other free (essentially unformatted) text,
          as distinct from the primary data itself.
        title: Structure report
      edam:data_2087:
        text: edam:data_2087
        description: A report on the physical (e.g. structural) or chemical properties
          of molecules, or parts of a molecule.
        title: Molecular property
      edam:data_2088:
        text: edam:data_2088
        description: Structural data for DNA base pairs or runs of bases, such as
          energy or angle data.
        title: DNA base structural data
      edam:data_2091:
        text: edam:data_2091
        description: A persistent (stable) and unique identifier, typically identifying
          an object (entry) from a database.
        title: Accession
      edam:data_2093:
        text: edam:data_2093
        description: 'A list of database accessions or identifiers are usually included.

          Reference to a dataset (or a cross-reference between two datasets), typically
          one or more entries in a biological database or ontology.'
        title: Data reference
      edam:data_2098:
        text: edam:data_2098
        description: An identifier of a submitted job.
        title: Job identifier
      edam:data_2099:
