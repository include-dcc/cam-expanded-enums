        description: A unique identifier of a protein or gene used in the iHOP database.
        title: iHOP symbol
      edam:data_1893:
        text: edam:data_1893
        description: A unique name or other identifier of a genetic locus, typically
          conforming to a scheme that names loci (such as predicted genes) depending
          on their position in a molecular sequence, for example a completely sequenced
          genome or chromosome.
        title: Locus ID
      edam:data_1895:
        text: edam:data_1895
        description: Locus identifier for Arabidopsis Genome Initiative (TAIR, TIGR
          and MIPS databases).
        title: Locus ID (AGI)
      edam:data_1896:
        text: edam:data_1896
        description: Identifier for loci from ASPGD (Aspergillus Genome Database).
        title: Locus ID (ASPGD)
      edam:data_1897:
        text: edam:data_1897
        description: Identifier for loci from Magnaporthe grisea Database at the Broad
          Institute.
        title: Locus ID (MGG)
      edam:data_1898:
        text: edam:data_1898
        description: Identifier for loci from CGD (Candida Genome Database).
        title: Locus ID (CGD)
      edam:data_1899:
        text: edam:data_1899
        description: Locus identifier for Comprehensive Microbial Resource at the
          J. Craig Venter Institute.
        title: Locus ID (CMR)
      edam:data_1900:
        text: edam:data_1900
        description: Identifier for loci from NCBI database.
        title: NCBI locus tag
      edam:data_1901:
        text: edam:data_1901
        description: Identifier for loci from SGD (Saccharomyces Genome Database).
        title: Locus ID (SGD)
      edam:data_1902:
        text: edam:data_1902
        description: Identifier of loci from Maize Mapping Project.
