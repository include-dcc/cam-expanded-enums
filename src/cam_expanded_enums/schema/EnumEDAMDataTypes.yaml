          so on.
        title: File format name
      edam:data_2131:
        text: edam:data_2131
        description: Name of a computer operating system such as Linux, PC or Mac.
        title: Operating system name
      edam:data_2133:
        text: edam:data_2133
        description: A logical operator such as OR, AND, XOR, and NOT.
