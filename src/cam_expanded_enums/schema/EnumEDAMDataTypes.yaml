        title: Monosaccharide accession
        description: Accession of a monosaccharide (catalogued in a database).
        meaning: edam:data_2898
      edam:data_2899:
        title: Drug name
        description: Common name of a drug.
        meaning: edam:data_2899
      edam:data_2900:
        title: Carbohydrate accession
        description: Accession of an entry from a database of carbohydrates.
        meaning: edam:data_2900
      edam:data_2901:
        title: Molecule accession
        description: Accession of a specific molecule (catalogued in a database).
        meaning: edam:data_2901
      edam:data_2902:
        title: Data resource definition accession
        description: Accession of a data definition (catalogued in a database).
        meaning: edam:data_2902
      edam:data_2903:
        title: Genome accession
        description: An accession of a particular genome (in a database).
        meaning: edam:data_2903
      edam:data_2904:
        title: Map accession
        description: An accession of a map of a molecular sequence (deposited in a
          database).
        meaning: edam:data_2904
      edam:data_2905:
        title: Lipid accession
        description: Accession of an entry from a database of lipids.
        meaning: edam:data_2905
      edam:data_2906:
        title: Peptide ID
        description: Accession of a peptide deposited in a database.
        meaning: edam:data_2906
      edam:data_2907:
        title: Protein accession
        description: Accession of a protein deposited in a database.
        meaning: edam:data_2907
      edam:data_2908:
        title: Organism accession
        description: An accession of annotation on a (group of) organisms (catalogued
          in a database).
        meaning: edam:data_2908
      edam:data_2909:
        title: Organism name
        description: The name of an organism (or group of organisms).
        meaning: edam:data_2909
      edam:data_2910:
        title: Protein family accession
        description: Accession of a protein family (that is deposited in a database).
        meaning: edam:data_2910
      edam:data_2911:
        title: Transcription factor accession
        description: Accession of an entry from a database of transcription factors
          or binding sites.
        meaning: edam:data_2911
      edam:data_2912:
        title: Strain accession
        description: Accession number of a strain of an organism variant, typically
          a plant, virus or bacterium.
        meaning: edam:data_2912
      edam:data_2914:
        title: Sequence features metadata
        description: Metadata on sequence features.
        meaning: edam:data_2914
      edam:data_2915:
        title: Gramene identifier
        description: Identifier of a Gramene database entry.
        meaning: edam:data_2915
      edam:data_2916:
        title: DDBJ accession
        description: An identifier of an entry from the DDBJ sequence database.
        meaning: edam:data_2916
      edam:data_2917:
        title: ConsensusPathDB identifier
        description: An identifier of an entity from the ConsensusPathDB database.
        meaning: edam:data_2917
      edam:data_2955:
        title: Sequence report
        description: An informative report of information about molecular sequence(s),
          including basic information (metadata), and reports generated from molecular
          sequence analysis, including positional features and non-positional properties.
        meaning: edam:data_2955
      edam:data_2956:
        title: Protein secondary structure
        description: Data concerning the properties or features of one or more protein
          secondary structures.
        meaning: edam:data_2956
      edam:data_2957:
        title: Hopp and Woods plot
        description: A Hopp and Woods plot of predicted antigenicity of a peptide
          or protein.
        meaning: edam:data_2957
      edam:data_2968:
        title: Image
        description: Data (typically biological or biomedical) that has been rendered
          into an image, typically for display on screen.
        meaning: edam:data_2968
      edam:data_2969:
        title: Sequence image
        description: Image of a molecular sequence, possibly with sequence features
          or properties shown.
        meaning: edam:data_2969
      edam:data_2970:
        title: Protein hydropathy data
        description: A report on protein properties concerning hydropathy.
        meaning: edam:data_2970
      edam:data_2976:
        title: Protein sequence
        description: One or more protein sequences, possibly with associated annotation.
        meaning: edam:data_2976
      edam:data_2977:
        title: Nucleic acid sequence
        description: One or more nucleic acid sequences, possibly with associated
          annotation.
        meaning: edam:data_2977
      edam:data_2978:
        title: Reaction data
        description: 'Data concerning a biochemical reaction, typically data and more
          general annotation on the kinetics of enzyme-catalysed reaction.

          This is a broad data type and is used a placeholder for other, more specific
          types.'
        meaning: edam:data_2978
      edam:data_2979:
        title: Peptide property
        description: Data concerning small peptides.
        meaning: edam:data_2979
      edam:data_2984:
        title: Pathway or network report
        description: An informative report concerning or derived from the analysis
          of a biological pathway or network, such as a map (diagram) or annotation.
        meaning: edam:data_2984
      edam:data_2985:
        title: Nucleic acid thermodynamic data
        description: A thermodynamic or kinetic property of a nucleic acid molecule.
        meaning: edam:data_2985
      edam:data_2991:
        title: Protein geometry data
        description: Geometry data for a protein structure, for example bond lengths,
          bond angles, torsion angles, chiralities, planaraties etc.
        meaning: edam:data_2991
      edam:data_2992:
        title: Protein structure image
        description: An image of protein structure.
        meaning: edam:data_2992
      edam:data_2994:
        title: Phylogenetic character weights
        description: Weights for sequence positions or characters in phylogenetic
          analysis where zero is defined as unweighted.
        meaning: edam:data_2994
      edam:data_3002:
        title: Annotation track
        description: Annotation of one particular positional feature on a biomolecular
          (typically genome) sequence, suitable for import and display in a genome
          browser.
        meaning: edam:data_3002
      edam:data_3021:
        title: UniProt accession
        description: Accession number of a UniProt (protein sequence) database entry.
        meaning: edam:data_3021
      edam:data_3022:
        title: NCBI genetic code ID
        description: Identifier of a genetic code in the NCBI list of genetic codes.
        meaning: edam:data_3022
      edam:data_3025:
        title: Ontology concept identifier
        description: Identifier of a concept in an ontology of biological or bioinformatics
          concepts and relations.
        meaning: edam:data_3025
      edam:data_3028:
        title: Taxonomy
        description: 'Data concerning the classification, identification and naming
          of organisms.

          This is a broad data type and is used a placeholder for other, more specific
          types.'
        meaning: edam:data_3028
      edam:data_3029:
        title: Protein ID (EMBL/GenBank/DDBJ)
        description: 'EMBL/GENBANK/DDBJ coding feature protein identifier, issued
          by International collaborators.

          This qualifier consists of a stable ID portion (3+5 format with 3 position
          letters and 5 numbers) plus a version number after the decimal point. When
          the protein sequence encoded by the CDS changes, only the version number
          of the /protein_id value is incremented; the stable part of the /protein_id
          remains unchanged and as a result will permanently be associated with a
          given protein; this qualifier is valid only on CDS features which translate
          into a valid protein.'
        meaning: edam:data_3029
      edam:data_3034:
        title: Sequence feature identifier
        description: Name or other identifier of molecular sequence feature(s).
        meaning: edam:data_3034
      edam:data_3035:
        title: Structure identifier
        description: An identifier of a molecular tertiary structure, typically an
          entry from a structure database.
        meaning: edam:data_3035
      edam:data_3036:
        title: Matrix identifier
        description: An identifier of an array of numerical values, such as a comparison
          matrix.
        meaning: edam:data_3036
      edam:data_3103:
        title: ATC code
        description: Unique identifier of a drug conforming to the Anatomical Therapeutic
          Chemical (ATC) Classification System, a drug classification system controlled
          by the WHO Collaborating Centre for Drug Statistics Methodology (WHOCC).
        meaning: edam:data_3103
      edam:data_3104:
        title: UNII
        description: A unique, unambiguous, alphanumeric identifier of a chemical
          substance as catalogued by the Substance Registration System of the Food
          and Drug Administration (FDA).
        meaning: edam:data_3104
      edam:data_3106:
        title: System metadata
        description: Metadata concerning the software, hardware or other aspects of
          a computer system.
        meaning: edam:data_3106
      edam:data_3108:
        title: Experimental measurement
        description: 'Raw data such as measurements or other results from laboratory
          experiments, as generated from laboratory hardware.

          This is a broad data type and is used a placeholder for other, more specific
          types. It is primarily intended to help navigation of EDAM and would not
          typically be used for annotation.'
        meaning: edam:data_3108
      edam:data_3110:
        title: Raw microarray data
        description: 'Raw data (typically MIAME-compliant) for hybridisations from
          a microarray experiment.

          Such data as found in Affymetrix CEL or GPR files.'
        meaning: edam:data_3110
      edam:data_3111:
        title: Processed microarray data
        description: 'Data generated from processing and analysis of probe set data
          from a microarray experiment.

          Such data as found in Affymetrix .CHP files or data from other software
          such as RMA or dChip.'
        meaning: edam:data_3111
      edam:data_3112:
        title: Gene expression matrix
        description: 'The final processed (normalised) data for a set of hybridisations
          in a microarray experiment.

          This combines data from all hybridisations.'
        meaning: edam:data_3112
      edam:data_3113:
        title: Sample annotation
        description: 'Annotation on a biological sample, for example experimental
          factors and their values.

          This might include compound and dose in a dose response experiment.'
        meaning: edam:data_3113
      edam:data_3115:
        title: Microarray metadata
        description: 'Annotation on the array itself used in a microarray experiment.

          This might include gene identifiers, genomic coordinates, probe oligonucleotide
          sequences etc.'
        meaning: edam:data_3115
      edam:data_3117:
        title: Microarray hybridisation data
        description: Data concerning the hybridisations measured during a microarray
          experiment.
        meaning: edam:data_3117
      edam:data_3128:
        title: Nucleic acid structure report
        description: 'A human-readable collection of information about regions within
          a nucleic acid sequence which form secondary or tertiary (3D) structures.

          The report may be based on analysis of nucleic acid sequence or structural
          data, or any annotation or information about specific nucleic acid 3D structure(s)
          or such structures in general.'
        meaning: edam:data_3128
      edam:data_3134:
        title: Gene transcript report
        description: 'An informative report on features of a messenger RNA (mRNA)
          molecules including precursor RNA, primary (unprocessed) transcript and
          fully processed molecules. This includes reports on a specific gene transcript,
          clone or EST.

          This includes 5''untranslated region (5''UTR), coding sequences (CDS), exons,
          intervening sequences (intron) and 3''untranslated regions (3''UTR).'
        meaning: edam:data_3134
      edam:data_3148:
        title: Gene family report
        description: 'A human-readable collection of information about a particular
          family of genes, typically a set of genes with similar sequence that originate
          from duplication of a common ancestor gene, or any other classification
          of nucleic acid sequences or structures that reflects gene structure.

          This includes reports on on gene homologues between species.'
        meaning: edam:data_3148
      edam:data_3153:
        title: Protein image
        description: An image of a protein.
        meaning: edam:data_3153
      edam:data_3181:
        title: Sequence assembly report
        description: 'An informative report about a DNA sequence assembly.

          This might include an overall quality assessment of the assembly and summary
          statistics including counts, average length and number of bases for reads,
          matches and non-matches, contigs, reads in pairs etc.'
        meaning: edam:data_3181
      edam:data_3210:
        title: Genome index
        description: 'An index of a genome sequence.

          Many sequence alignment tasks involving many or very large sequences rely
          on a precomputed index of the sequence to accelerate the alignment.'
        meaning: edam:data_3210
      edam:data_3236:
        title: Cytoband position
        description: 'Information might include start and end position in a chromosome
          sequence, chromosome identifier, name of band and so on.

          The position of a cytogenetic band in a genome.'
        meaning: edam:data_3236
      edam:data_3238:
        title: Cell type ontology ID
        description: Cell type ontology concept ID.
        meaning: edam:data_3238
      edam:data_3241:
        title: Kinetic model
        description: Mathematical model of a network, that contains biochemical kinetics.
        meaning: edam:data_3241
      edam:data_3264:
        title: COSMIC ID
        description: Identifier of a COSMIC database entry.
        meaning: edam:data_3264
      edam:data_3265:
        title: HGMD ID
        description: Identifier of a HGMD database entry.
        meaning: edam:data_3265
      edam:data_3266:
        title: Sequence assembly ID
        description: Unique identifier of sequence assembly.
        meaning: edam:data_3266
      edam:data_3270:
        title: Ensembl gene tree ID
        description: Unique identifier for a gene tree from the Ensembl database.
        meaning: edam:data_3270
      edam:data_3271:
        title: Gene tree
        description: A phylogenetic tree that is an estimate of the character's phylogeny.
        meaning: edam:data_3271
      edam:data_3272:
        title: Species tree
        description: A phylogenetic tree that reflects phylogeny of the taxa from
          which the characters (used in calculating the tree) were sampled.
        meaning: edam:data_3272
      edam:data_3273:
        title: Sample ID
        description: Name or other identifier of an entry from a biosample database.
        meaning: edam:data_3273
      edam:data_3274:
        title: MGI accession
        description: Identifier of an object from the MGI database.
        meaning: edam:data_3274
      edam:data_3275:
        title: Phenotype name
        description: Name of a phenotype.
        meaning: edam:data_3275
      edam:data_3354:
        title: Transition matrix
        description: 'A HMM transition matrix contains the probabilities of switching
          from one HMM state to another.

          Consider for example an HMM with two states (AT-rich and GC-rich). The transition
          matrix will hold the probabilities of switching from the AT-rich to the
          GC-rich state, and vica versa.'
        meaning: edam:data_3354
      edam:data_3355:
        title: Emission matrix
        description: 'A HMM emission matrix holds the probabilities of choosing the
          four nucleotides (A, C, G and T) in each of the states of a HMM.

          Consider for example an HMM with two states (AT-rich and GC-rich). The emission
          matrix holds the probabilities of choosing each of the four nucleotides
          (A, C, G and T) in the AT-rich state and in the GC-rich state.'
        meaning: edam:data_3355
      edam:data_3358:
        title: Format identifier
        description: An identifier of a data format.
        meaning: edam:data_3358
      edam:data_3424:
        title: Raw image
        description: Raw biological or biomedical image generated by some experimental
          technique.
        meaning: edam:data_3424
      edam:data_3425:
        title: Carbohydrate property
        description: Data concerning the intrinsic physical (e.g. structural) or chemical
          properties of one, more or all carbohydrates.
        meaning: edam:data_3425
      edam:data_3442:
        title: MRI image
        description: An imaging technique that uses magnetic fields and radiowaves
          to form images, typically to investigate the anatomy and physiology of the
          human body.
        meaning: edam:data_3442
      edam:data_3449:
        title: Cell migration track image
        description: An image from a cell migration track assay.
        meaning: edam:data_3449
      edam:data_3451:
        title: Rate of association
        description: Rate of association of a protein with another protein or some
          other molecule.
        meaning: edam:data_3451
      edam:data_3479:
        title: Gene order
        description: 'Multiple gene identifiers in a specific order.

          Such data are often used for genome rearrangement tools and phylogenetic
          tree labeling.'
        meaning: edam:data_3479
      edam:data_3483:
        title: Spectrum
        description: The spectrum of frequencies of electromagnetic radiation emitted
          from a molecule as a result of some spectroscopy experiment.
        meaning: edam:data_3483
      edam:data_3488:
        title: NMR spectrum
        description: Spectral information for a molecule from a nuclear magnetic resonance
          experiment.
        meaning: edam:data_3488
      edam:data_3492:
        title: Nucleic acid signature
        description: An informative report about a specific or conserved nucleic acid
          sequence pattern.
        meaning: edam:data_3492
      edam:data_3494:
        title: DNA sequence
        description: A DNA sequence.
        meaning: edam:data_3494
      edam:data_3495:
        title: RNA sequence
        description: An RNA sequence.
        meaning: edam:data_3495
      edam:data_3498:
        title: Sequence variations
        description: 'Data on gene sequence variations resulting large-scale genotyping
          and DNA sequencing projects.

          Variations are stored along with a reference genome.'
        meaning: edam:data_3498
      edam:data_3505:
        title: Bibliography
        description: A list of publications such as scientic papers or books.
        meaning: edam:data_3505
      edam:data_3509:
        title: Ontology mapping
        description: A mapping of supplied textual terms or phrases to ontology concepts
          (URIs).
        meaning: edam:data_3509
      edam:data_3546:
        title: Image metadata
        description: 'Any data concerning a specific biological or biomedical image.

          This can include basic provenance and technical information about the image,
          scientific annotation and so on.'
        meaning: edam:data_3546
      edam:data_3558:
        title: Clinical trial report
        description: A human-readable collection of information concerning a clinical
          trial.
        meaning: edam:data_3558
      edam:data_3567:
        title: Reference sample report
        description: A report about a biosample.
        meaning: edam:data_3567
      edam:data_3568:
        title: Gene Expression Atlas Experiment ID
        description: Accession number of an entry from the Gene Expression Atlas.
        meaning: edam:data_3568
      edam:data_3667:
        title: Disease identifier
        description: Identifier of an entry from a database of disease.
        meaning: edam:data_3667
      edam:data_3668:
        title: Disease name
        description: The name of some disease.
        meaning: edam:data_3668
      edam:data_3669:
        title: Learning material
        description: Learning material is a document or another digital object that
          is designed for learning (educational, training) purposes.
        meaning: edam:data_3669
      edam:data_3670:
        title: Online course
        description: A training course available for use on the Web.
        meaning: edam:data_3670
      edam:data_3671:
        title: Text
        description: Any free or plain text, typically for human consumption and in
          English. Can instantiate also as a textual search query.
        meaning: edam:data_3671
      edam:data_3707:
        title: Biodiversity data
        description: Machine-readable biodiversity data.
        meaning: edam:data_3707
      edam:data_3716:
        title: Biosafety report
        description: A human-readable collection of information concerning biosafety
          data.
        meaning: edam:data_3716
      edam:data_3717:
        title: Isolation report
        description: A report about any kind of isolation of biological material.
        meaning: edam:data_3717
      edam:data_3718:
        title: Pathogenicity report
        description: Information about the ability of an organism to cause disease
          in a corresponding host.
        meaning: edam:data_3718
      edam:data_3719:
        title: Biosafety classification
        description: Information about the biosafety classification of an organism
          according to corresponding law.
        meaning: edam:data_3719
      edam:data_3720:
        title: Geographic location
        description: A report about localisation of the isolaton of biological material
          e.g. country or coordinates.
        meaning: edam:data_3720
      edam:data_3721:
        title: Isolation source
        description: A report about any kind of isolation source of biological material
          e.g. blood, water, soil.
        meaning: edam:data_3721
      edam:data_3722:
        title: Physiology parameter
        description: Experimentally determined parameter of the physiology of an organism,
          e.g. substrate spectrum.
        meaning: edam:data_3722
      edam:data_3723:
        title: Morphology parameter
        description: Experimentally determined parameter of the morphology of an organism,
          e.g. size & shape.
        meaning: edam:data_3723
      edam:data_3724:
        title: Cultivation parameter
        description: Experimental determined parameter for the cultivation of an organism.
        meaning: edam:data_3724
      edam:data_3732:
        title: Sequencing metadata name
        description: Data concerning a sequencing experiment, that may be specified
          as an input to some tool.
        meaning: edam:data_3732
      edam:data_3733:
        title: Flow cell identifier
        description: 'A flow cell is used to immobilise, amplify and sequence millions
          of molecules at once. In Illumina machines, a flowcell is composed of 8
          "lanes" which allows 8 experiments in a single analysis.

          An identifier of a flow cell of a sequencing machine.'
        meaning: edam:data_3733
      edam:data_3734:
        title: Lane identifier
        description: An identifier of a lane within a flow cell of a sequencing machine,
          within which millions of sequences are immobilised, amplified and sequenced.
        meaning: edam:data_3734
      edam:data_3735:
        title: Run number
        description: A number corresponding to the number of an analysis performed
          by a sequencing machine. For example, if it's the 13th analysis, the run
          is 13.
        meaning: edam:data_3735
      edam:data_3736:
        title: Ecological data
        description: 'Data concerning ecology; for example measurements and reports
          from the study of interactions among organisms and their environment.

          This is a broad data type and is used a placeholder for other, more specific
          types.'
        meaning: edam:data_3736
      edam:data_3737:
        title: Alpha diversity data
        description: The mean species diversity in sites or habitats at a local scale.
        meaning: edam:data_3737
      edam:data_3738:
        title: Beta diversity data
        description: The ratio between regional and local species diversity.
        meaning: edam:data_3738
      edam:data_3739:
        title: Gamma diversity data
        description: The total species diversity in a landscape.
        meaning: edam:data_3739
      edam:data_3743:
        title: Ordination plot
        description: A plot in which community data (e.g. species abundance data)
          is summarised. Similar species and samples are plotted close together, and
          dissimilar species and samples are plotted placed far apart.
        meaning: edam:data_3743
      edam:data_3753:
        title: Over-representation data
        description: A ranked list of categories (usually ontology concepts), each
          associated with a statistical metric of over-/under-representation within
          the studied data.
        meaning: edam:data_3753
      edam:data_3754:
        title: GO-term enrichment data
        description: A ranked list of Gene Ontology concepts, each associated with
          a p-value, concerning or derived from the analysis of e.g. a set of genes
          or proteins.
        meaning: edam:data_3754
      edam:data_3756:
        title: Localisation score
        description: Score for localization of one or more post-translational modifications
          in peptide sequence measured by mass spectrometry.
        meaning: edam:data_3756
      edam:data_3757:
        title: Unimod ID
        description: Identifier of a protein modification catalogued in the Unimod
          database.
        meaning: edam:data_3757
      edam:data_3759:
        title: ProteomeXchange ID
        description: Identifier for mass spectrometry proteomics data in the proteomexchange.org
          repository.
        meaning: edam:data_3759
      edam:data_3768:
        title: Clustered expression profiles
        description: Groupings of expression profiles according to a clustering algorithm.
        meaning: edam:data_3768
      edam:data_3769:
        title: BRENDA ontology concept ID
        description: An identifier of a concept from the BRENDA ontology.
        meaning: edam:data_3769
      edam:data_3779:
        title: Annotated text
        description: A text (such as a scientific article), annotated with notes,
          data and metadata, such as recognised entities, concepts, and their relations.
        meaning: edam:data_3779
      edam:data_3786:
        title: Query script
        description: A structured query, in form of a script, that defines a database
          search task.
        meaning: edam:data_3786
      edam:data_3805:
        title: 3D EM Map
        description: Structural 3D model (volume map) from electron microscopy.
        meaning: edam:data_3805
      edam:data_3806:
        title: 3D EM Mask
        description: Annotation on a structural 3D EM Map from electron microscopy.
          This might include one or several locations in the map of the known features
          of a particular macromolecule.
        meaning: edam:data_3806
      edam:data_3807:
        title: EM Movie
        description: Raw DDD movie acquisition from electron microscopy.
        meaning: edam:data_3807
      edam:data_3808:
        title: EM Micrograph
        description: Raw acquisition from electron microscopy or average of an aligned
          DDD movie.
        meaning: edam:data_3808
      edam:data_3842:
        title: Molecular simulation data
        description: 'Data coming from molecular simulations, computer "experiments"
          on model molecules.

          Typically formed by two separated but indivisible pieces of information:
          topology data (static) and trajectory data (dynamic).'
        meaning: edam:data_3842
      edam:data_3856:
        title: RNA central ID
        description: 'Identifier of an entry from the RNA central database of annotated
          human miRNAs.

          There are canonical and taxon-specific forms of RNAcentral ID. Canonical
          form e.g. urs_9or10digits identifies an RNA sequence (within the RNA central
          database) which may appear in multiple sequences. Taxon-specific form identifies
          a sequence in the specific taxon (e.g. urs_9or10digits_taxonID).'
        meaning: edam:data_3856
      edam:data_3861:
        title: Electronic health record
        description: A human-readable systematic collection of patient (or population)
          health information in a digital format.
        meaning: edam:data_3861
      edam:data_3869:
        title: Simulation
        description: 'Data coming from molecular simulations, computer "experiments"
          on model molecules. Typically formed by two separated but indivisible pieces
          of information: topology data (static) and trajectory data (dynamic).'
        meaning: edam:data_3869
      edam:data_3870:
        title: Trajectory data
        description: 'Dynamic information of a structure molecular system coming from
          a molecular simulation: XYZ 3D coordinates (sometimes with their associated
          velocities) for every atom along time.'
        meaning: edam:data_3870
      edam:data_3871:
        title: Forcefield parameters
        description: 'Force field parameters: charges, masses, radii, bond lengths,
          bond dihedrals, etc. define the structural molecular system, and are essential
          for the proper description and simulation of a molecular system.'
        meaning: edam:data_3871
      edam:data_3872:
        title: Topology data
        description: 'Static information of a structure molecular system that is needed
          for a molecular simulation: the list of atoms, their non-bonded parameters
          for Van der Waals and electrostatic interactions, and the complete connectivity
          in terms of bonds, angles and dihedrals.'
        meaning: edam:data_3872
      edam:data_3905:
        title: Histogram
        description: Visualization of distribution of quantitative data, e.g. expression
          data, by histograms, violin plots and density plots.
        meaning: edam:data_3905
      edam:data_3914:
        title: Quality control report
        description: Report of the quality control review that was made of factors
          involved in a procedure.
        meaning: edam:data_3914
      edam:data_3917:
        title: Count matrix
        description: A table of unnormalized values representing summarised read counts
          per genomic region (e.g. gene, transcript, peak).
        meaning: edam:data_3917
      edam:data_3924:
        title: DNA structure alignment
        description: Alignment (superimposition) of DNA tertiary (3D) structures.
        meaning: edam:data_3924
      edam:data_3932:
        title: Q-value
        description: 'A score derived from the P-value to ensure correction for multiple
          tests. The Q-value provides an estimate of the positive False Discovery
          Rate (pFDR), i.e. the rate of false positives among all the cases reported
          positive: pFDR = FP / (FP + TP).

          Q-values are widely used in high-throughput data analysis (e.g. detection
          of differentially expressed genes from transcriptome data).'
        meaning: edam:data_3932
      edam:data_3949:
        title: Profile HMM
        description: A profile HMM is a variant of a Hidden Markov model that is derived
          specifically from a set of (aligned) biological sequences. Profile HMMs
          provide the basis for a position-specific scoring system, which can be used
          to align sequences and search databases for related sequences.
        meaning: edam:data_3949
      edam:data_3952:
        title: Pathway ID (WikiPathways)
        description: Identifier of a pathway from the WikiPathways pathway database.
        meaning: edam:data_3952
      edam:data_3953:
        title: Pathway overrepresentation data
        description: A ranked list of pathways, each associated with z-score, p-value
          or similar, concerning or derived from the analysis of e.g. a set of genes
          or proteins.
        meaning: edam:data_3953
      edam:data_4022:
        title: ORCID Identifier
        description: Identifier of a researcher registered with the ORCID database.
          Used to identify author IDs.
        meaning: edam:data_4022
      edam:data_4040:
        title: Data management plan
        description: Data management plan is a document describing the data management
          of a project or an organisation, including acquisition, reuse, structure,
          processing, storage, documentation, sharing, and preservation of data. This
          may include budgeting for these operations.
        meaning: edam:data_4040
