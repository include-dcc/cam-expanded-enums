        title: QSAR descriptor (constitutional)
        description: A QSAR constitutional descriptor.
        meaning: edam:data_1201
      edam:data_1202:
        title: QSAR descriptor (electronic)
        description: A QSAR electronic descriptor.
        meaning: edam:data_1202
      edam:data_1203:
        title: QSAR descriptor (geometrical)
        description: A QSAR geometrical descriptor.
        meaning: edam:data_1203
      edam:data_1204:
        title: QSAR descriptor (topological)
        description: A QSAR topological descriptor.
        meaning: edam:data_1204
      edam:data_1205:
        title: QSAR descriptor (molecular)
        description: A QSAR molecular descriptor.
        meaning: edam:data_1205
      edam:data_1233:
        title: Sequence set (protein)
        description: Any collection of multiple protein sequences and associated metadata
          that do not (typically) correspond to common sequence database records or
          database entries.
        meaning: edam:data_1233
      edam:data_1234:
        title: Sequence set (nucleic acid)
        description: Any collection of multiple nucleotide sequences and associated
          metadata that do not (typically) correspond to common sequence database
          records or database entries.
        meaning: edam:data_1234
      edam:data_1235:
        title: Sequence cluster
        description: 'A set of sequences that have been clustered or otherwise classified
          as belonging to a group including (typically) sequence cluster information.

          The cluster might include sequences identifiers, short descriptions, alignment
          and summary information.'
        meaning: edam:data_1235
      edam:data_1238:
        title: Proteolytic digest
        description: A protein sequence cleaved into peptide fragments (by enzymatic
          or chemical cleavage) with fragment masses.
        meaning: edam:data_1238
      edam:data_1239:
        title: Restriction digest
        description: Restriction digest fragments from digesting a nucleotide sequence
          with restriction sites using a restriction endonuclease.
        meaning: edam:data_1239
      edam:data_1240:
        title: PCR primers
        description: Oligonucleotide primer(s) for PCR and DNA amplification, for
          example a minimal primer set.
        meaning: edam:data_1240
      edam:data_1245:
        title: Sequence cluster (protein)
        description: 'A cluster of protein sequences.

          The sequences are typically related, for example a family of sequences.'
        meaning: edam:data_1245
      edam:data_1246:
        title: Sequence cluster (nucleic acid)
        description: 'A cluster of nucleotide sequences.

          The sequences are typically related, for example a family of sequences.'
        meaning: edam:data_1246
      edam:data_1249:
        title: Sequence length
        description: The size (length) of a sequence, subsequence or region in a sequence,
          or range(s) of lengths.
        meaning: edam:data_1249
      edam:data_1254:
        title: Sequence property
        description: An informative report about non-positional sequence features,
          typically a report on general molecular sequence properties derived from
          sequence analysis.
        meaning: edam:data_1254
      edam:data_1255:
        title: Sequence features
        description: 'Annotation of positional features of molecular sequence(s),
          i.e. that can be mapped to position(s) in the sequence.

          This includes annotation of positional sequence features, organised into
          a standard feature table, or any other report of sequence features. General
          feature reports are a source of sequence feature table information although
          internal conversion would be required.'
        meaning: edam:data_1255
      edam:data_1259:
        title: Sequence complexity report
        description: A report on sequence complexity, for example low-complexity or
          repeat regions in sequences.
        meaning: edam:data_1259
      edam:data_1260:
        title: Sequence ambiguity report
        description: A report on ambiguity in molecular sequence(s).
        meaning: edam:data_1260
      edam:data_1261:
        title: Sequence composition report
        description: A report (typically a table) on character or word composition
          / frequency of a molecular sequence(s).
        meaning: edam:data_1261
      edam:data_1262:
        title: Peptide molecular weight hits
        description: A report on peptide fragments of certain molecular weight(s)
          in one or more protein sequences.
        meaning: edam:data_1262
      edam:data_1263:
        title: Base position variability plot
        description: A plot of third base position variability in a nucleotide sequence.
        meaning: edam:data_1263
      edam:data_1265:
        title: Base frequencies table
        description: A table of base frequencies of a nucleotide sequence.
        meaning: edam:data_1265
      edam:data_1266:
        title: Base word frequencies table
        description: A table of word composition of a nucleotide sequence.
        meaning: edam:data_1266
      edam:data_1267:
        title: Amino acid frequencies table
        description: A table of amino acid frequencies of a protein sequence.
        meaning: edam:data_1267
      edam:data_1268:
        title: Amino acid word frequencies table
        description: A table of amino acid word composition of a protein sequence.
        meaning: edam:data_1268
      edam:data_1270:
        title: Feature table
        description: Annotation of positional sequence features, organised into a
          standard feature table.
        meaning: edam:data_1270
      edam:data_1274:
        title: Map
        description: A map of (typically one) DNA sequence annotated with positional
          or non-positional features.
        meaning: edam:data_1274
      edam:data_1276:
        title: Nucleic acid features
        description: 'An informative report on intrinsic positional features of a
          nucleotide sequence, formatted to be machine-readable.

          This includes nucleotide sequence feature annotation in any known sequence
          feature table format and any other report of nucleic acid features.'
        meaning: edam:data_1276
      edam:data_1277:
        title: Protein features
        description: 'An informative report on intrinsic positional features of a
          protein sequence.

          This includes protein sequence feature annotation in any known sequence
          feature table format and any other report of protein features.'
        meaning: edam:data_1277
      edam:data_1278:
        title: Genetic map
        description: 'A genetic (linkage) map indicates the proximity of two genes
          on a chromosome, whether two genes are linked and the frequency they are
          transmitted together to an offspring. They are limited to genetic markers
          of traits observable only in whole organisms.

          A map showing the relative positions of genetic markers in a nucleic acid
          sequence, based on estimation of non-physical distance such as recombination
          frequencies.'
        meaning: edam:data_1278
      edam:data_1279:
        title: Sequence map
        description: 'A map of genetic markers in a contiguous, assembled genomic
          sequence, with the sizes and separation of markers measured in base pairs.

          A sequence map typically includes annotation on significant subsequences
          such as contigs, haplotypes and genes. The contigs shown will (typically)
          be a set of small overlapping clones representing a complete chromosomal
          segment.'
        meaning: edam:data_1279
      edam:data_1280:
        title: Physical map
        description: 'A map of DNA (linear or circular) annotated with physical features
          or landmarks such as restriction sites, cloned DNA fragments, genes or genetic
          markers, along with the physical distances between them.

          Distance in a physical map is measured in base pairs. A physical map might
          be ordered relative to a reference map (typically a genetic map) in the
          process of genome sequencing.'
        meaning: edam:data_1280
      edam:data_1283:
        title: Cytogenetic map
        description: 'A map showing banding patterns derived from direct observation
          of a stained chromosome.

          This is the lowest-resolution physical map and can provide only rough estimates
          of physical (base pair) distances. Like a genetic map, they are limited
          to genetic markers of traits observable only in whole organisms.'
        meaning: edam:data_1283
      edam:data_1284:
        title: DNA transduction map
        description: A gene map showing distances between loci based on relative cotransduction
          frequencies.
        meaning: edam:data_1284
      edam:data_1285:
        title: Gene map
        description: Sequence map of a single gene annotated with genetic features
          such as introns, exons, untranslated regions, polyA signals, promoters,
          enhancers and (possibly) mutations defining alleles of a gene.
        meaning: edam:data_1285
      edam:data_1286:
        title: Plasmid map
        description: Sequence map of a plasmid (circular DNA).
        meaning: edam:data_1286
      edam:data_1288:
        title: Genome map
        description: Sequence map of a whole genome.
        meaning: edam:data_1288
      edam:data_1289:
        title: Restriction map
        description: Image of the restriction enzyme cleavage sites (restriction sites)
          in a nucleic acid sequence.
        meaning: edam:data_1289
      edam:data_1347:
        title: Dirichlet distribution
        description: Dirichlet distribution used by hidden Markov model analysis programs.
        meaning: edam:data_1347
      edam:data_1352:
        title: Regular expression
        description: Regular expression pattern.
        meaning: edam:data_1352
      edam:data_1353:
        title: Sequence motif
        description: Any specific or conserved pattern (typically expressed as a regular
          expression) in a molecular sequence.
        meaning: edam:data_1353
      edam:data_1354:
        title: Sequence profile
        description: Some type of statistical model representing a (typically multiple)
          sequence alignment.
        meaning: edam:data_1354
      edam:data_1355:
        title: Protein signature
        description: An informative report about a specific or conserved protein sequence
          pattern.
        meaning: edam:data_1355
      edam:data_1361:
        title: Position frequency matrix
        description: A profile (typically representing a sequence alignment) that
          is a simple matrix of nucleotide (or amino acid) counts per position.
        meaning: edam:data_1361
      edam:data_1362:
        title: Position weight matrix
        description: 'A profile (typically representing a sequence alignment) that
          is weighted matrix of nucleotide (or amino acid) counts per position.

          Contributions of individual sequences to the matrix might be uneven (weighted).'
        meaning: edam:data_1362
      edam:data_1363:
        title: Information content matrix
        description: A profile (typically representing a sequence alignment) derived
          from a matrix of nucleotide (or amino acid) counts per position that reflects
          information content at each position.
        meaning: edam:data_1363
      edam:data_1364:
        title: Hidden Markov model
        description: A statistical Markov model of a system which is assumed to be
          a Markov process with unobserved (hidden) states. For example, a hidden
          Markov model representation of a set or alignment of sequences.
        meaning: edam:data_1364
      edam:data_1365:
        title: Fingerprint
        description: One or more fingerprints (sequence classifiers) as used in the
          PRINTS database.
        meaning: edam:data_1365
      edam:data_1381:
        title: Pair sequence alignment
        description: Alignment of exactly two molecular sequences.
        meaning: edam:data_1381
      edam:data_1383:
        title: Nucleic acid sequence alignment
        description: Alignment of multiple nucleotide sequences.
        meaning: edam:data_1383
      edam:data_1384:
        title: Protein sequence alignment
        description: Alignment of multiple protein sequences.
        meaning: edam:data_1384
      edam:data_1385:
        title: Hybrid sequence alignment
        description: 'Alignment of multiple molecular sequences of different types.

          Hybrid sequence alignments include for example genomic DNA to EST, cDNA
          or mRNA.'
        meaning: edam:data_1385
      edam:data_1394:
        title: Alignment score or penalty
        description: A simple floating point number defining the penalty for opening
          or extending a gap in an alignment.
        meaning: edam:data_1394
      edam:data_1397:
        title: Gap opening penalty
        description: A penalty for opening a gap in an alignment.
        meaning: edam:data_1397
      edam:data_1398:
        title: Gap extension penalty
        description: A penalty for extending a gap in an alignment.
        meaning: edam:data_1398
      edam:data_1399:
        title: Gap separation penalty
        description: A penalty for gaps that are close together in an alignment.
        meaning: edam:data_1399
      edam:data_1401:
        title: Match reward score
        description: The score for a 'match' used in various sequence database search
          applications with simple scoring schemes.
        meaning: edam:data_1401
      edam:data_1402:
        title: Mismatch penalty score
        description: The score (penalty) for a 'mismatch' used in various alignment
          and sequence database search applications with simple scoring schemes.
        meaning: edam:data_1402
      edam:data_1403:
        title: Drop off score
        description: This is the threshold drop in score at which extension of word
          alignment is halted.
        meaning: edam:data_1403
      edam:data_1410:
        title: Terminal gap opening penalty
        description: A number defining the penalty for opening gaps at the termini
          of an alignment, either from the N/C terminal of protein or 5'/3' terminal
          of nucleotide sequences.
        meaning: edam:data_1410
      edam:data_1411:
        title: Terminal gap extension penalty
        description: A number defining the penalty for extending gaps at the termini
          of an alignment, either from the N/C terminal of protein or 5'/3' terminal
          of nucleotide sequences.
        meaning: edam:data_1411
      edam:data_1412:
        title: Sequence identity
        description: Sequence identity is the number (%) of matches (identical characters)
          in positions from an alignment of two molecular sequences.
        meaning: edam:data_1412
      edam:data_1413:
        title: Sequence similarity
        description: 'Data Type is float probably.

          Sequence similarity is the similarity (expressed as a percentage) of two
          molecular sequences calculated from their alignment, a scoring matrix for
          scoring characters substitutions and penalties for gap insertion and extension.'
        meaning: edam:data_1413
      edam:data_1426:
        title: Phylogenetic continuous quantitative data
        description: Continuous quantitative data that may be read during phylogenetic
          tree calculation.
        meaning: edam:data_1426
      edam:data_1427:
        title: Phylogenetic discrete data
        description: Character data with discrete states that may be read during phylogenetic
          tree calculation.
        meaning: edam:data_1427
      edam:data_1428:
        title: Phylogenetic character cliques
        description: One or more cliques of mutually compatible characters that are
          generated, for example from analysis of discrete character data, and are
          used to generate a phylogeny.
        meaning: edam:data_1428
      edam:data_1429:
        title: Phylogenetic invariants
        description: Phylogenetic invariants data for testing alternative tree topologies.
        meaning: edam:data_1429
      edam:data_1439:
        title: DNA substitution model
        description: A model of DNA substitution that explains a DNA sequence alignment,
          derived from phylogenetic tree analysis.
        meaning: edam:data_1439
      edam:data_1442:
        title: Phylogenetic tree distances
        description: Distances, such as Branch Score distance, between two or more
          phylogenetic trees.
        meaning: edam:data_1442
      edam:data_1444:
        title: Phylogenetic character contrasts
        description: Independent contrasts for characters used in a phylogenetic tree,
          or covariances, regressions and correlations between characters for those
          contrasts.
        meaning: edam:data_1444
      edam:data_1448:
        title: Comparison matrix (nucleotide)
        description: Matrix of integer or floating point numbers for nucleotide comparison.
        meaning: edam:data_1448
      edam:data_1449:
        title: Comparison matrix (amino acid)
        description: Matrix of integer or floating point numbers for amino acid comparison.
        meaning: edam:data_1449
      edam:data_1459:
        title: Nucleic acid structure
        description: 3D coordinate and associated data for a nucleic acid tertiary
          (3D) structure.
        meaning: edam:data_1459
      edam:data_1460:
        title: Protein structure
        description: 3D coordinate and associated data for a protein tertiary (3D)
          structure, or part of a structure, possibly in complex with other molecules.
        meaning: edam:data_1460
      edam:data_1461:
        title: Protein-ligand complex
        description: 'The structure of a protein in complex with a ligand, typically
          a small molecule such as an enzyme substrate or cofactor, but possibly another
          macromolecule.

          This includes interactions of proteins with atoms, ions and small molecules
          or macromolecules such as nucleic acids or other polypeptides. For stable
          inter-polypeptide interactions use ''Protein complex'' instead.'
        meaning: edam:data_1461
      edam:data_1462:
        title: Carbohydrate structure
        description: 3D coordinate and associated data for a carbohydrate (3D) structure.
        meaning: edam:data_1462
      edam:data_1463:
        title: Small molecule structure
        description: 3D coordinate and associated data for the (3D) structure of a
          small molecule, such as any common chemical compound.
        meaning: edam:data_1463
      edam:data_1464:
        title: DNA structure
        description: 3D coordinate and associated data for a DNA tertiary (3D) structure.
        meaning: edam:data_1464
      edam:data_1465:
        title: RNA structure
        description: 3D coordinate and associated data for an RNA tertiary (3D) structure.
        meaning: edam:data_1465
      edam:data_1466:
        title: tRNA structure
        description: 3D coordinate and associated data for a tRNA tertiary (3D) structure,
          including tmRNA, snoRNAs etc.
        meaning: edam:data_1466
      edam:data_1467:
        title: Protein chain
        description: 3D coordinate and associated data for the tertiary (3D) structure
          of a polypeptide chain.
        meaning: edam:data_1467
      edam:data_1468:
        title: Protein domain
        description: 3D coordinate and associated data for the tertiary (3D) structure
          of a protein domain.
        meaning: edam:data_1468
      edam:data_1470:
        title: C-alpha trace
        description: '3D coordinate and associated data for a protein tertiary (3D)
          structure (typically C-alpha atoms only).

          C-beta atoms from amino acid side-chains may be included.'
        meaning: edam:data_1470
      edam:data_1479:
        title: Structure alignment (pair)
        description: Alignment (superimposition) of exactly two molecular tertiary
          (3D) structures.
        meaning: edam:data_1479
      edam:data_1481:
        title: Protein structure alignment
        description: Alignment (superimposition) of protein tertiary (3D) structures.
        meaning: edam:data_1481
      edam:data_1482:
        title: Nucleic acid structure alignment
        description: Alignment (superimposition) of nucleic acid tertiary (3D) structures.
        meaning: edam:data_1482
      edam:data_1493:
        title: RNA structure alignment
        description: Alignment (superimposition) of RNA tertiary (3D) structures.
        meaning: edam:data_1493
      edam:data_1494:
        title: Structural transformation matrix
        description: Matrix to transform (rotate/translate) 3D coordinates, typically
          the transformation necessary to superimpose two molecular structures.
        meaning: edam:data_1494
      edam:data_1497:
        title: Root-mean-square deviation
        description: Root-mean-square deviation (RMSD) is calculated to measure the
          average distance between superimposed macromolecular coordinates.
        meaning: edam:data_1497
      edam:data_1498:
        title: Tanimoto similarity score
        description: 'A ligand fingerprint is derived from ligand structural data
          from a Protein DataBank file. It reflects the elements or groups present
          or absent, covalent bonds and bond orders and the bonded environment in
          terms of SATIS codes and BLEEP atom types.

          A measure of the similarity between two ligand fingerprints.'
        meaning: edam:data_1498
      edam:data_1499:
        title: 3D-1D scoring matrix
        description: A matrix of 3D-1D scores reflecting the probability of amino
          acids to occur in different tertiary structural environments.
        meaning: edam:data_1499
      edam:data_1501:
        title: Amino acid index
        description: A table of 20 numerical values which quantify a property (e.g.
          physicochemical or biochemical) of the common amino acids.
        meaning: edam:data_1501
      edam:data_1502:
        title: Amino acid index (chemical classes)
        description: Chemical classification (small, aliphatic, aromatic, polar, charged
          etc) of amino acids.
        meaning: edam:data_1502
      edam:data_1503:
        title: Amino acid pair-wise contact potentials
        description: Statistical protein contact potentials.
        meaning: edam:data_1503
      edam:data_1505:
        title: Amino acid index (molecular weight)
        description: Molecular weights of amino acids.
        meaning: edam:data_1505
      edam:data_1506:
        title: Amino acid index (hydropathy)
        description: Hydrophobic, hydrophilic or charge properties of amino acids.
        meaning: edam:data_1506
      edam:data_1507:
        title: Amino acid index (White-Wimley data)
        description: Experimental free energy values for the water-interface and water-octanol
          transitions for the amino acids.
        meaning: edam:data_1507
      edam:data_1508:
        title: Amino acid index (van der Waals radii)
        description: Van der Waals radii of atoms for different amino acid residues.
        meaning: edam:data_1508
      edam:data_1519:
        title: Peptide molecular weights
        description: 'List of molecular weight(s) of one or more proteins or peptides,
          for example cut by proteolytic enzymes or reagents.

          The report might include associated data such as frequency of peptide fragment
          molecular weights.'
        meaning: edam:data_1519
      edam:data_1520:
        title: Peptide hydrophobic moment
        description: 'Hydrophobic moment is a peptides hydrophobicity measured for
          different angles of rotation.

          Report on the hydrophobic moment of a polypeptide sequence.'
        meaning: edam:data_1520
      edam:data_1521:
        title: Protein aliphatic index
        description: 'The aliphatic index is the relative protein volume occupied
          by aliphatic side chains.

          The aliphatic index of a protein.'
        meaning: edam:data_1521
      edam:data_1522:
        title: Protein sequence hydropathy plot
        description: 'A protein sequence with annotation on hydrophobic or hydrophilic
          / charged regions, hydrophobicity plot etc.

          Hydrophobic moment is a peptides hydrophobicity measured for different angles
          of rotation.'
        meaning: edam:data_1522
      edam:data_1523:
        title: Protein charge plot
        description: A plot of the mean charge of the amino acids within a window
          of specified length as the window is moved along a protein sequence.
        meaning: edam:data_1523
      edam:data_1524:
        title: Protein solubility
        description: The solubility or atomic solvation energy of a protein sequence
          or structure.
        meaning: edam:data_1524
      edam:data_1525:
        title: Protein crystallizability
        description: Data on the crystallizability of a protein sequence.
        meaning: edam:data_1525
      edam:data_1526:
        title: Protein globularity
        description: Data on the stability, intrinsic disorder or globularity of a
          protein sequence.
        meaning: edam:data_1526
      edam:data_1527:
        title: Protein titration curve
        description: The titration curve of a protein.
        meaning: edam:data_1527
      edam:data_1528:
        title: Protein isoelectric point
        description: The isoelectric point of one proteins.
        meaning: edam:data_1528
      edam:data_1529:
        title: Protein pKa value
        description: The pKa value of a protein.
        meaning: edam:data_1529
      edam:data_1530:
        title: Protein hydrogen exchange rate
        description: The hydrogen exchange rate of a protein.
        meaning: edam:data_1530
      edam:data_1531:
        title: Protein extinction coefficient
        description: The extinction coefficient of a protein.
        meaning: edam:data_1531
      edam:data_1532:
        title: Protein optical density
        description: The optical density of a protein.
        meaning: edam:data_1532
      edam:data_1534:
        title: Peptide immunogenicity data
        description: 'An report on allergenicity / immunogenicity of peptides and
          proteins.

          This includes data on peptide ligands that elicit an immune response (immunogens),
          allergic cross-reactivity, predicted antigenicity (Hopp and Woods plot)
          etc. These data are useful in the development of peptide-specific antibodies
          or multi-epitope vaccines. Methods might use sequence data (for example
          motifs) and / or structural data.'
        meaning: edam:data_1534
      edam:data_1537:
        title: Protein structure report
        description: A human-readable collection of information about one or more
          specific protein 3D structure(s) or structural domains.
        meaning: edam:data_1537
      edam:data_1539:
        title: Protein structural quality report
        description: 'Model validation might involve checks for atomic packing, steric
          clashes, agreement with electron density maps etc.

          Report on the quality of a protein three-dimensional model.'
        meaning: edam:data_1539
      edam:data_1542:
        title: Protein solvent accessibility
        description: 'Data on the solvent accessible or buried surface area of a protein
          structure.

          This concept covers definitions of the protein surface, interior and interfaces,
          accessible and buried residues, surface accessible pockets, interior inaccessible
          cavities etc.'
        meaning: edam:data_1542
      edam:data_1544:
        title: Ramachandran plot
        description: Phi/psi angle data or a Ramachandran plot of a protein structure.
        meaning: edam:data_1544
      edam:data_1545:
        title: Protein dipole moment
        description: Data on the net charge distribution (dipole moment) of a protein
          structure.
        meaning: edam:data_1545
      edam:data_1546:
        title: Protein distance matrix
        description: A matrix of distances between amino acid residues (for example
          the C-alpha atoms) in a protein structure.
        meaning: edam:data_1546
      edam:data_1547:
        title: Protein contact map
        description: An amino acid residue contact map for a protein structure.
        meaning: edam:data_1547
      edam:data_1548:
        title: Protein residue 3D cluster
        description: Report on clusters of contacting residues in protein structures
          such as a key structural residue network.
        meaning: edam:data_1548
      edam:data_1549:
        title: Protein hydrogen bonds
        description: Patterns of hydrogen bonding in protein structures.
        meaning: edam:data_1549
      edam:data_1566:
        title: Protein-ligand interaction report
        description: An informative report on protein-ligand (small molecule) interaction(s).
        meaning: edam:data_1566
      edam:data_1583:
        title: Nucleic acid melting profile
        description: 'A melting (stability) profile calculated the free energy required
          to unwind and separate the nucleic acid strands, plotted for sliding windows
          over a sequence.

          Data on the dissociation characteristics of a double-stranded nucleic acid
          molecule (DNA or a DNA/RNA hybrid) during heating.

          Nucleic acid melting curve: a melting curve of a double-stranded nucleic
          acid molecule (DNA or DNA/RNA). Shows the proportion of nucleic acid which
          are double-stranded versus temperature.

          Nucleic acid probability profile: a probability profile of a double-stranded
          nucleic acid molecule (DNA or DNA/RNA). Shows the probability of a base
          pair not being melted (i.e. remaining as double-stranded DNA) at a specified
          temperature

          Nucleic acid stitch profile: stitch profile of hybridised or double stranded
          nucleic acid (DNA or RNA/DNA). A stitch profile diagram shows partly melted
          DNA conformations (with probabilities) at a range of temperatures. For example,
          a stitch profile might show possible loop openings with their location,
          size, probability and fluctuations at a given temperature.

          Nucleic acid temperature profile: a temperature profile of a double-stranded
          nucleic acid molecule (DNA or DNA/RNA). Plots melting temperature versus
          base position.'
        meaning: edam:data_1583
      edam:data_1584:
        title: Nucleic acid enthalpy
        description: Enthalpy of hybridised or double stranded nucleic acid (DNA or
          RNA/DNA).
        meaning: edam:data_1584
      edam:data_1585:
        title: Nucleic acid entropy
        description: Entropy of hybridised or double stranded nucleic acid (DNA or
          RNA/DNA).
        meaning: edam:data_1585
      edam:data_1588:
        title: DNA base pair stacking energies data
        description: DNA base pair stacking energies data.
        meaning: edam:data_1588
      edam:data_1589:
        title: DNA base pair twist angle data
        description: DNA base pair twist angle data.
        meaning: edam:data_1589
      edam:data_1590:
        title: DNA base trimer roll angles data
        description: DNA base trimer roll angles data.
        meaning: edam:data_1590
      edam:data_1595:
        title: Base pairing probability matrix dotplot
        description: 'Dotplot of RNA base pairing probability matrix.

          Such as generated by the Vienna package.'
        meaning: edam:data_1595
      edam:data_1596:
        title: Nucleic acid folding report
        description: A human-readable collection of information about RNA/DNA folding,
          minimum folding energies for DNA or RNA sequences, energy landscape of RNA
          mutants etc.
        meaning: edam:data_1596
      edam:data_1597:
        title: Codon usage table
        description: 'A codon usage table might include the codon usage table name,
          optional comments and a table with columns for codons and corresponding
          codon usage data. A genetic code can be extracted from or represented by
          a codon usage table.

          Table of codon usage data calculated from one or more nucleic acid sequences.'
        meaning: edam:data_1597
      edam:data_1598:
        title: Genetic code
        description: 'A genetic code for an organism.

          A genetic code need not include detailed codon usage information.'
        meaning: edam:data_1598
      edam:data_1600:
        title: Codon usage bias plot
        description: A plot of the synonymous codon usage calculated for windows over
          a nucleotide sequence.
        meaning: edam:data_1600
      edam:data_1602:
        title: Codon usage fraction difference
        description: The differences in codon usage fractions between two codon usage
          tables.
        meaning: edam:data_1602
      edam:data_1621:
        title: Pharmacogenomic test report
        description: 'A human-readable collection of information about the influence
          of genotype on drug response.

          The report might correlate gene expression or single-nucleotide polymorphisms
          with drug efficacy or toxicity.'
        meaning: edam:data_1621
      edam:data_1622:
        title: Disease report
        description: 'A human-readable collection of information about a specific
          disease.

          For example, an informative report on a specific tumor including nature
          and origin of the sample, anatomic site, organ or tissue, tumor type, including
          morphology and/or histologic type, and so on.'
        meaning: edam:data_1622
      edam:data_1636:
        title: Heat map
        description: A graphical 2D tabular representation of expression data, typically
          derived from an omics experiment. A heat map is a table where rows and columns
          correspond to different features and contexts (for example, cells or samples)
          and the cell colour represents the level of expression of a gene that context.
        meaning: edam:data_1636
      edam:data_1667:
        title: E-value
        description: 'A simple floating point number defining the lower or upper limit
          of an expectation value (E-value).

          An expectation value (E-Value) is the expected number of observations which
          are at least as extreme as observations expected to occur by random chance.
          The E-value describes the number of hits with a given score or better that
          are expected to occur at random when searching a database of a particular
          size. It decreases exponentially with the score (S) of a hit. A low E value
          indicates a more significant score.'
        meaning: edam:data_1667
      edam:data_1668:
        title: Z-value
        description: 'A z-value might be specified as a threshold for reporting hits
          from database searches.

          The z-value is the number of standard deviations a data value is above or
          below a mean value.'
        meaning: edam:data_1668
      edam:data_1669:
        title: P-value
        description: 'A z-value might be specified as a threshold for reporting hits
          from database searches.

          The P-value is the probability of obtaining by random chance a result that
          is at least as extreme as an observed result, assuming a NULL hypothesis
          is true.'
        meaning: edam:data_1669
      edam:data_1689:
        title: Username
        description: A username on a computer system or a website.
        meaning: edam:data_1689
      edam:data_1690:
        title: Password
        description: A password on a computer system, or a website.
        meaning: edam:data_1690
      edam:data_1691:
        title: Email address
        description: A valid email address of an end-user.
        meaning: edam:data_1691
      edam:data_1692:
        title: Person name
        description: The name of a person.
        meaning: edam:data_1692
      edam:data_1696:
        title: Drug report
        description: 'A drug structure relationship map is report (typically a map
          diagram) of drug structure relationships.

          A human-readable collection of information about a specific drug.'
        meaning: edam:data_1696
      edam:data_1707:
        title: Phylogenetic tree image
        description: 'An image (for viewing or printing) of a phylogenetic tree including
          (typically) a plot of rooted or unrooted phylogenies, cladograms, circular
          trees or phenograms and associated information.

          See also ''Phylogenetic tree'''
        meaning: edam:data_1707
      edam:data_1708:
        title: RNA secondary structure image
        description: Image of RNA secondary structure, knots, pseudoknots etc.
        meaning: edam:data_1708
      edam:data_1709:
        title: Protein secondary structure image
        description: Image of protein secondary structure.
        meaning: edam:data_1709
      edam:data_1710:
        title: Structure image
        description: Image of one or more molecular tertiary (3D) structures.
        meaning: edam:data_1710
      edam:data_1711:
        title: Sequence alignment image
        description: Image of two or more aligned molecular sequences possibly annotated
          with alignment features.
        meaning: edam:data_1711
      edam:data_1712:
        title: Chemical structure image
        description: 'An image of the structure of a small chemical compound.

          The molecular identifier and formula are typically included.'
        meaning: edam:data_1712
      edam:data_1713:
        title: Fate map
        description: A fate map is a plan of early stage of an embryo such as a blastula,
          showing areas that are significance to development.
        meaning: edam:data_1713
      edam:data_1714:
        title: Microarray spots image
        description: An image of spots from a microarray experiment.
        meaning: edam:data_1714
      edam:data_1731:
        title: Ontology concept definition
        description: The definition of a concept from an ontology.
        meaning: edam:data_1731
      edam:data_1742:
        title: PDB residue number
        description: A residue identifier (a string) from a PDB file.
        meaning: edam:data_1742
      edam:data_1743:
        title: Atomic coordinate
        description: Cartesian coordinate of an atom (in a molecular structure).
        meaning: edam:data_1743
      edam:data_1748:
        title: PDB atom name
        description: Identifier (a string) of a specific atom from a PDB file for
          a molecular structure.
        meaning: edam:data_1748
      edam:data_1755:
        title: Protein atom
        description: 'Data on a single atom from a protein structure.

          This is a broad data type and is used a placeholder for other, more specific
          types. It is primarily intended to help navigation of EDAM and would not
          typically be used for annotation.'
        meaning: edam:data_1755
      edam:data_1756:
        title: Protein residue
        description: 'Data on a single amino acid residue position in a protein structure.

          This is a broad data type and is used a placeholder for other, more specific
          types. It is primarily intended to help navigation of EDAM and would not
          typically be used for annotation.'
        meaning: edam:data_1756
      edam:data_1757:
        title: Atom name
        description: Name of an atom.
        meaning: edam:data_1757
      edam:data_1758:
        title: PDB residue name
        description: Three-letter amino acid residue names as used in PDB files.
        meaning: edam:data_1758
      edam:data_1759:
        title: PDB model number
        description: Identifier of a model structure from a PDB file.
        meaning: edam:data_1759
      edam:data_1771:
        title: Sequence version
        description: Information on an molecular sequence version.
        meaning: edam:data_1771
      edam:data_1772:
        title: Score
        description: A numerical value, that is some type of scored value arising
          for example from a prediction method.
        meaning: edam:data_1772
      edam:data_1794:
        title: Gene ID (PlasmoDB)
        description: Identifier of a gene from PlasmoDB Plasmodium Genome Resource.
        meaning: edam:data_1794
      edam:data_1795:
        title: Gene ID (EcoGene)
        description: Identifier of a gene from EcoGene Database.
        meaning: edam:data_1795
      edam:data_1796:
        title: Gene ID (FlyBase)
        description: Gene identifier from FlyBase database.
        meaning: edam:data_1796
      edam:data_1802:
        title: Gene ID (Gramene)
        description: Gene identifier from Gramene database.
        meaning: edam:data_1802
      edam:data_1803:
        title: Gene ID (Virginia microbial)
        description: Gene identifier from Virginia Bioinformatics Institute microbial
          database.
        meaning: edam:data_1803
      edam:data_1804:
        title: Gene ID (SGN)
        description: Gene identifier from Sol Genomics Network.
        meaning: edam:data_1804
      edam:data_1805:
        title: Gene ID (WormBase)
        description: Gene identifier used by WormBase database.
        meaning: edam:data_1805
      edam:data_1807:
        title: ORF name
        description: The name of an open reading frame attributed by a sequencing
          project.
        meaning: edam:data_1807
      edam:data_1855:
        title: Clone ID
        description: An identifier of a clone (cloned molecular sequence) from a database.
        meaning: edam:data_1855
      edam:data_1856:
        title: PDB insertion code
        description: An insertion code (part of the residue number) for an amino acid
          residue from a PDB file.
        meaning: edam:data_1856
      edam:data_1857:
        title: Atomic occupancy
        description: 'The fraction of an atom type present at a site in a molecular
          structure.

          The sum of the occupancies of all the atom types at a site should not normally
          significantly exceed 1.0.'
        meaning: edam:data_1857
      edam:data_1858:
        title: Isotropic B factor
        description: Isotropic B factor (atomic displacement parameter) for an atom
          from a PDB file.
        meaning: edam:data_1858
      edam:data_1859:
        title: Deletion map
        description: 'A cytogenetic map is built from a set of mutant cell lines with
          sub-chromosomal deletions and a reference wild-type line (''genome deletion
          panel''). The panel is used to map markers onto the genome by comparing
          mutant to wild-type banding patterns. Markers are linked (occur in the same
          deleted region) if they share the same banding pattern (presence or absence)
          as the deletion panel.

          A cytogenetic map showing chromosome banding patterns in mutant cell lines
          relative to the wild type.'
        meaning: edam:data_1859
      edam:data_1860:
        title: QTL map
        description: A genetic map which shows the approximate location of quantitative
          trait loci (QTL) between two or more markers.
        meaning: edam:data_1860
      edam:data_1863:
        title: Haplotype map
        description: A map of haplotypes in a genome or other sequence, describing
          common patterns of genetic variation.
        meaning: edam:data_1863
      edam:data_1867:
        title: Protein fold name
        description: The name of a protein fold.
        meaning: edam:data_1867
      edam:data_1868:
        title: Taxon
        description: 'For a complete list of taxonomic ranks see https://www.phenoscape.org/wiki/Taxonomic_Rank_Vocabulary.

          The name of a group of organisms belonging to the same taxonomic rank.'
        meaning: edam:data_1868
      edam:data_1869:
        title: Organism identifier
        description: A unique identifier of a (group of) organisms.
        meaning: edam:data_1869
      edam:data_1870:
        title: Genus name
        description: The name of a genus of organism.
        meaning: edam:data_1870
      edam:data_1872:
        title: Taxonomic classification
        description: 'Name components correspond to levels in a taxonomic hierarchy
          (e.g. ''Genus'', ''Species'', etc.) Meta information such as a reference
          where the name was defined and a date might be included.

          The full name for a group of organisms, reflecting their biological classification
          and (usually) conforming to a standard nomenclature.'
        meaning: edam:data_1872
      edam:data_1873:
        title: iHOP organism ID
        description: A unique identifier for an organism used in the iHOP database.
        meaning: edam:data_1873
      edam:data_1874:
        title: Genbank common name
        description: Common name for an organism as used in the GenBank database.
        meaning: edam:data_1874
      edam:data_1875:
        title: NCBI taxon
        description: The name of a taxon from the NCBI taxonomy database.
        meaning: edam:data_1875
      edam:data_1881:
        title: Author ID
        description: Information on the authors of a published work.
        meaning: edam:data_1881
      edam:data_1882:
        title: DragonDB author identifier
        description: An identifier representing an author in the DragonDB database.
        meaning: edam:data_1882
      edam:data_1883:
        title: Annotated URI
        description: A URI along with annotation describing the data found at the
          address.
        meaning: edam:data_1883
      edam:data_1885:
        title: Gene ID (GeneFarm)
        description: Identifier of a gene from the GeneFarm database.
        meaning: edam:data_1885
      edam:data_1886:
        title: Blattner number
        description: The blattner identifier for a gene.
        meaning: edam:data_1886
      edam:data_1891:
        title: iHOP symbol
        description: A unique identifier of a protein or gene used in the iHOP database.
        meaning: edam:data_1891
      edam:data_1893:
        title: Locus ID
        description: A unique name or other identifier of a genetic locus, typically
          conforming to a scheme that names loci (such as predicted genes) depending
          on their position in a molecular sequence, for example a completely sequenced
          genome or chromosome.
        meaning: edam:data_1893
      edam:data_1895:
        title: Locus ID (AGI)
        description: Locus identifier for Arabidopsis Genome Initiative (TAIR, TIGR
          and MIPS databases).
        meaning: edam:data_1895
      edam:data_1896:
        title: Locus ID (ASPGD)
        description: Identifier for loci from ASPGD (Aspergillus Genome Database).
        meaning: edam:data_1896
      edam:data_1897:
        title: Locus ID (MGG)
        description: Identifier for loci from Magnaporthe grisea Database at the Broad
          Institute.
        meaning: edam:data_1897
      edam:data_1898:
        title: Locus ID (CGD)
        description: Identifier for loci from CGD (Candida Genome Database).
        meaning: edam:data_1898
      edam:data_1899:
        title: Locus ID (CMR)
        description: Locus identifier for Comprehensive Microbial Resource at the
          J. Craig Venter Institute.
        meaning: edam:data_1899
      edam:data_1900:
        title: NCBI locus tag
        description: Identifier for loci from NCBI database.
        meaning: edam:data_1900
      edam:data_1901:
        title: Locus ID (SGD)
        description: Identifier for loci from SGD (Saccharomyces Genome Database).
        meaning: edam:data_1901
      edam:data_1902:
        title: Locus ID (MMP)
        description: Identifier of loci from Maize Mapping Project.
        meaning: edam:data_1902
      edam:data_1903:
        title: Locus ID (DictyBase)
        description: Identifier of locus from DictyBase (Dictyostelium discoideum).
        meaning: edam:data_1903
      edam:data_1904:
        title: Locus ID (EntrezGene)
        description: Identifier of a locus from EntrezGene database.
        meaning: edam:data_1904
      edam:data_1905:
        title: Locus ID (MaizeGDB)
        description: Identifier of locus from MaizeGDB (Maize genome database).
        meaning: edam:data_1905
      edam:data_1907:
        title: Gene ID (KOME)
        description: Identifier of a gene from the KOME database.
        meaning: edam:data_1907
      edam:data_1908:
        title: Locus ID (Tropgene)
        description: Identifier of a locus from the Tropgene database.
        meaning: edam:data_1908
      edam:data_1916:
        title: Alignment
        description: An alignment of molecular sequences, structures or profiles derived
          from them.
        meaning: edam:data_1916
      edam:data_1917:
        title: Atomic property
        description: Data for an atom (in a molecular structure).
        meaning: edam:data_1917
      edam:data_2007:
        title: UniProt keyword
        description: A word or phrase that can appear in the keywords field (KW line)
          of entries from the UniProt database.
        meaning: edam:data_2007
      edam:data_2012:
        title: Sequence coordinates
        description: 'A position in a map (for example a genetic map), either a single
          position (point) or a region / interval.

          This includes positions in genomes based on a reference sequence. A position
          may be specified for any mappable object, i.e. anything that may have positional
          information such as a physical position in a chromosome. Data might include
          sequence region name, strand, coordinate system name, assembly name, start
          position and end position.'
        meaning: edam:data_2012
      edam:data_2016:
        title: Amino acid property
        description: Data concerning the intrinsic physical (e.g. structural) or chemical
          properties of one, more or all amino acids.
        meaning: edam:data_2016
      edam:data_2019:
        title: Map data
        description: Data describing a molecular map (genetic or physical) or a set
          of such maps, including various attributes of, data extracted from or derived
          from the analysis of them, but excluding the map(s) themselves. This includes
          metadata for map sets that share a common set of features which are mapped.
        meaning: edam:data_2019
      edam:data_2024:
        title: Enzyme kinetics data
        description: 'Data concerning chemical reaction(s) catalysed by enzyme(s).

          This is a broad data type and is used a placeholder for other, more specific
          types.'
        meaning: edam:data_2024
      edam:data_2025:
        title: Michaelis Menten plot
        description: A plot giving an approximation of the kinetics of an enzyme-catalysed
          reaction, assuming simple kinetics (i.e. no intermediate or product inhibition,
          allostericity or cooperativity). It plots initial reaction rate to the substrate
          concentration (S) from which the maximum rate (vmax) is apparent.
        meaning: edam:data_2025
      edam:data_2026:
        title: Hanes Woolf plot
        description: A plot based on the Michaelis Menten equation of enzyme kinetics
          plotting the ratio of the initial substrate concentration (S) against the
          reaction velocity (v).
        meaning: edam:data_2026
      edam:data_2042:
        title: Evidence
        description: Typically a human-readable summary of body of facts or information
          indicating why a statement is true or valid. This may include a computational
          prediction, laboratory experiment, literature reference etc.
        meaning: edam:data_2042
      edam:data_2044:
        title: Sequence
        description: 'One or more molecular sequences, possibly with associated annotation.

          This concept is a placeholder of concepts for primary sequence data including
          raw sequences and sequence records. It should not normally be used for derivatives
          such as sequence alignments, motifs or profiles.'
        meaning: edam:data_2044
      edam:data_2048:
        title: Report
        description: 'A human-readable collection of information including annotation
          on a biological entity or phenomena, computer-generated reports of analysis
          of primary data (e.g. sequence or structural), and metadata (data about
          primary data) or any other free (essentially unformatted) text, as distinct
          from the primary data itself.

          You can use this term by default for any textual report, in case you can''t
          find another, more specific term. Reports may be generated automatically
          or collated by hand and can include metadata on the origin, source, history,
          ownership or location of some thing.'
        meaning: edam:data_2048
      edam:data_2050:
        title: Molecular property (general)
        description: General data for a molecule.
        meaning: edam:data_2050
      edam:data_2070:
        title: Sequence motif (nucleic acid)
        description: A nucleotide sequence motif.
        meaning: edam:data_2070
      edam:data_2071:
        title: Sequence motif (protein)
        description: An amino acid sequence motif.
        meaning: edam:data_2071
      edam:data_2080:
        title: Database search results
        description: A report of hits from searching a database of some type.
        meaning: edam:data_2080
      edam:data_2082:
        title: Matrix
        description: 'An array of numerical values.

          This is a broad data type and is used a placeholder for other, more specific
          types.'
        meaning: edam:data_2082
      edam:data_2084:
        title: Nucleic acid report
        description: A human-readable collection of information about one or more
          specific nucleic acid molecules.
        meaning: edam:data_2084
      edam:data_2085:
        title: Structure report
        description: A human-readable collection of information about one or more
          molecular tertiary (3D) structures. It might include annotation on the structure,
          a computer-generated report of analysis of structural data, and metadata
          (data about primary data) or any other free (essentially unformatted) text,
          as distinct from the primary data itself.
        meaning: edam:data_2085
      edam:data_2087:
        title: Molecular property
        description: A report on the physical (e.g. structural) or chemical properties
          of molecules, or parts of a molecule.
        meaning: edam:data_2087
      edam:data_2088:
        title: DNA base structural data
        description: Structural data for DNA base pairs or runs of bases, such as
          energy or angle data.
        meaning: edam:data_2088
      edam:data_2091:
        title: Accession
        description: A persistent (stable) and unique identifier, typically identifying
          an object (entry) from a database.
        meaning: edam:data_2091
      edam:data_2093:
        title: Data reference
        description: 'A list of database accessions or identifiers are usually included.

          Reference to a dataset (or a cross-reference between two datasets), typically
          one or more entries in a biological database or ontology.'
        meaning: edam:data_2093
      edam:data_2098:
        title: Job identifier
        description: An identifier of a submitted job.
        meaning: edam:data_2098
      edam:data_2099:
        title: Name
        description: A name of a thing, which need not necessarily uniquely identify
          it.
        meaning: edam:data_2099
      edam:data_2101:
        title: Account authentication
        description: Authentication data usually used to log in into an account on
          an information system such as a web application or a database.
        meaning: edam:data_2101
      edam:data_2102:
        title: KEGG organism code
        description: A three-letter code used in the KEGG databases to uniquely identify
          organisms.
        meaning: edam:data_2102
      edam:data_2104:
        title: BioCyc ID
        description: Identifier of an object from one of the BioCyc databases.
        meaning: edam:data_2104
      edam:data_2105:
        title: Compound ID (BioCyc)
        description: Identifier of a compound from the BioCyc chemical compounds database.
        meaning: edam:data_2105
      edam:data_2106:
        title: Reaction ID (BioCyc)
        description: Identifier of a biological reaction from the BioCyc reactions
          database.
        meaning: edam:data_2106
      edam:data_2107:
        title: Enzyme ID (BioCyc)
        description: Identifier of an enzyme from the BioCyc enzymes database.
        meaning: edam:data_2107
      edam:data_2108:
        title: Reaction ID
        description: Identifier of a biological reaction from a database.
        meaning: edam:data_2108
      edam:data_2109:
        title: Identifier (hybrid)
        description: 'An identifier that is re-used for data objects of fundamentally
          different types (typically served from a single database).

          This branch provides an alternative organisation of the concepts nested
          under ''Accession'' and ''Name''. All concepts under here are already included
          under ''Accession'' or ''Name''.'
        meaning: edam:data_2109
      edam:data_2110:
        title: Molecular property identifier
        description: Identifier of a molecular property.
        meaning: edam:data_2110
      edam:data_2111:
        title: Codon usage table ID
        description: Identifier of a codon usage table, for example a genetic code.
        meaning: edam:data_2111
      edam:data_2112:
        title: FlyBase primary identifier
        description: Primary identifier of an object from the FlyBase database.
        meaning: edam:data_2112
      edam:data_2113:
        title: WormBase identifier
        description: Identifier of an object from the WormBase database.
        meaning: edam:data_2113
      edam:data_2114:
        title: WormBase wormpep ID
        description: Protein identifier used by WormBase database.
        meaning: edam:data_2114
      edam:data_2117:
        title: Map identifier
        description: An identifier of a map of a molecular sequence.
        meaning: edam:data_2117
      edam:data_2118:
        title: Person identifier
        description: An identifier of a software end-user on a website or a database
          (typically a person or an entity).
        meaning: edam:data_2118
      edam:data_2119:
        title: Nucleic acid identifier
        description: Name or other identifier of a nucleic acid molecule.
        meaning: edam:data_2119
      edam:data_2127:
        title: Genetic code identifier
        description: An identifier of a genetic code.
        meaning: edam:data_2127
      edam:data_2128:
        title: Genetic code name
        description: Informal name for a genetic code, typically an organism name.
        meaning: edam:data_2128
      edam:data_2129:
        title: File format name
        description: Name of a file format such as HTML, PNG, PDF, EMBL, GenBank and
          so on.
        meaning: edam:data_2129
      edam:data_2131:
        title: Operating system name
        description: Name of a computer operating system such as Linux, PC or Mac.
        meaning: edam:data_2131
      edam:data_2133:
        title: Logical operator
        description: A logical operator such as OR, AND, XOR, and NOT.
        meaning: edam:data_2133
      edam:data_2137:
        title: Gap penalty
        description: A penalty for introducing or extending a gap in an alignment.
        meaning: edam:data_2137
      edam:data_2139:
        title: Nucleic acid melting temperature
        description: A temperature concerning nucleic acid denaturation, typically
          the temperature at which the two strands of a hybridised or double stranded
          nucleic acid (DNA or RNA/DNA) molecule separate.
        meaning: edam:data_2139
      edam:data_2140:
        title: Concentration
        description: The concentration of a chemical compound.
        meaning: edam:data_2140
