        description: 'Data concerning, extracted from, or derived from the analysis
          of a scientific text (or texts) such as a full text article from a scientific
          journal.

          This is a broad data type and is used a placeholder for other, more specific
          types. It is primarily intended to help navigation of EDAM and would not
