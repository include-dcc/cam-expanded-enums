        description: Text-based tagged file format for medical images generated using
          the MetaImage software package.
        title: mhd
      edam:format_3551:
        text: edam:format_3551
        description: Nearly Raw Rasta Data format designed to support scientific visualisation
          and image processing involving N-dimensional raster data.
        title: nrrd
      edam:format_3554:
        text: edam:format_3554
        description: File format used for scripts written in the R programming language
          for execution within the R software environment, typically for statistical
          computation and graphics.
        title: R file format
      edam:format_3555:
        text: edam:format_3555
        description: File format used for scripts for the Statistical Package for
          the Social Sciences.
        title: SPSS
      edam:format_3556:
        text: edam:format_3556
        description: 'MHTML is not strictly an HTML format, it is encoded as an HTML
          email message (although with multipart/related instead of multipart/alternative).
          It, however, contains the main HTML block as its core, and thus it is for
          practical reasons included in EDAM as a specialisation of ''HTML''.

          MIME HTML format for Web pages, which can include external resources, including
          images, Flash animations and so on.'
        title: MHTML
      edam:format_3578:
        text: edam:format_3578
        description: Proprietary file format for (raw) BeadArray data used by genomewide
          profiling platforms from Illumina Inc. This format is output directly from
          the scanner and stores summary intensities for each probe-type on an array.
        title: IDAT
      edam:format_3579:
        text: edam:format_3579
        description: 'Joint Picture Group file format for lossy graphics file.

          Sequence of segments with markers. Begins with byte of 0xFF and follows
          by marker type.'
        title: JPG
      edam:format_3580:
        text: edam:format_3580
        description: Reporter Code Count-A data file (.csv) output by the Nanostring
          nCounter Digital Analyzer, which contains gene sample information, probe
          information and probe counts.
        title: rcc
      edam:format_3581:
        text: edam:format_3581
        description: 'ARFF (Attribute-Relation File Format) is an ASCII text file
          format that describes a list of instances sharing a set of attributes.

          This file format is for machine learning.'
        title: arff
      edam:format_3582:
        text: edam:format_3582
        description: AFG is a single text-based file assembly format that holds read
          and consensus information together.
        title: afg
      edam:format_3583:
        text: edam:format_3583
        description: 'Holds a tab-delimited chromosome /start /end / datavalue dataset.

          The bedGraph format allows display of continuous-valued data in track format.
          This display type is useful for probability scores and transcriptome data.'
        title: bedgraph
      edam:format_3584:
        text: edam:format_3584
        description: 'Browser Extensible Data (BED) format of sequence annotation
          track that strictly does not contain non-standard fields beyond the first
          3 columns.

          Galaxy allows BED files to contain non-standard fields beyond the first
          3 columns, some other implementations do not.'
        title: bedstrict
      edam:format_3585:
        text: edam:format_3585
        description: 'BED file format where each feature is described by chromosome,
          start, end, name, score, and strand.

          Tab delimited data in strict BED format - no non-standard columns allowed;
          column count forced to 6'
        title: bed6
      edam:format_3586:
        text: edam:format_3586
        description: 'A BED file where each feature is described by all twelve columns.

          Tab delimited data in strict BED format - no non-standard columns allowed;
          column count forced to 12'
        title: bed12
      edam:format_3587:
        text: edam:format_3587
        description: 'Galaxy allows BED files to contain non-standard fields beyond
          the first 3 columns, some other implementations do not.

          Tabular format of chromosome names and sizes used by Galaxy.'
        title: chrominfo
      edam:format_3588:
        text: edam:format_3588
        description: 'Custom Sequence annotation track format used by Galaxy.

          Used for tracks/track views within galaxy.'
        title: customtrack
      edam:format_3589:
        text: edam:format_3589
        description: 'Color space FASTA format sequence variant.

          FASTA format extended for color space information.'
        title: csfasta
      edam:format_3590:
        text: edam:format_3590
        description: 'An HDF5 file appears to the user as a directed graph. The nodes
          of this graph are the higher-level HDF5 objects that are exposed by the
          HDF5 APIs: Groups, Datasets, Named datatypes. Currently supported by the
          Python MDTraj package.

          HDF5 is a data model, library, and file format for storing and managing
          data, based on Hierarchical Data Format (HDF).

          HDF5 is the new version, according to the HDF group, a completely different
          technology (https://support.hdfgroup.org/products/hdf4/ compared to HDF.'
        title: HDF5
      edam:format_3591:
        text: edam:format_3591
        description: 'A versatile bitmap format.

          The TIFF format is perhaps the most versatile and diverse bitmap format
          in existence. Its extensible nature and support for numerous data compression
          schemes allow developers to customize the TIFF format to fit any peculiar
          data storage needs.'
        title: TIFF
      edam:format_3592:
        text: edam:format_3592
        description: 'Although it is based on Windows internal bitmap data structures,
          it is supported by many non-Windows and non-PC applications.

          Standard bitmap storage format in the Microsoft Windows environment.'
        title: BMP
      edam:format_3593:
        text: edam:format_3593
        description: 'IFUNC library reads and writes most uncompressed interchange
          versions of this format.

          IM is a format used by LabEye and other applications based on the IFUNC
          image processing library.'
        title: im
      edam:format_3594:
        text: edam:format_3594
        description: 'PCD was developed by Kodak. A PCD file contains five different
          resolution (ranging from low to high) of a slide or film negative. Due to
          it PCD is often used by many photographers and graphics professionals for
          high-end printed applications.

          Photo CD format, which is the highest resolution format for images on a
          CD.'
        title: pcd
      edam:format_3595:
        text: edam:format_3595
        description: PCX is an image file format that uses a simple form of run-length
          encoding. It is lossless.
        title: pcx
      edam:format_3596:
        text: edam:format_3596
        description: The PPM format is a lowest common denominator color image file
          format.
        title: ppm
      edam:format_3597:
        text: edam:format_3597
        description: PSD (Photoshop Document) is a proprietary file that allows the
          user to work with the images' individual layers even after the file has
          been saved.
        title: psd
      edam:format_3598:
        text: edam:format_3598
        description: 'The XBM format was replaced by XPM for X11 in 1989.

          X BitMap is a plain text binary image format used by the X Window System
          used for storing cursor and icon bitmaps used in the X GUI.'
        title: xbm
      edam:format_3599:
        text: edam:format_3599
        description: 'Sequence of segments with markers. Begins with byte of 0xFF
          and follows by marker type.

          X PixMap (XPM) is an image file format used by the X Window System, it is
          intended primarily for creating icon pixmaps, and supports transparent pixels.'
        title: xpm
      edam:format_3600:
        text: edam:format_3600
        description: RGB file format is the native raster graphics file format for
          Silicon Graphics workstations.
        title: rgb
      edam:format_3601:
        text: edam:format_3601
        description: The PBM format is a lowest common denominator monochrome file
          format. It serves as the common language of a large family of bitmap image
          conversion filters.
        title: pbm
      edam:format_3602:
        text: edam:format_3602
        description: 'It is designed to be extremely easy to learn and write programs
          for.

          The PGM format is a lowest common denominator grayscale file format.'
        title: pgm
      edam:format_3603:
        text: edam:format_3603
        description: 'It iis expected to replace the Graphics Interchange Format (GIF).

          PNG is a file format for image compression.'
        title: PNG
      edam:format_3604:
        text: edam:format_3604
        description: 'Scalable Vector Graphics (SVG) is an XML-based vector image
          format for two-dimensional graphics with support for interactivity and animation.

          The SVG specification is an open standard developed by the World Wide Web
          Consortium (W3C) since 1999.'
        title: SVG
      edam:format_3605:
        text: edam:format_3605
        description: 'Sun Raster is a raster graphics file format used on SunOS by
          Sun Microsystems.

          The SVG specification is an open standard developed by the World Wide Web
          Consortium (W3C) since 1999.'
        title: rast
      edam:format_3606:
        text: edam:format_3606
        description: Textual report format for sequence quality for reports from sequencing
          machines.
        title: Sequence quality report format (text)
      edam:format_3607:
        text: edam:format_3607
        description: 'FASTQ format subset for Phred sequencing quality score data
          only (no sequences).

          Phred quality scores are defined as a property which is logarithmically
          related to the base-calling error probabilities.'
        title: qual
      edam:format_3608:
        text: edam:format_3608
        description: 'FASTQ format subset for Phred sequencing quality score data
          only (no sequences) for Solexa/Illumina 1.0 format.

          Solexa/Illumina 1.0 format can encode a Solexa/Illumina quality score from
          -5 to 62 using ASCII 59 to 126 (although in raw read data Solexa scores
          from -5 to 40 only are expected)'
        title: qualsolexa
      edam:format_3609:
        text: edam:format_3609
        description: 'FASTQ format subset for Phred sequencing quality score data
          only (no sequences) from Illumina 1.5 and before Illumina 1.8.

          Starting in Illumina 1.5 and before Illumina 1.8, the Phred scores 0 to
          2 have a slightly different meaning. The values 0 and 1 are no longer used
          and the value 2, encoded by ASCII 66 "B", is used also at the end of reads
          as a Read Segment Quality Control Indicator.'
        title: qualillumina
      edam:format_3610:
        text: edam:format_3610
        description: 'FASTQ format subset for Phred sequencing quality score data
          only (no sequences) for SOLiD data.

          For SOLiD data, the sequence is in color space, except the first position.
          The quality values are those of the Sanger format.'
        title: qualsolid
      edam:format_3611:
        text: edam:format_3611
        description: FASTQ format subset for Phred sequencing quality score data only
          (no sequences) from 454 sequencers.
        title: qual454
      edam:format_3612:
        text: edam:format_3612
        description: 'Format that covers both the broad peak format and narrow peak
          format from ENCODE.

          Human ENCODE peak format.'
        title: ENCODE peak format
      edam:format_3613:
        text: edam:format_3613
        description: 'Format that covers both the broad peak format and narrow peak
          format from ENCODE.

          Human ENCODE narrow peak format.'
        title: ENCODE narrow peak format
      edam:format_3614:
        text: edam:format_3614
        description: Human ENCODE broad peak format.
        title: ENCODE broad peak format
      edam:format_3615:
        text: edam:format_3615
        description: 'BAM files are compressed using a variant of GZIP (GNU ZIP),
          into a format called BGZF (Blocked GNU Zip Format).

          Blocked GNU Zip format.'
        title: bgzip
      edam:format_3616:
        text: edam:format_3616
        description: TAB-delimited genome position file index format.
        title: tabix
      edam:format_3617:
        text: edam:format_3617
        description: Data format for graph data.
        title: Graph format
      edam:format_3618:
        text: edam:format_3618
        description: XML-based format used to store graph descriptions within Galaxy.
        title: xgmml
      edam:format_3619:
        text: edam:format_3619
        description: SIF (simple interaction file) Format - a network/pathway format
          used for instance in cytoscape.
        title: sif
      edam:format_3620:
        text: edam:format_3620
        description: MS Excel spreadsheet format consisting of a set of XML documents
          stored in a ZIP-compressed file.
        title: xlsx
      edam:format_3621:
        text: edam:format_3621
        description: Data format used by the SQLite database.
        title: SQLite format
      edam:format_3622:
        text: edam:format_3622
        description: Data format used by the SQLite database conformant to the Gemini
          schema.
        title: Gemini SQLite format
      edam:format_3624:
        text: edam:format_3624
        description: An index of a genome database, indexed for use by the snpeff
          tool.
        title: snpeffdb
      edam:format_3626:
        text: edam:format_3626
        description: Binary format used by MATLAB files to store workspace variables.
        title: MAT
      edam:format_3650:
        text: edam:format_3650
        description: 'Format used by netCDF software library for writing and reading
          chromatography-MS data files. Also used to store trajectory atom coordinates
          information, such as the ones obtained by Molecular Dynamics simulations.

          Network Common Data Form (NetCDF) library is supported by AMBER MD package
          from version 9.'
        title: NetCDF
      edam:format_3651:
        text: edam:format_3651
        description: 'Files includes *m*/*z*, intensity pairs separated by headers;
          headers can contain a bit more information, including search engine instructions.

          Mascot Generic Format. Encodes multiple MS/MS spectra in a single file.'
        title: MGF
      edam:format_3652:
        text: edam:format_3652
        description: 'Each file contains one header line for the known or assumed
          charge and the mass of the precursor peptide ion, calculated from the measured
          *m*/*z* and the charge. This one line was then followed by all the *m*/*z*,
          intensity pairs that represent the spectrum.

          Spectral data format file where each spectrum is written to a separate file.'
        title: dta
      edam:format_3653:
        text: edam:format_3653
        description: 'Differ from .dta only in subtleties of the header line format
          and content and support the added feature of being able to.

          Spectral data file similar to dta.'
        title: pkl
      edam:format_3654:
        text: edam:format_3654
        description: Common file format for proteomics mass spectrometric data developed
          at the Seattle Proteome Center/Institute for Systems Biology.
        title: mzXML
      edam:format_3655:
        text: edam:format_3655
        description: Open data format for the storage, exchange, and processing of
          peptide sequence assignments of MS/MS scans, intended to provide a common
          data output format for many different MS/MS search engines and subsequent
          peptide-level analyses.
        title: pepXML
      edam:format_3657:
        text: edam:format_3657
        description: Graphical Pathway Markup Language (GPML) is an XML format used
          for exchanging biological pathways.
        title: GPML
      edam:format_3665:
        text: edam:format_3665
        description: A list of k-mers and their occurrences in a dataset. Can also
          be used as an implicit De Bruijn graph.
        title: K-mer countgraph
      edam:format_3681:
        text: edam:format_3681
        description: 'For mass spectrometry-based chemical profiling data (including
          metabolomics), there is a derived (but incompatible) format mzTab-M (also
          named mzTab 2.0, http://edamontology.org/format_4058), and its lipidomics
          version mzTab-L (http://edamontology.org/format_4059).

          For more detailed metadata, there are formats such as mzIdentML (http://edamontology.org/format_3247)
          and mzQuantML (http://edamontology.org/format_3248).

          The reference implementation of mzTab in Java is https://github.com/PRIDE-Archive/jmzTab
          (maintenance stopped in 2022).

          mzTab is a light-weight, tab-delimited format for mass spectrometry-based
          proteomics data.

          mzTab is alternatively named mzTab 1.0, as opposed to mzTab 2.0 (and 2.1),
          which is the incompatible mzTab-M format for chemical profiling e.g. metabolomics.'
        title: mzTab
      edam:format_3682:
        text: edam:format_3682
        description: 'imzML data are recorded in 2 files: ''.imzXML'' (this concept)
          is a metadata XML file based on mzML by HUPO-PSI, and ''.ibd'' (http://edamontology.org/format_3839)
          is a binary file containing the mass spectra. This entry is for the metadata
          XML file.

          imzML metadata is a data format for mass spectrometry imaging metadata.'
        title: imzML metadata file
      edam:format_3683:
        text: edam:format_3683
        description: 'The focus of qcML is towards mass spectrometry based proteomics,
          but the format is suitable for metabolomics and sequencing as well.

          qcML is an XML format for quality-related data of mass spectrometry and
          other high-throughput measurements.'
        title: qcML
      edam:format_3684:
        text: edam:format_3684
        description: PRIDE XML is an XML format for mass spectra, peptide and protein
          identifications, and metadata about a corresponding measurement, sample,
          experiment.
        title: PRIDE XML
      edam:format_3685:
        text: edam:format_3685
        description: Simulation Experiment Description Markup Language (SED-ML) is
          an XML format for encoding simulation setups, according to the MIASE (Minimum
          Information About a Simulation Experiment) requirements.
        title: SED-ML
      edam:format_3686:
        text: edam:format_3686
        description: 'An OMEX file is a ZIP container that includes a manifest file,
          listing the content of the archive, an optional metadata file adding information
          about the archive and its content, and the files describing the model. OMEX
          is one of the standardised formats within COMBINE (Computational Modeling
          in Biology Network).

          Open Modeling EXchange format (OMEX) is a ZIPped format for encapsulating
          all information necessary for a modeling and simulation project in systems
          biology.'
        title: COMBINE OMEX
      edam:format_3687:
        text: edam:format_3687
        description: 'ISA-TAB is based on MAGE-TAB. Other than tabular, the ISA model
          can also be represented in RDF, and in JSON (compliable with a set of defined
          JSON Schemata).

          The Investigation / Study / Assay (ISA) tab-delimited (TAB) format incorporates
          metadata from experiments employing a combination of technologies.'
        title: ISA-TAB
      edam:format_3688:
        text: edam:format_3688
        description: SBtab is a tabular format for biochemical network models.
        title: SBtab
      edam:format_3689:
        text: edam:format_3689
        description: Biological Connection Markup Language (BCML) is an XML format
          for biological pathways.
        title: BCML
      edam:format_3690:
        text: edam:format_3690
        description: Biological Dynamics Markup Language (BDML) is an XML format for
          quantitative data describing biological dynamics.
        title: BDML
      edam:format_3691:
        text: edam:format_3691
        description: Biological Expression Language (BEL) is a textual format for
          representing scientific findings in life sciences in a computable form.
        title: BEL
      edam:format_3692:
        text: edam:format_3692
        description: SBGN-ML is an XML format for Systems Biology Graphical Notation
          (SBGN) diagrams of biological pathways or networks.
        title: SBGN-ML
      edam:format_3693:
        text: edam:format_3693
        description: AGP is a tabular format for a sequence assembly (a contig, a
          scaffold/supercontig, or a chromosome).
        title: AGP
      edam:format_3696:
        text: edam:format_3696
        description: PostScript format.
        title: PS
      edam:format_3698:
        text: edam:format_3698
        description: SRA archive format (SRA) is the archive format used for input
          to the NCBI Sequence Read Archive.
        title: SRA format
      edam:format_3699:
        text: edam:format_3699
        description: VDB ('vertical database') is the native format used for export
          from the NCBI Sequence Read Archive.
        title: VDB
      edam:format_3701:
        text: edam:format_3701
        description: A five-column, tab-delimited table of feature locations and qualifiers
          for importing annotation into an existing Sequin submission (an NCBI tool
          for submitting and updating GenBank entries).
        title: Sequin format
      edam:format_3702:
        text: edam:format_3702
        description: 'Proprietary mass-spectrometry format of Thermo Scientific''s
          ProteomeDiscoverer software.

          This format corresponds to an SQLite database, and you can look into the
          files with e.g. SQLiteStudio3. There are also some readers (http://doi.org/10.1021/pr2005154)
          and converters (http://doi.org/10.1016/j.jprot.2015.06.015) for this format
          available, which re-engineered the database schema, but there is no official
          DB schema specification of Thermo Scientific for the format.'
        title: MSF
      edam:format_3706:
        text: edam:format_3706
        description: Data format for biodiversity data.
        title: Biodiversity data format
      edam:format_3708:
        text: edam:format_3708
        description: Exchange format of the Access to Biological Collections Data
          (ABCD) Schema; a standard for the access to and exchange of data about specimens
          and observations (primary biodiversity data).
        title: ABCD format
      edam:format_3709:
        text: edam:format_3709
        description: Tab-delimited text files of GenePattern that contain a column
          for each sample, a row for each gene, and an expression value for each gene
          in each sample.
        title: GCT/Res format
      edam:format_3710:
        text: edam:format_3710
        description: Mass spectrum file format from QSTAR and QTRAP instruments (ABI/Sciex).
        title: WIFF format
      edam:format_3711:
        text: edam:format_3711
        description: Output format used by X! series search engines that is based
          on the XML language BIOML.
        title: X!Tandem XML
      edam:format_3712:
        text: edam:format_3712
        description: 'Proprietary file format for mass spectrometry data from Thermo
          Scientific.

          Proprietary format for which documentation is not available.'
        title: Thermo RAW
      edam:format_3713:
        text: edam:format_3713
        description: '"Raw" result file from Mascot database search.'
        title: Mascot .dat file
      edam:format_3714:
        text: edam:format_3714
        description: Format of peak list files from Andromeda search engine (MaxQuant)
          that consist of arbitrarily many spectra.
        title: MaxQuant APL peaklist format
      edam:format_3725:
        text: edam:format_3725
        description: 'SBOL introduces a standardised format for the electronic exchange
          of information on the structural and functional aspects of biological designs.

          Synthetic Biology Open Language (SBOL) is an XML format for the specification
          and exchange of biological design information in synthetic biology.'
        title: SBOL
      edam:format_3726:
        text: edam:format_3726
        description: 'One or more mining models can be contained in a PMML document.

          PMML uses XML to represent mining models. The structure of the models is
          described by an XML Schema.'
        title: PMML
      edam:format_3727:
        text: edam:format_3727
        description: 'An OME-TIFF dataset consists of one or more files in standard
          TIFF or BigTIFF format, with the file extension .ome.tif or .ome.tiff, and
          an identical (or in the case of multiple files, nearly identical) string
          of OME-XML metadata embedded in the ImageDescription tag of each file''s
          first IFD (Image File Directory). BigTIFF file extensions are also permitted,
          with the file extension .ome.tf2, .ome.tf8 or .ome.btf, but note these file
          extensions are an addition to the original specification, and software using
          an older version of the specification may not be able to handle these file
          extensions.

          Image file format used by the Open Microscopy Environment (OME).

          OME develops open-source software and data format standards for the storage
          and manipulation of biological microscopy data. It is a joint project between
          universities, research establishments, industry and the software development
          community.'
        title: OME-TIFF
      edam:format_3728:
        text: edam:format_3728
        description: 'Format for multiple aligned or single sequences together with
          the probabilistic description of the (consensus) RNA secondary structure
          ensemble by probabilities of base pairs, base pair stackings, and base pairs
          and unpaired bases in the loop of base pairs.

          The LocARNA PP format combines sequence or alignment information and (respectively,
          single or consensus) ensemble probabilities into an PP 2.0 record.'
        title: LocARNA PP
      edam:format_3729:
        text: edam:format_3729
        description: 'Input format used by the Database of Genotypes and Phenotypes
          (dbGaP).

          The Database of Genotypes and Phenotypes (dbGaP) is a National Institutes
          of Health (NIH) sponsored repository charged to archive, curate and distribute
          information produced by studies investigating the interaction of genotype
          and phenotype.'
        title: dbGaP format
      edam:format_3746:
        text: edam:format_3746
        description: 'BIOM is a recognised standard for the Earth Microbiome Project,
          and is a project supported by Genomics Standards Consortium. Supported in
          QIIME, Mothur, MEGAN, etc.

          The BIological Observation Matrix (BIOM) is a format for representing biological
          sample by observation contingency tables in broad areas of comparative omics.
          The primary use of this format is to represent OTU tables and metagenome
          tables.'
        title: BIOM format
      edam:format_3747:
        text: edam:format_3747
        description: 'A format for storage, exchange, and processing of protein identifications
          created from ms/ms-derived peptide sequence data.

          No human-consumable information about this format is available (see http://tools.proteomecenter.org/wiki/index.php?title=Formats:protXML).'
        title: protXML
      edam:format_3748:
        text: edam:format_3748
        description: A linked data format enables publishing structured data as linked
          data (Linked Data), so that the data can be interlinked and become more
          useful through semantic queries.
        title: Linked data format
      edam:format_3749:
        text: edam:format_3749
        description: JSON-LD, or JavaScript Object Notation for Linked Data, is a
          method of encoding Linked Data using JSON.
        title: JSON-LD
      edam:format_3750:
        text: edam:format_3750
        description: 'Data in YAML format can be serialised into text, or binary format.

          YAML (YAML Ain''t Markup Language) is a human-readable tree-structured data
          serialisation language.

          YAML version 1.2 is a superset of JSON; prior versions were "not strictly
          compatible".'
        title: YAML
      edam:format_3751:
        text: edam:format_3751
        description: Tabular data represented as values in a text file delimited by
          some character.
        title: DSV
      edam:format_3752:
        text: edam:format_3752
        description: Tabular data represented as comma-separated values in a text
          file.
        title: CSV
      edam:format_3758:
        text: edam:format_3758
        description: '"Raw" result file from SEQUEST database search.'
        title: SEQUEST .out file
      edam:format_3764:
        text: edam:format_3764
        description: XML file format for files containing information about peptide
          identifications from mass spectrometry data analysis carried out with OpenMS.
        title: idXML
      edam:format_3765:
        text: edam:format_3765
        description: Data table formatted such that it can be passed/streamed within
          the KNIME platform.
        title: KNIME datatable format
      edam:format_3770:
        text: edam:format_3770
        description: UniProtKB XML sequence features format is an XML format available
          for downloading UniProt entries.
        title: UniProtKB XML
      edam:format_3771:
        text: edam:format_3771
        description: UniProtKB RDF sequence features format is an RDF format available
          for downloading UniProt entries (in RDF/XML).
        title: UniProtKB RDF
      edam:format_3772:
        text: edam:format_3772
        description: 'BioJSON is a BioXSD-schema-based JSON format of sequence-based
          data and some other common data - sequence records, alignments, feature
          records, references to resources, and more - optimised for integrative bioinformatics,
          web applications and APIs, and object-oriented programming.

          Work in progress. ''BioXSD'' belongs to the ''BioXSD|GTrack'' ecosystem
          of generic formats. ''BioJSON'' is the JSON format based on the common,
          unified ''BioXSD data model'', a.k.a. ''BioXSD|BioJSON|BioYAML''.'
        title: BioJSON (BioXSD)
      edam:format_3773:
        text: edam:format_3773
        description: 'BioYAML is a BioXSD-schema-based YAML format of sequence-based
          data and some other common data - sequence records, alignments, feature
          records, references to resources, and more - optimised for integrative bioinformatics,
          web APIs, human readability and editing, and object-oriented programming.

          Work in progress. ''BioXSD'' belongs to the ''BioXSD|GTrack'' ecosystem
          of generic formats. ''BioYAML'' is the YAML format based on the common,
          unified ''BioXSD data model'', a.k.a. ''BioXSD|BioJSON|BioYAML''.'
        title: BioYAML
      edam:format_3774:
        text: edam:format_3774
        description: BioJSON is a JSON format of single multiple sequence alignments,
          with their annotations, features, and custom visualisation and application
          settings for the Jalview workbench.
        title: BioJSON (Jalview)
      edam:format_3775:
        text: edam:format_3775
        description: '''GSuite'' belongs to the ''BioXSD|GTrack'' ecosystem of generic
          formats, and particular to its subset, the ''GTrack ecosystem'' (GTrack,
          GSuite, BTrack). ''GSuite'' is the tabular format for an annotated collection
          of individual GTrack files.

          GSuite is a tabular format for collections of genome or sequence feature
          tracks, suitable for integrative multi-track analysis. GSuite contains links
          to genome/sequence tracks, with additional metadata.'
        title: GSuite
      edam:format_3776:
        text: edam:format_3776
        description: '''BTrack'' belongs to the ''BioXSD|GTrack'' ecosystem of generic
          formats, and particular to its subset, the ''GTrack ecosystem'' (GTrack,
          GSuite, BTrack). ''BTrack'' is the binary, optionally compressed HDF5-based
          version of the GTrack and GSuite formats.

          BTrack is an HDF5-based binary format for genome or sequence feature tracks
          and their collections, suitable for integrative multi-track analysis. BTrack
          is a binary, compressed alternative to the GTrack and GSuite formats.'
        title: BTrack
      edam:format_3777:
        text: edam:format_3777
        description: 'Multi-Crop Passport Descriptors is a format available in 2 successive
          versions, V.1 (FAO/IPGRI 2001) and V.2 (FAO/Bioversity 2012).

          The FAO/Bioversity/IPGRI Multi-Crop Passport Descriptors (MCPD) is an international
          standard format for exchange of germplasm information.'
        title: MCPD
      edam:format_3780:
        text: edam:format_3780
        description: Data format of an annotated text, e.g. with recognised entities,
          concepts, and relations.
        title: Annotated text format
      edam:format_3781:
        text: edam:format_3781
        description: JSON format of annotated scientific text used by PubAnnotations
          and other tools.
        title: PubAnnotation format
      edam:format_3782:
        text: edam:format_3782
        description: BioC is a standardised XML format for sharing and integrating
          text data and annotations.
        title: BioC
      edam:format_3783:
        text: edam:format_3783
        description: Native textual export format of annotated scientific text from
          PubTator.
        title: PubTator format
      edam:format_3784:
        text: edam:format_3784
        description: A format of text annotation using the linked-data Open Annotation
          Data Model, serialised typically in RDF or JSON-LD.
        title: Open Annotation format
      edam:format_3785:
        text: edam:format_3785
        description: A family of similar formats of text annotation, used by BRAT
          and other tools, known as BioNLP Shared Task format (BioNLP 2009 Shared
          Task on Event Extraction, BioNLP Shared Task 2011, BioNLP Shared Task 2013),
          BRAT format, BRAT standoff format, and similar.
        title: BioNLP Shared Task format
      edam:format_3787:
        text: edam:format_3787
        description: A query language (format) for structured database queries.
        title: Query language
      edam:format_3788:
        text: edam:format_3788
        description: SQL (Structured Query Language) is the de-facto standard query
          language (format of queries) for querying and manipulating data in relational
          databases.
        title: SQL
      edam:format_3789:
        text: edam:format_3789
        description: XQuery (XML Query) is a query language (format of queries) for
          querying and manipulating structured and unstructured data, usually in the
          form of XML, text, and with vendor-specific extensions for other data formats
          (JSON, binary, etc.).
        title: XQuery
      edam:format_3790:
        text: edam:format_3790
        description: SPARQL (SPARQL Protocol and RDF Query Language) is a semantic
          query language for querying and manipulating data stored in Resource Description
          Framework (RDF) format.
        title: SPARQL
      edam:format_3804:
        text: edam:format_3804
        description: XML format for XML Schema.
        title: xsd
      edam:format_3811:
        text: edam:format_3811
        description: XMFA format stands for eXtended Multi-FastA format and is used
          to store collinear sub-alignments that constitute a single genome alignment.
        title: XMFA
      edam:format_3812:
        text: edam:format_3812
        description: The GEN file format contains genetic data and describes SNPs.
        title: GEN
      edam:format_3813:
        text: edam:format_3813
        description: The SAMPLE file format contains information about each individual
          i.e. individual IDs, covariates, phenotypes and missing data proportions,
          from a GWAS study.
        title: SAMPLE file format
      edam:format_3814:
        text: edam:format_3814
        description: SDF is one of a family of chemical-data file formats developed
          by MDL Information Systems; it is intended especially for structural information.
        title: SDF
      edam:format_3815:
        text: edam:format_3815
        description: An MDL Molfile is a file format for holding information about
          the atoms, bonds, connectivity and coordinates of a molecule.
        title: Molfile
      edam:format_3816:
        text: edam:format_3816
        description: Complete, portable representation of a SYBYL molecule. ASCII
          file which contains all the information needed to reconstruct a SYBYL molecule.
        title: Mol2
      edam:format_3817:
        text: edam:format_3817
        description: 'format for the LaTeX document preparation system.

          uses the TeX typesetting program format'
        title: latex
      edam:format_3818:
        text: edam:format_3818
        description: Tab-delimited text file format used by Eland - the read-mapping
          program distributed by Illumina with its sequencing analysis pipeline -
          which maps short Solexa sequence reads to the human reference genome.
        title: ELAND format
      edam:format_3819:
        text: edam:format_3819
        description: 'It differs from Phylip Format (format_1997) on length of the
          ID sequence. There no length restrictions on the ID, but whitespaces aren''t
          allowed in the sequence ID/Name because one space separates the longest
          ID and the beginning of the sequence. Sequences IDs must be padded to the
          longest ID length.

          Phylip multiple alignment sequence format, less stringent than PHYLIP format.'
        title: Relaxed PHYLIP Interleaved
      edam:format_3820:
        text: edam:format_3820
        description: 'It differs from Phylip sequential format (format_1997) on length
          of the ID sequence. There no length restrictions on the ID, but whitespaces
          aren''t allowed in the sequence ID/Name because one space separates the
          longest ID and the beginning of the sequence. Sequences IDs must be padded
          to the longest ID length.

          Phylip multiple alignment sequence format, less stringent than PHYLIP sequential
          format (format_1998).'
        title: Relaxed PHYLIP Sequential
      edam:format_3821:
        text: edam:format_3821
        description: Default XML format of VisANT, containing all the network information.
        title: VisML
      edam:format_3822:
        text: edam:format_3822
        description: GML (Graph Modeling Language) is a text file format supporting
          network data with a very easy syntax. It is used by Graphlet, Pajek, yEd,
          LEDA and NetworkX.
        title: GML
      edam:format_3823:
        text: edam:format_3823
        description: 'FASTG is a format for faithfully representing genome assemblies
          in the face of allelic polymorphism and assembly uncertainty.

          It is called FASTG, like FASTA, but the G stands for "graph".'
        title: FASTG
      edam:format_3824:
        text: edam:format_3824
        description: Data format for raw data from a nuclear magnetic resonance (NMR)
          spectroscopy experiment.
        title: NMR data format
      edam:format_3825:
        text: edam:format_3825
        description: nmrML is an MSI supported XML-based open access format for metabolomics
          NMR raw and processed spectral data. It is accompanies by an nmrCV (controlled
          vocabulary) to allow ontology-based annotations.
        title: nmrML
      edam:format_3826:
        text: edam:format_3826
        description: . proBAM is an adaptation of BAM (format_2572), which was extended
          to meet specific requirements entailed by proteomics data.
        title: proBAM
      edam:format_3827:
        text: edam:format_3827
        description: . proBED is an adaptation of BED (format_3003), which was extended
          to meet specific requirements entailed by proteomics data.
        title: proBED
      edam:format_3828:
        text: edam:format_3828
        description: Data format for raw microarray data.
        title: Raw microarray data format
      edam:format_3829:
        text: edam:format_3829
        description: GenePix Results (GPR) text file format developed by Axon Instruments
          that is used to save GenePix Results data.
        title: GPR
      edam:format_3830:
        text: edam:format_3830
        description: Binary format used by the ARB software suite.
        title: ARB
      edam:format_3832:
        text: edam:format_3832
        description: OpenMS format for grouping features in one map or across several
          maps.
        title: consensusXML
      edam:format_3833:
        text: edam:format_3833
        description: OpenMS format for quantitation results (LC/MS features).
        title: featureXML
      edam:format_3834:
        text: edam:format_3834
        description: Now deprecated data format of the HUPO Proteomics Standards Initiative.
          Replaced by mzML (format_3244).
        title: mzData
      edam:format_3835:
        text: edam:format_3835
        description: Format supported by the Tide tool for identifying peptides from
          tandem mass spectra.
        title: TIDE TXT
      edam:format_3836:
        text: edam:format_3836
        description: XML format as produced by the NCBI Blast package v2.
        title: BLAST XML v2 results format
      edam:format_3838:
        text: edam:format_3838
        description: Microsoft Powerpoint format.
        title: pptx
      edam:format_3839:
        text: edam:format_3839
        description: 'ibd is a data format for mass spectrometry imaging data.

          imzML data is recorded in 2 files: ''.imzXML'' (http://edamontology.org/format_3682)
          is a metadata XML file based on mzML by HUPO-PSI, and ''.ibd'' (this concept)
          is a binary file containing the mass spectra.'
        title: ibd
      edam:format_3841:
        text: edam:format_3841
        description: Data format used in Natural Language Processing.
        title: NLP format
      edam:format_3843:
        text: edam:format_3843
        description: XML input file format for BEAST Software (Bayesian Evolutionary
          Analysis Sampling Trees).
        title: BEAST
      edam:format_3844:
        text: edam:format_3844
        description: Chado-XML format is a direct mapping of the Chado relational
          schema into XML.
        title: Chado-XML
      edam:format_3845:
        text: edam:format_3845
        description: 'An alignment format generated by PRANK/PRANKSTER consisting
          of four elements: newick, nodes, selection and model.'
        title: HSAML
      edam:format_3846:
        text: edam:format_3846
        description: Output xml file from the InterProScan sequence analysis application.
        title: InterProScan XML
      edam:format_3847:
        text: edam:format_3847
        description: The KEGG Markup Language (KGML) is an exchange format of the
          KEGG pathway maps, which is converted from internally used KGML+ (KGML+SVG)
          format.
        title: KGML
      edam:format_3848:
        text: edam:format_3848
        description: XML format for collected entries from bibliographic databases
          MEDLINE and PubMed.
        title: PubMed XML
      edam:format_3849:
        text: edam:format_3849
        description: A set of XML compliant markup components for describing multiple
          sequence alignments.
        title: MSAML
      edam:format_3850:
        text: edam:format_3850
        description: OrthoXML is designed broadly to allow the storage and comparison
          of orthology data from any ortholog database. It establishes a structure
          for describing orthology relationships while still allowing flexibility
          for database-specific information to be encapsulated in the same format.
        title: OrthoXML
      edam:format_3851:
        text: edam:format_3851
        description: Tree structure of Protein Sequence Database Markup Language generated
          using Matra software.
        title: PSDML
      edam:format_3852:
        text: edam:format_3852
        description: SeqXML is an XML Schema to describe biological sequences, developed
          by the Stockholm Bioinformatics Centre.
        title: SeqXML
      edam:format_3853:
        text: edam:format_3853
        description: XML format for the UniParc database.
        title: UniParc XML
      edam:format_3854:
        text: edam:format_3854
        description: XML format for the UniRef reference clusters.
        title: UniRef XML
      edam:format_3857:
        text: edam:format_3857
        description: Common Workflow Language (CWL) format for description of command-line
          tools and workflows.
        title: CWL
      edam:format_3858:
        text: edam:format_3858
        description: 'Proprietary file format for mass spectrometry data from Waters.

          Proprietary format for which documentation is not available, but used by
          multiple tools.'
        title: Waters RAW
      edam:format_3859:
        text: edam:format_3859
        description: 'A standardized file format for data exchange in mass spectrometry,
          initially developed for infrared spectrometry.

          JCAMP-DX is an ASCII based format and therefore not very compact even though
          it includes standards for file compression.'
        title: JCAMP-DX
      edam:format_3862:
        text: edam:format_3862
        description: An NLP format used for annotated textual documents.
        title: NLP annotation format
      edam:format_3863:
        text: edam:format_3863
        description: NLP format used by a specific type of corpus (collection of texts).
        title: NLP corpus format
      edam:format_3864:
        text: edam:format_3864
        description: 'mirGFF3 is a common format for microRNA data resulting from
          small-RNA RNA-Seq workflows.

          mirGFF3 is a specialisation of GFF3; produced by small-RNA-Seq analysis
          workflows, usable and convertible with the miRTop API (https://mirtop.readthedocs.io/en/latest/),
          and consumable by tools for downstream analysis.'
        title: mirGFF3
      edam:format_3865:
        text: edam:format_3865
        description: A "placeholder" concept for formats of annotated RNA data, including
          e.g. microRNA and RNA-Seq data.
        title: RNA annotation format
      edam:format_3866:
        text: edam:format_3866
        description: 'File format to store trajectory information for a 3D structure
          .

          Formats differ on what they are able to store (coordinates, velocities,
          topologies) and how they are storing it (raw, compressed, textual, binary).'
        title: Trajectory format
      edam:format_3867:
        text: edam:format_3867
        description: Binary file format to store trajectory information for a 3D structure
          .
        title: Trajectory format (binary)
      edam:format_3868:
        text: edam:format_3868
        description: Textual file format to store trajectory information for a 3D
          structure .
        title: Trajectory format (text)
      edam:format_3873:
        text: edam:format_3873
        description: 'HDF is currently supported by many commercial and non-commercial
          software platforms such as Java, MATLAB/Scilab, Octave, Python and R.

          HDF is the name of a set of file formats and libraries designed to store
          and organize large amounts of numerical data, originally developed at the
          National Center for Supercomputing Applications at the University of Illinois.'
        title: HDF
      edam:format_3874:
        text: edam:format_3874
        description: 'PCAZip format is a binary compressed file to store atom coordinates
          based on Essential Dynamics (ED) and Principal Component Analysis (PCA).

          The compression is made projecting the Cartesian snapshots collected along
          the trajectory into an orthogonal space defined by the most relevant eigenvectors
          obtained by diagonalization of the covariance matrix (PCA). In the compression/decompression
          process, part of the original information is lost, depending on the final
          number of eigenvectors chosen. However, with a reasonable choice of the
          set of eigenvectors the compression typically reduces the trajectory file
          to less than one tenth of their original size with very acceptable loss
          of information. Compression with PCAZip can only be applied to unsolvated
          structures.'
        title: PCAzip
      edam:format_3875:
        text: edam:format_3875
        description: 'Portable binary format for trajectories produced by GROMACS
          package.

          XTC uses the External Data Representation (xdr) routines for writing and
          reading data which were created for the Unix Network File System (NFS).
          XTC files use a reduced precision (lossy) algorithm which works multiplying
          the coordinates by a scaling factor (typically 1000), so converting them
          to pm (GROMACS standard distance unit is nm). This allows an integer rounding
          of the values. Several other tricks are performed, such as making use of
          atom proximity information: atoms close in sequence are usually close in
          space (e.g. water molecules). That makes XTC format the most efficient in
          terms of disk usage, in most cases reducing by a factor of 2 the size of
          any other binary trajectory format.'
        title: XTC
      edam:format_3876:
        text: edam:format_3876
        description: 'Fully architecture-independent format, regarding both endianness
          and the ability to mix single/double precision trajectories and I/O libraries.
          Self-sufficient, it should not require any other files for reading, and
          all the data should be contained in a single file for easy transport. Temporal
          compression of data, improving the compression rate of the previous XTC
          format. Possibility to store meta-data with information about the simulation.
          Direct access to a particular frame. Efficient parallel I/O.

          Trajectory Next Generation (TNG) is a format for storage of molecular simulation
          data. It is designed and implemented by the GROMACS development group, and
          it is called to be the substitute of the XTC format.'
        title: TNG
      edam:format_3877:
        text: edam:format_3877
        description: 'The XYZ chemical file format is widely supported by many programs,
          although many slightly different XYZ file formats coexist (Tinker XYZ, UniChem
          XYZ, etc.). Basic information stored for each atom in the system are x,
          y and z coordinates and atom element/atomic number.

          XYZ files are structured in this way: First line contains the number of
          atoms in the file. Second line contains a title, comment, or filename. Remaining
          lines contain atom information. Each line starts with the element symbol,
          followed by x, y and z coordinates in angstroms separated by whitespace.
          Multiple molecules or frames can be contained within one file, so it supports
          trajectory storage. XYZ files can be directly represented by a molecular
          viewer, as they contain all the basic information needed to build the 3D
          model.'
        title: XYZ
      edam:format_3878:
        text: edam:format_3878
        description: AMBER trajectory (also called mdcrd), with 10 coordinates per
          line and format F8.3 (fixed point notation with field width 8 and 3 decimal
          places).
        title: mdcrd
      edam:format_3879:
        text: edam:format_3879
        description: 'Format of topology files; containing the static information
          of a structure molecular system that is needed for a molecular simulation.

          Many different file formats exist describing structural molecular topology.
          Typically, each MD package or simulation software works with their own implementation
          (e.g. GROMACS top, CHARMM psf, AMBER prmtop).'
        title: Topology format
      edam:format_3880:
        text: edam:format_3880
        description: 'GROMACS MD package top textual files define an entire structure
          system topology, either directly, or by including itp files.

          There is currently no tool available for conversion between GROMACS topology
          format and other formats, due to the internal differences in both approaches.
          There is, however, a method to convert small molecules parameterized with
          AMBER force-field into GROMACS format, allowing simulations of these systems
          with GROMACS MD package.'
        title: GROMACS top
      edam:format_3881:
        text: edam:format_3881
        description: 'AMBER Prmtop file (version 7) is a structure topology text file
          divided in several sections designed to be parsed easily using simple Fortran
          code. Each section contains particular topology information, such as atom
          name, charge, mass, angles, dihedrals, etc.

          It can be modified manually, but as the size of the system increases, the
          hand-editing becomes increasingly complex. AMBER Parameter-Topology file
          format is used extensively by the AMBER software suite and is referred to
          as the Prmtop file for short.

          version 7 is written to distinguish it from old versions of AMBER Prmtop.
          Similarly to HDF5, it is a completely different format, according to AMBER
          group: a drastic change to the file format occurred with the 2004 release
          of Amber 7 (http://ambermd.org/prmtop.pdf)'
        title: AMBER top
      edam:format_3882:
        text: edam:format_3882
        description: 'The high similarity in the functional form of the two potential
          energy functions used by AMBER and CHARMM force-fields gives rise to the
          possible use of one force-field within the other MD engine. Therefore, the
          conversion of PSF files to AMBER Prmtop format is possible with the use
          of AMBER chamber (CHARMM - AMBER) program.

          X-Plor Protein Structure Files (PSF) are structure topology files used by
          NAMD and CHARMM molecular simulations programs. PSF files contain six main
          sections of interest: atoms, bonds, angles, dihedrals, improper dihedrals
          (force terms used to maintain planarity) and cross-terms.'
        title: PSF
      edam:format_3883:
        text: edam:format_3883
        description: 'GROMACS itp files (include topology) contain structure topology
          information, and are typically included in GROMACS topology files (GROMACS
          top). Itp files are used to define individual (or multiple) components of
          a topology as a separate file. This is particularly useful if there is a
          molecule that is used frequently, and also reduces the size of the system
          topology file, splitting it in different parts.

          GROMACS itp files are used also to define position restrictions on the molecule,
          or to define the force field parameters for a particular ligand.'
        title: GROMACS itp
      edam:format_3884:
        text: edam:format_3884
        description: 'Format of force field parameter files, which store the set of
          parameters (charges, masses, radii, bond lengths, bond dihedrals, etc.)
          that are essential for the proper description and simulation of a molecular
          system.

          Many different file formats exist describing force field parameters. Typically,
          each MD package or simulation software works with their own implementation
          (e.g. GROMACS itp, CHARMM rtf, AMBER off / frcmod).'
        title: FF parameter format
      edam:format_3885:
        text: edam:format_3885
        description: 'It is basically a translation of the ASCII atom coordinate format
          to binary code. The only additional information stored is a magic number
          that identifies the BinPos format and the number of atoms per snapshot.
          The remainder is the chain of coordinates binary encoded. A drawback of
          this format is its architecture dependency. Integers and floats codification
          depends on the architecture, thus it needs to be converted if working in
          different platforms (little endian, big endian).

          Scripps Research Institute BinPos format is a binary formatted file to store
          atom coordinates.'
        title: BinPos
      edam:format_3886:
        text: edam:format_3886
        description: AMBER coordinate/restart file with 6 coordinates per line and
          decimal format F12.7 (fixed point notation with field width 12 and 7 decimal
          places).
        title: RST
      edam:format_3887:
        text: edam:format_3887
        description: 'Format of CHARMM Residue Topology Files (RTF), which define
          groups by including the atoms, the properties of the group, and bond and
          charge information.

          There is currently no tool available for conversion between GROMACS topology
          format and other formats, due to the internal differences in both approaches.
          There is, however, a method to convert small molecules parameterized with
          AMBER force-field into GROMACS format, allowing simulations of these systems
          with GROMACS MD package.'
        title: CHARMM rtf
      edam:format_3888:
        text: edam:format_3888
        description: AMBER frcmod (Force field Modification) is a file format to store
          any modification to the standard force field needed for a particular molecule
          to be properly represented in the simulation.
        title: AMBER frcmod
      edam:format_3889:
        text: edam:format_3889
        description: AMBER Object File Format library files (OFF library files) store
          residue libraries (forcefield residue parameters).
        title: AMBER off
      edam:format_3906:
        text: edam:format_3906
        description: 'MReData is a text based data standard for processed NMR data.
          It is relying on SDF molecule data and allows to store assignments of NMR
          peaks to molecule features. The NMR-extracted data (or "NMReDATA") includes:
          Chemical shift,scalar coupling, 2D correlation, assignment, etc.

          NMReData is a text based data standard for processed NMR data. It is relying
          on SDF molecule data and allows to store assignments of NMR peaks to molecule
          features. The NMR-extracted data (or "NMReDATA") includes: Chemical shift,scalar
          coupling, 2D correlation, assignment, etc. Find more in the paper at https://doi.org/10.1002/mrc.4527.'
        title: NMReDATA
      edam:format_3909:
        text: edam:format_3909
        description: BpForms is a string format for concretely representing the primary
          structures of biopolymers, including DNA, RNA, and proteins that include
          non-canonical nucleic and amino acids. See https://www.bpforms.org for more
          information.
        title: BpForms
      edam:format_3910:
        text: edam:format_3910
        description: 'Format of trr files that contain the trajectory of a simulation
          experiment used by GROMACS.

          The first 4 bytes of any trr file containing 1993. See https://github.com/galaxyproject/galaxy/pull/6597/files#diff-409951594551183dbf886e24de6cb129R760'
        title: trr
      edam:format_3911:
        text: edam:format_3911
        description: Mash sketch is a format for sequence / sequence checksum information.
          To make a sketch, each k-mer in a sequence is hashed, which creates a pseudo-random
          identifier. By sorting these hashes, a small subset from the top of the
          sorted list can represent the entire sequence.
        title: msh
      edam:format_3913:
        text: edam:format_3913
        description: The Loom file format is based on HDF5, a standard for storing
          large numerical datasets. The Loom format is designed to efficiently hold
          large omics datasets. Typically, such data takes the form of a large matrix
          of numbers, along with metadata for the rows and columns.
        title: Loom
      edam:format_3915:
        text: edam:format_3915
        description: The Zarr format is an implementation of chunked, compressed,
          N-dimensional arrays for storing data.
        title: Zarr
      edam:format_3916:
        text: edam:format_3916
        description: The Matrix Market matrix (MTX) format stores numerical or pattern
          matrices in a dense (array format) or sparse (coordinate format) representation.
        title: MTX
      edam:format_3951:
        text: edam:format_3951
        description: 'BcForms is a format for abstractly describing the molecular
          structure (atoms and bonds) of macromolecular complexes as a collection
          of subunits and crosslinks. Each subunit can be described with BpForms (http://edamontology.org/format_3909)
          or SMILES (http://edamontology.org/data_2301). BcForms uses an ontology
          of crosslinks to abstract the chemical details of crosslinks from the descriptions
          of complexes (see https://bpforms.org/crosslink.html).

          BcForms is related to http://edamontology.org/format_3909. (BcForms uses
          BpForms to describe subunits which are DNA, RNA, or protein polymers.) However,
          that format isn''t the parent of BcForms. BcForms is similarly related to
          SMILES (http://edamontology.org/data_2301).'
        title: BcForms
      edam:format_3956:
        text: edam:format_3956
        description: 'N-Quads is a line-based, plain text format for encoding an RDF
          dataset. It includes information about the graph each triple belongs to.

          N-Quads should not be confused with N-Triples which does not contain graph
          information.'
        title: N-Quads
      edam:format_3969:
        text: edam:format_3969
        description: Vega is a visualization grammar, a declarative language for creating,
          saving, and sharing interactive visualization designs. With Vega, you can
          describe the visual appearance and interactive behavior of a visualization
          in a JSON format, and generate web-based views using Canvas or SVG.
        title: Vega
      edam:format_3970:
        text: edam:format_3970
        description: Vega-Lite is a high-level grammar of interactive graphics. It
          provides a concise JSON syntax for rapidly generating visualizations to
          support analysis. Vega-Lite specifications can be compiled to Vega specifications.
        title: Vega-lite
      edam:format_3971:
        text: edam:format_3971
        description: A model description language for computational neuroscience.
        title: NeuroML
      edam:format_3972:
        text: edam:format_3972
        description: BioNetGen is a format for the specification and simulation of
          rule-based models of biochemical systems, including signal transduction,
          metabolic, and genetic regulatory networks.
        title: BNGL
      edam:format_3973:
        text: edam:format_3973
        description: A Docker image is a file, comprised of multiple layers, that
          is used to execute code in a Docker container. An image is essentially built
          from the instructions for a complete and executable version of an application,
          which relies on the host OS kernel.
        title: Docker image
      edam:format_3975:
        text: edam:format_3975
        description: Graphical Fragment Assembly captures sequence graphs as the product
          of an assembly, a representation of variation in genomes, splice graphs
          in genes, or even overlap between reads from long-read sequencing technology.
        title: GFA 1
      edam:format_3976:
        text: edam:format_3976
        description: Graphical Fragment Assembly captures sequence graphs as the product
          of an assembly, a representation of variation in genomes, splice graphs
          in genes, or even overlap between reads from long-read sequencing technology.
          GFA2 is an update of GFA1 which is not compatible with GFA1.
        title: GFA 2
      edam:format_3977:
        text: edam:format_3977
        description: ObjTables is a toolkit for creating re-usable datasets that are
          both human and machine-readable, combining the ease of spreadsheets (e.g.,
          Excel workbooks) with the rigor of schemas (classes, their attributes, the
          type of each attribute, and the possible relationships between instances
          of classes). ObjTables consists of a format for describing schemas for spreadsheets,
          numerous data types for science, a syntax for indicating the class and attribute
          represented by each table and column in a workbook, and software for using
          schemas to rigorously validate, merge, split, compare, and revision datasets.
        title: ObjTables
      edam:format_3978:
        text: edam:format_3978
        description: The CONTIG format used for output of the SOAPdenovo alignment
          program. It contains contig sequences generated without using mate pair
          information.
        title: CONTIG
      edam:format_3979:
        text: edam:format_3979
        description: WEGO native format used by the Web Gene Ontology Annotation Plot
          application.   Tab-delimited format with gene names and others GO IDs (columns)
          with one annotation record per line.
        title: WEGO
      edam:format_3980:
        text: edam:format_3980
        description: 'For example a 1kb transcript with 1000 alignments in a sample
          of 10 million reads (out of which 8 million reads can be mapped) will have
          RPKM = 1000/(1 * 8) = 125

          Tab-delimited format for gene expression levels table, calculated as Reads
          Per Kilobase per Million (RPKM) mapped reads.'
        title: RPKM
      edam:format_3981:
        text: edam:format_3981
        description: 'For example a 1kb transcript with 1000 alignments in a sample
          of 10 million reads (out of which 8 million reads can be mapped) will have
          RPKM = 1000/(1 * 8) = 125

          TAR archive file format generated by the Unix-based utility tar.'
        title: TAR format
      edam:format_3982:
        text: edam:format_3982
        description: The CHAIN format describes a pairwise alignment that allow gaps
          in both sequences simultaneously and is used by the UCSC Genome Browser.
        title: CHAIN
      edam:format_3983:
        text: edam:format_3983
        description: The NET file format is used to describe the data that underlie
          the net alignment annotations in the UCSC Genome Browser.
        title: NET
      edam:format_3984:
        text: edam:format_3984
        description: Format of QMAP files generated for methylation data from an internal
          BGI pipeline.
        title: QMAP
      edam:format_3985:
        text: edam:format_3985
        description: An emerging format for high-level Galaxy workflow description.
        title: gxformat2
      edam:format_3986:
        text: edam:format_3986
        description: The proprietary native video format of various Microsoft programs
          such as Windows Media Player.
        title: WMV
      edam:format_3987:
        text: edam:format_3987
        description: 'A ZIP file may contain one or more files or directories that
          may have been compressed.

          ZIP is an archive file format that supports lossless data compression.'
        title: ZIP format
      edam:format_3988:
        text: edam:format_3988
        description: 'LSM files are the default data export for the Zeiss LSM series
          confocal microscopes (e.g. LSM 510, LSM 710). In addition to the image data,
          LSM files contain most imaging settings.

