      EDAM:format_3764:
        text: EDAM:format_3764
        description: XML file format for files containing information about peptide
          identifications from mass spectrometry data analysis carried out with OpenMS.
        title: idXML
      EDAM:format_3765:
        text: EDAM:format_3765
        description: Data table formatted such that it can be passed/streamed within
          the KNIME platform.
        title: KNIME datatable format
      EDAM:format_3770:
        text: EDAM:format_3770
        description: UniProtKB XML sequence features format is an XML format available
          for downloading UniProt entries.
        title: UniProtKB XML
      EDAM:format_3771:
        text: EDAM:format_3771
        description: UniProtKB RDF sequence features format is an RDF format available
          for downloading UniProt entries (in RDF/XML).
        title: UniProtKB RDF
      EDAM:format_3772:
        text: EDAM:format_3772
        description: 'BioJSON is a BioXSD-schema-based JSON format of sequence-based
          data and some other common data - sequence records, alignments, feature
          records, references to resources, and more - optimised for integrative bioinformatics,
          web applications and APIs, and object-oriented programming.

          Work in progress. ''BioXSD'' belongs to the ''BioXSD|GTrack'' ecosystem
          of generic formats. ''BioJSON'' is the JSON format based on the common,
          unified ''BioXSD data model'', a.k.a. ''BioXSD|BioJSON|BioYAML''.'
        title: BioJSON (BioXSD)
      EDAM:format_3773:
        text: EDAM:format_3773
        description: 'BioYAML is a BioXSD-schema-based YAML format of sequence-based
          data and some other common data - sequence records, alignments, feature
          records, references to resources, and more - optimised for integrative bioinformatics,
          web APIs, human readability and editing, and object-oriented programming.

          Work in progress. ''BioXSD'' belongs to the ''BioXSD|GTrack'' ecosystem
          of generic formats. ''BioYAML'' is the YAML format based on the common,
          unified ''BioXSD data model'', a.k.a. ''BioXSD|BioJSON|BioYAML''.'
        title: BioYAML
      EDAM:format_3774:
        text: EDAM:format_3774
        description: BioJSON is a JSON format of single multiple sequence alignments,
          with their annotations, features, and custom visualisation and application
          settings for the Jalview workbench.
        title: BioJSON (Jalview)
      EDAM:format_3775:
        text: EDAM:format_3775
        description: '''GSuite'' belongs to the ''BioXSD|GTrack'' ecosystem of generic
          formats, and particular to its subset, the ''GTrack ecosystem'' (GTrack,
          GSuite, BTrack). ''GSuite'' is the tabular format for an annotated collection
          of individual GTrack files.

          GSuite is a tabular format for collections of genome or sequence feature
          tracks, suitable for integrative multi-track analysis. GSuite contains links
          to genome/sequence tracks, with additional metadata.'
        title: GSuite
      EDAM:format_3776:
        text: EDAM:format_3776
        description: '''BTrack'' belongs to the ''BioXSD|GTrack'' ecosystem of generic
          formats, and particular to its subset, the ''GTrack ecosystem'' (GTrack,
          GSuite, BTrack). ''BTrack'' is the binary, optionally compressed HDF5-based
          version of the GTrack and GSuite formats.

          BTrack is an HDF5-based binary format for genome or sequence feature tracks
          and their collections, suitable for integrative multi-track analysis. BTrack
          is a binary, compressed alternative to the GTrack and GSuite formats.'
        title: BTrack
      EDAM:format_3777:
        text: EDAM:format_3777
        description: 'Multi-Crop Passport Descriptors is a format available in 2 successive
          versions, V.1 (FAO/IPGRI 2001) and V.2 (FAO/Bioversity 2012).

          The FAO/Bioversity/IPGRI Multi-Crop Passport Descriptors (MCPD) is an international
          standard format for exchange of germplasm information.'
        title: MCPD
      EDAM:format_3780:
        text: EDAM:format_3780
        description: Data format of an annotated text, e.g. with recognised entities,
          concepts, and relations.
