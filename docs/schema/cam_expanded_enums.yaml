      include_self: true
      traverse_up: false
  EnumEDAMDataTypes:
    name: EnumEDAMDataTypes
    definition_uri: https://includedcc.org/common-access-model/EnumEDAMDataTypes/EnumEDAMDataTypes
    description: Data types from the EDAM ontology.
    from_schema: https://includedcc.org/common-access-model/EnumEDAMDataTypes
    permissible_values:
      EDAM:data_0582:
        text: EDAM:data_0582
        description: An ontology of biological or bioinformatics concepts and relations,
          a controlled vocabulary, structured glossary etc.
        title: Ontology
      EDAM:data_0842:
        text: EDAM:data_0842
        description: A text token, number or something else which identifies an entity,
          but which may not be persistent (stable) or unique (the same identifier
          may identify multiple things).
        title: Identifier
      EDAM:data_0844:
        text: EDAM:data_0844
        description: Mass of a molecule.
        title: Molecular mass
      EDAM:data_0845:
        text: EDAM:data_0845
        description: Net charge of a molecule.
        title: Molecular charge
      EDAM:data_0846:
        text: EDAM:data_0846
        description: A specification of a chemical structure.
        title: Chemical formula
      EDAM:data_0847:
        text: EDAM:data_0847
        description: 'A QSAR quantitative descriptor (name-value pair) of chemical
          structure.

          QSAR descriptors have numeric values that quantify chemical information
          encoded in a symbolic representation of a molecule. They are used in quantitative
          structure activity relationship (QSAR) applications. Many subtypes of individual
          descriptors (not included in EDAM) cover various types of protein properties.'
        title: QSAR descriptor
      EDAM:data_0849:
        text: EDAM:data_0849
        description: A molecular sequence and associated metadata.
        title: Sequence record
      EDAM:data_0850:
        text: EDAM:data_0850
        description: 'A collection of one or typically multiple molecular sequences
          (which can include derived data or metadata) that do not (typically) correspond
          to molecular sequence database records or entries and which (typically)
          are derived from some analytical method.

          An example is an alignment reference; one or a set of reference molecular
          sequences, structures, or profiles used for alignment of genomic, transcriptomic,
          or proteomic experimental data.

          This concept may be used for arbitrary sequence sets and associated data
          arising from processing.'
        title: Sequence set
      EDAM:data_0856:
        text: EDAM:data_0856
        description: 'How the annotation of a sequence feature (for example in EMBL
          or Swiss-Prot) was derived.

          This might be the name and version of a software tool, the name of a database,
          or ''curated'' to indicate a manual annotation (made by a human).'
        title: Sequence feature source
      EDAM:data_0857:
        text: EDAM:data_0857
        description: 'A report of sequence hits and associated data from searching
          a database of sequences (for example a BLAST search). This will typically
          include a list of scores (often with statistical evaluation) and a set of
          alignments for the hits.

          The score list includes the alignment score, percentage of the query sequence
          matched, length of the database sequence entry in this alignment, identifier
          of the database sequence entry, excerpt of the database sequence entry description
          etc.'
        title: Sequence search results
      EDAM:data_0858:
        text: EDAM:data_0858
        description: 'A "profile-profile alignment" is an alignment of two sequence
          profiles, each profile typically representing a sequence alignment.

          A "sequence-profile alignment" is an alignment of one or more molecular
          sequence(s) to one or more sequence profile(s) (each profile typically representing
          a sequence alignment).

          Report on the location of matches ("hits") between sequences, sequence profiles,
          motifs (conserved or functional patterns) and other types of sequence signatures.

          This includes reports of hits from a search of a protein secondary or domain
          database. Data associated with the search or alignment might also be included,
          e.g. ranked list of best-scoring sequences, a graphical representation of
          scores etc.'
        title: Sequence signature matches
      EDAM:data_0860:
        text: EDAM:data_0860
        description: 'Sequence signature data concerns specific or conserved pattern
          in molecular sequences and the classifiers used for their identification,
          including sequence motifs, profiles or other diagnostic element.

          This can include metadata about a motif or sequence profile such as its
          name, length, technical details about the profile construction, and so on.'
        title: Sequence signature data
      EDAM:data_0862:
        text: EDAM:data_0862
        description: A dotplot of sequence similarities identified from word-matching
          or character comparison.
        title: Dotplot
      EDAM:data_0863:
        text: EDAM:data_0863
        description: Alignment of multiple molecular sequences.
        title: Sequence alignment
      EDAM:data_0865:
        text: EDAM:data_0865
        description: A value representing molecular sequence similarity.
        title: Sequence similarity score
      EDAM:data_0867:
        text: EDAM:data_0867
        description: 'An informative report of molecular sequence alignment-derived
          data or metadata.

          Use this for any computer-generated reports on sequence alignments, and
          for general information (metadata) on a sequence alignment, such as a description,
          sequence identifiers and alignment score.'
        title: Sequence alignment report
      EDAM:data_0870:
        text: EDAM:data_0870
        description: 'A matrix of estimated evolutionary distance between molecular
          sequences, such as is suitable for phylogenetic tree calculation.

          Methods might perform character compatibility analysis or identify patterns
          of similarity in an alignment or data matrix.'
        title: Sequence distance matrix
      EDAM:data_0871:
        text: EDAM:data_0871
        description: 'As defined, this concept would also include molecular sequences,
          microsatellites, polymorphisms (RAPDs, RFLPs, or AFLPs), restriction sites
          and fragments

          Basic character data from which a phylogenetic tree may be generated.'
        title: Phylogenetic character data
      EDAM:data_0872:
        text: EDAM:data_0872
        description: 'A phylogenetic tree is usually constructed from a set of sequences
          from which an alignment (or data matrix) is calculated. See also ''Phylogenetic
          tree image''.

          The raw data (not just an image) from which a phylogenetic tree is directly
          generated or plotted, such as topology, lengths (in time or in expected
          amounts of variance) and a confidence interval for each length.'
        title: Phylogenetic tree
      EDAM:data_0874:
        text: EDAM:data_0874
        description: 'Matrix of integer or floating point numbers for amino acid or
          nucleotide sequence comparison.

          The comparison matrix might include matrix name, optional comment, height
          and width (or size) of matrix, an index row/column (of characters) and data
          rows/columns (of integers or floats).'
        title: Comparison matrix
      EDAM:data_0878:
        text: EDAM:data_0878
        description: Alignment of the (1D representations of) secondary structure
          of two or more proteins.
        title: Protein secondary structure alignment
      EDAM:data_0880:
        text: EDAM:data_0880
        description: 'An informative report of secondary structure (predicted or real)
          of an RNA molecule.

          This includes thermodynamically stable or evolutionarily conserved structures
          such as knots, pseudoknots etc.'
        title: RNA secondary structure
      EDAM:data_0881:
        text: EDAM:data_0881
        description: Alignment of the (1D representations of) secondary structure
          of two or more RNA molecules.
        title: RNA secondary structure alignment
      EDAM:data_0883:
        text: EDAM:data_0883
        description: '3D coordinate and associated data for a macromolecular tertiary
          (3D) structure or part of a structure.

          The coordinate data may be predicted or real.'
        title: Structure
      EDAM:data_0886:
        text: EDAM:data_0886
        description: 'A tertiary structure alignment will include the untransformed
          coordinates of one macromolecule, followed by the second (or subsequent)
          structure(s) with all the coordinates transformed (by rotation / translation)
          to give a superposition.

          Alignment (superimposition) of molecular tertiary (3D) structures.'
        title: Structure alignment
      EDAM:data_0887:
        text: EDAM:data_0887
        description: 'An informative report of molecular tertiary structure alignment-derived
          data.

          This is a broad data type and is used a placeholder for other, more specific
          types.'
        title: Structure alignment report
      EDAM:data_0888:
        text: EDAM:data_0888
        description: A value representing molecular structure similarity, measured
          from structure alignment or some other type of structure comparison.
        title: Structure similarity score
      EDAM:data_0889:
        text: EDAM:data_0889
        description: Some type of structural (3D) profile or template (representing
          a structure or structure alignment).
        title: Structural profile
      EDAM:data_0890:
        text: EDAM:data_0890
        description: A 3D profile-3D profile alignment (each profile representing
          structures or a structure alignment).
        title: Structural (3D) profile alignment
      EDAM:data_0892:
        text: EDAM:data_0892
        description: Matrix of values used for scoring sequence-structure compatibility.
        title: Protein sequence-structure scoring matrix
      EDAM:data_0893:
        text: EDAM:data_0893
        description: An alignment of molecular sequence to structure (from threading
          sequence(s) through 3D structure or representation of structure(s)).
        title: Sequence-structure alignment
      EDAM:data_0896:
        text: EDAM:data_0896
        description: An informative human-readable report about one or more specific
          protein molecules or protein structural domains, derived from analysis of
          primary (sequence or structural) data.
        title: Protein report
      EDAM:data_0897:
        text: EDAM:data_0897
        description: 'A report of primarily non-positional data describing intrinsic
          physical, chemical or other properties of a protein molecule or model.

          This is a broad data type and is used a placeholder for other, more specific
          types. Data may be based on analysis of nucleic acid sequence or structural
          data, for example reports on the surface properties (shape, hydropathy,
          electrostatic patches etc) of a protein structure, protein flexibility or
          motion, and protein architecture (spatial arrangement of secondary structure).'
        title: Protein property
      EDAM:data_0905:
        text: EDAM:data_0905
        description: 'Protein-protein interaction data from for example yeast two-hybrid
          analysis, protein microarrays, immunoaffinity chromatography followed by
          mass spectrometry, phage display etc.

          This is a broad data type and is used a placeholder for other, more specific
          types. It is primarily intended to help navigation of EDAM and would not
          typically be used for annotation.'
        title: Protein interaction raw data
      EDAM:data_0906:
        text: EDAM:data_0906
        description: Data concerning the interactions (predicted or known) within
          or between a protein, structural domain or part of a protein. This includes
          intra- and inter-residue contacts and distances, as well as interactions
          with other proteins and non-protein entities such as nucleic acid, metal
          atoms, water, ions etc.
        title: Protein interaction data
      EDAM:data_0907:
        text: EDAM:data_0907
        description: An informative report on a specific protein family or other classification
          or group of protein sequences or structures.
        title: Protein family report
      EDAM:data_0909:
        text: EDAM:data_0909
        description: The maximum initial velocity or rate of a reaction. It is the
          limiting velocity as substrate concentrations get very large.
        title: Vmax
      EDAM:data_0910:
        text: EDAM:data_0910
        description: Km is the concentration (usually in Molar units) of substrate
          that leads to half-maximal velocity of an enzyme-catalysed reaction.
        title: Km
      EDAM:data_0912:
        text: EDAM:data_0912
        description: 'A report of primarily non-positional data describing intrinsic
          physical, chemical or other properties of a nucleic acid molecule.

          Nucleic acid structural properties stiffness, curvature, twist/roll data
          or other conformational parameters or properties.

          This is a broad data type and is used a placeholder for other, more specific
          types.'
        title: Nucleic acid property
      EDAM:data_0914:
        text: EDAM:data_0914
        description: 'Data derived from analysis of codon usage (typically a codon
          usage table) of DNA sequences.

          This is a broad data type and is used a placeholder for other, more specific
          types.'
        title: Codon usage data
      EDAM:data_0916:
        text: EDAM:data_0916
        description: 'A report on predicted or actual gene structure, regions which
          make an RNA product and features such as promoters, coding regions, splice
          sites etc.

          This includes any report on a particular locus or gene. This might include
          the gene name, description, summary and so on. It can include details about
          the function of a gene, such as its encoded protein or a functional classification
          of the gene sequence along according to the encoded protein(s).'
        title: Gene report
      EDAM:data_0919:
        text: EDAM:data_0919
        description: 'A human-readable collection of information about a specific
          chromosome.

          This includes basic information. e.g. chromosome number, length, karyotype
          features, chromosome sequence etc.'
        title: Chromosome report
      EDAM:data_0920:
        text: EDAM:data_0920
        description: A human-readable collection of information about the set of genes
          (or allelic forms) present in an individual, organism or cell and associated
          with a specific physical characteristic, or a report concerning an organisms
          traits and phenotypes.
        title: Genotype/phenotype report
      EDAM:data_0924:
        text: EDAM:data_0924
        description: 'Fluorescence trace data generated by an automated DNA sequencer,
          which can be interpreted as a molecular sequence (reads), given associated
          sequencing metadata such as base-call quality scores.

          This is the raw data produced by a DNA sequencing machine.'
        title: Sequence trace
      EDAM:data_0925:
        text: EDAM:data_0925
        description: 'An assembly of fragments of a (typically genomic) DNA sequence.

          Typically, an assembly is a collection of contigs (for example ESTs and
          genomic DNA fragments) that are ordered, aligned and merged. Annotation
          of the assembled sequence might be included.'
        title: Sequence assembly
      EDAM:data_0926:
        text: EDAM:data_0926
        description: 'Radiation Hybrid (RH) scores are used in Radiation Hybrid mapping.

          Radiation hybrid scores (RH) scores for one or more markers.'
        title: RH scores
      EDAM:data_0927:
        text: EDAM:data_0927
        description: 'A human-readable collection of information about the linkage
          of alleles.

          This includes linkage disequilibrium; the non-random association of alleles
          or polymorphisms at two or more loci (not necessarily on the same chromosome).'
        title: Genetic linkage report
      EDAM:data_0928:
        text: EDAM:data_0928
        description: Data quantifying the level of expression of (typically) multiple
          genes, derived for example from microarray experiments.
        title: Gene expression profile
      EDAM:data_0937:
        text: EDAM:data_0937
        description: X-ray crystallography data.
        title: Electron density map
      EDAM:data_0938:
        text: EDAM:data_0938
        description: Nuclear magnetic resonance (NMR) raw data, typically for a protein.
        title: Raw NMR data
      EDAM:data_0939:
        text: EDAM:data_0939
        description: Protein secondary structure from protein coordinate or circular
          dichroism (CD) spectroscopic data.
        title: CD spectra
      EDAM:data_0940:
        text: EDAM:data_0940
        description: Volume map data from electron microscopy.
        title: Volume map
      EDAM:data_0942:
        text: EDAM:data_0942
        description: Two-dimensional gel electrophoresis image.
        title: 2D PAGE image
      EDAM:data_0943:
        text: EDAM:data_0943
        description: Spectra from mass spectrometry.
        title: Mass spectrum
      EDAM:data_0944:
        text: EDAM:data_0944
        description: 'A molecular weight standard fingerprint is standard protonated
          molecular masses e.g. from trypsin (modified porcine trypsin, Promega) and
          keratin peptides.

          A set of peptide masses (peptide mass fingerprint) from mass spectrometry.'
        title: Peptide mass fingerprint
      EDAM:data_0945:
        text: EDAM:data_0945
        description: Protein or peptide identifications with evidence supporting the
          identifications, for example from comparing a peptide mass fingerprint (from
          mass spectrometry) to a sequence database, or the set of typical spectra
          one obtains when running a protein through a mass spectrometer.
        title: Peptide identification
      EDAM:data_0949:
        text: EDAM:data_0949
        description: Basic information, annotation or documentation concerning a workflow
          (but not the workflow itself).
        title: Workflow metadata
      EDAM:data_0950:
