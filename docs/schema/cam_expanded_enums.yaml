        description: Textual report format for sequence quality for reports from sequencing
          machines.
        title: Sequence quality report format (text)
      EDAM:format_3607:
        text: EDAM:format_3607
        description: 'FASTQ format subset for Phred sequencing quality score data
          only (no sequences).

          Phred quality scores are defined as a property which is logarithmically
          related to the base-calling error probabilities.'
        title: qual
      EDAM:format_3608:
        text: EDAM:format_3608
        description: 'FASTQ format subset for Phred sequencing quality score data
          only (no sequences) for Solexa/Illumina 1.0 format.

          Solexa/Illumina 1.0 format can encode a Solexa/Illumina quality score from
          -5 to 62 using ASCII 59 to 126 (although in raw read data Solexa scores
          from -5 to 40 only are expected)'
        title: qualsolexa
      EDAM:format_3609:
        text: EDAM:format_3609
        description: 'FASTQ format subset for Phred sequencing quality score data
          only (no sequences) from Illumina 1.5 and before Illumina 1.8.

          Starting in Illumina 1.5 and before Illumina 1.8, the Phred scores 0 to
          2 have a slightly different meaning. The values 0 and 1 are no longer used
          and the value 2, encoded by ASCII 66 "B", is used also at the end of reads
          as a Read Segment Quality Control Indicator.'
        title: qualillumina
      EDAM:format_3610:
        text: EDAM:format_3610
        description: 'FASTQ format subset for Phred sequencing quality score data
          only (no sequences) for SOLiD data.

          For SOLiD data, the sequence is in color space, except the first position.
          The quality values are those of the Sanger format.'
        title: qualsolid
      EDAM:format_3611:
        text: EDAM:format_3611
        description: FASTQ format subset for Phred sequencing quality score data only
          (no sequences) from 454 sequencers.
        title: qual454
      EDAM:format_3612:
