          for importing annotation into an existing Sequin submission (an NCBI tool
          for submitting and updating GenBank entries).
        title: Sequin format
      EDAM:format_3702:
        text: EDAM:format_3702
        description: 'Proprietary mass-spectrometry format of Thermo Scientific''s
          ProteomeDiscoverer software.

          This format corresponds to an SQLite database, and you can look into the
          files with e.g. SQLiteStudio3. There are also some readers (http://doi.org/10.1021/pr2005154)
          and converters (http://doi.org/10.1016/j.jprot.2015.06.015) for this format
          available, which re-engineered the database schema, but there is no official
          DB schema specification of Thermo Scientific for the format.'
        title: MSF
      EDAM:format_3706:
