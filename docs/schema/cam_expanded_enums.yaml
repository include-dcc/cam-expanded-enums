        description: Any collection of multiple protein sequences and associated metadata
          that do not (typically) correspond to common sequence database records or
          database entries.
        title: Sequence set (protein)
      EDAM:data_1234:
        text: EDAM:data_1234
        description: Any collection of multiple nucleotide sequences and associated
          metadata that do not (typically) correspond to common sequence database
          records or database entries.
        title: Sequence set (nucleic acid)
      EDAM:data_1235:
        text: EDAM:data_1235
        description: 'A set of sequences that have been clustered or otherwise classified
          as belonging to a group including (typically) sequence cluster information.

          The cluster might include sequences identifiers, short descriptions, alignment
          and summary information.'
        title: Sequence cluster
      EDAM:data_1238:
        text: EDAM:data_1238
        description: A protein sequence cleaved into peptide fragments (by enzymatic
          or chemical cleavage) with fragment masses.
        title: Proteolytic digest
      EDAM:data_1239:
        text: EDAM:data_1239
        description: Restriction digest fragments from digesting a nucleotide sequence
          with restriction sites using a restriction endonuclease.
        title: Restriction digest
      EDAM:data_1240:
        text: EDAM:data_1240
        description: Oligonucleotide primer(s) for PCR and DNA amplification, for
          example a minimal primer set.
        title: PCR primers
      EDAM:data_1245:
        text: EDAM:data_1245
        description: 'A cluster of protein sequences.

          The sequences are typically related, for example a family of sequences.'
        title: Sequence cluster (protein)
      EDAM:data_1246:
        text: EDAM:data_1246
        description: 'A cluster of nucleotide sequences.

          The sequences are typically related, for example a family of sequences.'
        title: Sequence cluster (nucleic acid)
      EDAM:data_1249:
        text: EDAM:data_1249
        description: The size (length) of a sequence, subsequence or region in a sequence,
          or range(s) of lengths.
        title: Sequence length
      EDAM:data_1254:
        text: EDAM:data_1254
        description: An informative report about non-positional sequence features,
          typically a report on general molecular sequence properties derived from
          sequence analysis.
        title: Sequence property
      EDAM:data_1255:
        text: EDAM:data_1255
        description: 'Annotation of positional features of molecular sequence(s),
          i.e. that can be mapped to position(s) in the sequence.

          This includes annotation of positional sequence features, organised into
          a standard feature table, or any other report of sequence features. General
          feature reports are a source of sequence feature table information although
          internal conversion would be required.'
        title: Sequence features
      EDAM:data_1259:
        text: EDAM:data_1259
        description: A report on sequence complexity, for example low-complexity or
          repeat regions in sequences.
        title: Sequence complexity report
      EDAM:data_1260:
        text: EDAM:data_1260
        description: A report on ambiguity in molecular sequence(s).
        title: Sequence ambiguity report
      EDAM:data_1261:
        text: EDAM:data_1261
        description: A report (typically a table) on character or word composition
          / frequency of a molecular sequence(s).
        title: Sequence composition report
      EDAM:data_1262:
        text: EDAM:data_1262
        description: A report on peptide fragments of certain molecular weight(s)
          in one or more protein sequences.
        title: Peptide molecular weight hits
      EDAM:data_1263:
        text: EDAM:data_1263
        description: A plot of third base position variability in a nucleotide sequence.
        title: Base position variability plot
      EDAM:data_1265:
        text: EDAM:data_1265
        description: A table of base frequencies of a nucleotide sequence.
        title: Base frequencies table
      EDAM:data_1266:
        text: EDAM:data_1266
        description: A table of word composition of a nucleotide sequence.
        title: Base word frequencies table
      EDAM:data_1267:
        text: EDAM:data_1267
        description: A table of amino acid frequencies of a protein sequence.
        title: Amino acid frequencies table
      EDAM:data_1268:
        text: EDAM:data_1268
        description: A table of amino acid word composition of a protein sequence.
        title: Amino acid word frequencies table
      EDAM:data_1270:
        text: EDAM:data_1270
        description: Annotation of positional sequence features, organised into a
          standard feature table.
        title: Feature table
      EDAM:data_1274:
        text: EDAM:data_1274
        description: A map of (typically one) DNA sequence annotated with positional
          or non-positional features.
        title: Map
      EDAM:data_1276:
        text: EDAM:data_1276
        description: 'An informative report on intrinsic positional features of a
          nucleotide sequence, formatted to be machine-readable.

          This includes nucleotide sequence feature annotation in any known sequence
          feature table format and any other report of nucleic acid features.'
        title: Nucleic acid features
      EDAM:data_1277:
        text: EDAM:data_1277
        description: 'An informative report on intrinsic positional features of a
          protein sequence.

          This includes protein sequence feature annotation in any known sequence
          feature table format and any other report of protein features.'
        title: Protein features
      EDAM:data_1278:
        text: EDAM:data_1278
        description: 'A genetic (linkage) map indicates the proximity of two genes
          on a chromosome, whether two genes are linked and the frequency they are
          transmitted together to an offspring. They are limited to genetic markers
          of traits observable only in whole organisms.

          A map showing the relative positions of genetic markers in a nucleic acid
          sequence, based on estimation of non-physical distance such as recombination
          frequencies.'
        title: Genetic map
      EDAM:data_1279:
        text: EDAM:data_1279
        description: 'A map of genetic markers in a contiguous, assembled genomic
          sequence, with the sizes and separation of markers measured in base pairs.

          A sequence map typically includes annotation on significant subsequences
          such as contigs, haplotypes and genes. The contigs shown will (typically)
          be a set of small overlapping clones representing a complete chromosomal
          segment.'
        title: Sequence map
      EDAM:data_1280:
        text: EDAM:data_1280
        description: 'A map of DNA (linear or circular) annotated with physical features
          or landmarks such as restriction sites, cloned DNA fragments, genes or genetic
          markers, along with the physical distances between them.

          Distance in a physical map is measured in base pairs. A physical map might
          be ordered relative to a reference map (typically a genetic map) in the
          process of genome sequencing.'
        title: Physical map
      EDAM:data_1283:
        text: EDAM:data_1283
        description: 'A map showing banding patterns derived from direct observation
          of a stained chromosome.

          This is the lowest-resolution physical map and can provide only rough estimates
          of physical (base pair) distances. Like a genetic map, they are limited
          to genetic markers of traits observable only in whole organisms.'
        title: Cytogenetic map
      EDAM:data_1284:
        text: EDAM:data_1284
        description: A gene map showing distances between loci based on relative cotransduction
          frequencies.
        title: DNA transduction map
      EDAM:data_1285:
        text: EDAM:data_1285
        description: Sequence map of a single gene annotated with genetic features
          such as introns, exons, untranslated regions, polyA signals, promoters,
          enhancers and (possibly) mutations defining alleles of a gene.
        title: Gene map
      EDAM:data_1286:
        text: EDAM:data_1286
        description: Sequence map of a plasmid (circular DNA).
        title: Plasmid map
      EDAM:data_1288:
        text: EDAM:data_1288
        description: Sequence map of a whole genome.
        title: Genome map
      EDAM:data_1289:
        text: EDAM:data_1289
        description: Image of the restriction enzyme cleavage sites (restriction sites)
          in a nucleic acid sequence.
        title: Restriction map
      EDAM:data_1347:
        text: EDAM:data_1347
        description: Dirichlet distribution used by hidden Markov model analysis programs.
        title: Dirichlet distribution
      EDAM:data_1352:
        text: EDAM:data_1352
        description: Regular expression pattern.
        title: Regular expression
      EDAM:data_1353:
        text: EDAM:data_1353
        description: Any specific or conserved pattern (typically expressed as a regular
          expression) in a molecular sequence.
        title: Sequence motif
      EDAM:data_1354:
        text: EDAM:data_1354
        description: Some type of statistical model representing a (typically multiple)
          sequence alignment.
        title: Sequence profile
      EDAM:data_1355:
        text: EDAM:data_1355
        description: An informative report about a specific or conserved protein sequence
          pattern.
        title: Protein signature
      EDAM:data_1361:
        text: EDAM:data_1361
        description: A profile (typically representing a sequence alignment) that
          is a simple matrix of nucleotide (or amino acid) counts per position.
        title: Position frequency matrix
      EDAM:data_1362:
        text: EDAM:data_1362
        description: 'A profile (typically representing a sequence alignment) that
          is weighted matrix of nucleotide (or amino acid) counts per position.

          Contributions of individual sequences to the matrix might be uneven (weighted).'
        title: Position weight matrix
      EDAM:data_1363:
        text: EDAM:data_1363
        description: A profile (typically representing a sequence alignment) derived
          from a matrix of nucleotide (or amino acid) counts per position that reflects
          information content at each position.
        title: Information content matrix
      EDAM:data_1364:
        text: EDAM:data_1364
        description: A statistical Markov model of a system which is assumed to be
          a Markov process with unobserved (hidden) states. For example, a hidden
          Markov model representation of a set or alignment of sequences.
        title: Hidden Markov model
      EDAM:data_1365:
        text: EDAM:data_1365
        description: One or more fingerprints (sequence classifiers) as used in the
          PRINTS database.
        title: Fingerprint
      EDAM:data_1381:
        text: EDAM:data_1381
        description: Alignment of exactly two molecular sequences.
        title: Pair sequence alignment
      EDAM:data_1383:
        text: EDAM:data_1383
        description: Alignment of multiple nucleotide sequences.
        title: Nucleic acid sequence alignment
      EDAM:data_1384:
        text: EDAM:data_1384
        description: Alignment of multiple protein sequences.
        title: Protein sequence alignment
      EDAM:data_1385:
        text: EDAM:data_1385
        description: 'Alignment of multiple molecular sequences of different types.

          Hybrid sequence alignments include for example genomic DNA to EST, cDNA
          or mRNA.'
        title: Hybrid sequence alignment
      EDAM:data_1394:
        text: EDAM:data_1394
        description: A simple floating point number defining the penalty for opening
          or extending a gap in an alignment.
        title: Alignment score or penalty
      EDAM:data_1397:
        text: EDAM:data_1397
        description: A penalty for opening a gap in an alignment.
        title: Gap opening penalty
      EDAM:data_1398:
        text: EDAM:data_1398
        description: A penalty for extending a gap in an alignment.
        title: Gap extension penalty
      EDAM:data_1399:
        text: EDAM:data_1399
        description: A penalty for gaps that are close together in an alignment.
        title: Gap separation penalty
      EDAM:data_1401:
        text: EDAM:data_1401
        description: The score for a 'match' used in various sequence database search
          applications with simple scoring schemes.
        title: Match reward score
      EDAM:data_1402:
        text: EDAM:data_1402
        description: The score (penalty) for a 'mismatch' used in various alignment
          and sequence database search applications with simple scoring schemes.
        title: Mismatch penalty score
      EDAM:data_1403:
        text: EDAM:data_1403
        description: This is the threshold drop in score at which extension of word
          alignment is halted.
        title: Drop off score
      EDAM:data_1410:
        text: EDAM:data_1410
        description: A number defining the penalty for opening gaps at the termini
          of an alignment, either from the N/C terminal of protein or 5'/3' terminal
          of nucleotide sequences.
        title: Terminal gap opening penalty
      EDAM:data_1411:
        text: EDAM:data_1411
        description: A number defining the penalty for extending gaps at the termini
          of an alignment, either from the N/C terminal of protein or 5'/3' terminal
          of nucleotide sequences.
        title: Terminal gap extension penalty
      EDAM:data_1412:
        text: EDAM:data_1412
        description: Sequence identity is the number (%) of matches (identical characters)
          in positions from an alignment of two molecular sequences.
        title: Sequence identity
      EDAM:data_1413:
        text: EDAM:data_1413
        description: 'Data Type is float probably.

          Sequence similarity is the similarity (expressed as a percentage) of two
          molecular sequences calculated from their alignment, a scoring matrix for
          scoring characters substitutions and penalties for gap insertion and extension.'
        title: Sequence similarity
      EDAM:data_1426:
        text: EDAM:data_1426
        description: Continuous quantitative data that may be read during phylogenetic
          tree calculation.
        title: Phylogenetic continuous quantitative data
      EDAM:data_1427:
        text: EDAM:data_1427
        description: Character data with discrete states that may be read during phylogenetic
          tree calculation.
        title: Phylogenetic discrete data
      EDAM:data_1428:
        text: EDAM:data_1428
        description: One or more cliques of mutually compatible characters that are
          generated, for example from analysis of discrete character data, and are
          used to generate a phylogeny.
        title: Phylogenetic character cliques
      EDAM:data_1429:
        text: EDAM:data_1429
        description: Phylogenetic invariants data for testing alternative tree topologies.
        title: Phylogenetic invariants
      EDAM:data_1439:
        text: EDAM:data_1439
        description: A model of DNA substitution that explains a DNA sequence alignment,
          derived from phylogenetic tree analysis.
        title: DNA substitution model
      EDAM:data_1442:
        text: EDAM:data_1442
        description: Distances, such as Branch Score distance, between two or more
          phylogenetic trees.
        title: Phylogenetic tree distances
      EDAM:data_1444:
        text: EDAM:data_1444
        description: Independent contrasts for characters used in a phylogenetic tree,
          or covariances, regressions and correlations between characters for those
          contrasts.
        title: Phylogenetic character contrasts
      EDAM:data_1448:
        text: EDAM:data_1448
        description: Matrix of integer or floating point numbers for nucleotide comparison.
        title: Comparison matrix (nucleotide)
      EDAM:data_1449:
        text: EDAM:data_1449
        description: Matrix of integer or floating point numbers for amino acid comparison.
        title: Comparison matrix (amino acid)
      EDAM:data_1459:
        text: EDAM:data_1459
        description: 3D coordinate and associated data for a nucleic acid tertiary
          (3D) structure.
        title: Nucleic acid structure
      EDAM:data_1460:
        text: EDAM:data_1460
        description: 3D coordinate and associated data for a protein tertiary (3D)
          structure, or part of a structure, possibly in complex with other molecules.
        title: Protein structure
      EDAM:data_1461:
        text: EDAM:data_1461
        description: 'The structure of a protein in complex with a ligand, typically
          a small molecule such as an enzyme substrate or cofactor, but possibly another
          macromolecule.

          This includes interactions of proteins with atoms, ions and small molecules
          or macromolecules such as nucleic acids or other polypeptides. For stable
          inter-polypeptide interactions use ''Protein complex'' instead.'
        title: Protein-ligand complex
      EDAM:data_1462:
        text: EDAM:data_1462
